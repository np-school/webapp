<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="var(--accent)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NP Origins">
  <link rel="icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}</script>
  <title>Food Court – บัญชีรายได้ โรงเรียนหนองกี่พิทยาคม</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="shared/tailwind-built.css" rel="stylesheet">
  <link href="shared/styles-new.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@1.24.0"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  <script src="shared/firebase.js"></script>
  <script src="shared/common.js"></script>
  <style>
    
    /* ── Food Court page-specific only ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .page-inner { padding: 22px 20px; max-width: 1280px; margin: 0 auto; animation: fadeIn .22s ease; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(190px,1fr)); gap: 12px; margin-bottom: 18px; }
    .kpi { background: white; border-radius: 14px; padding: 18px 18px 16px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; position: relative; overflow: hidden; }
    .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .kpi.income::before { background: var(--green); }
    .kpi.expense::before { background: var(--red); }
    .kpi.balance::before { background: var(--blue); }
    .kpi.avg::before { background: var(--amber); }
    .kpi-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .kpi-value { font-size: 24px; font-weight: 800; color: var(--text); line-height: 1.1; }
    .kpi-sub { font-size: 11px; color: var(--text2); }
    .kpi-icon { position: absolute; right: 14px; top: 14px; font-size: 22px; opacity: .1; }
    .period-tabs { display: flex; gap: 4px; }
    .ptab { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--text2); cursor: pointer; transition: all .15s; font-family: 'Sarabun', sans-serif; }
    .ptab.active { background: var(--blue); color: white; border-color: var(--blue); }
    .chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 18px; }
    @media(max-width:900px) { .chart-grid { grid-template-columns: 1fr; } }
    .chart-wrap { position: relative; height: 250px; }
    .td-in  { color: var(--green); font-weight: 700; }
    .td-out { color: var(--red); font-weight: 700; }
    .badge-in  { background: var(--green-light); color: var(--green); }
    .badge-out { background: var(--red-light); color: var(--red); }
    .legend-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:var(--text2);font-size:14px;font-weight:700;">กำลังตรวจสอบสิทธิ์...</p>
</div>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Access Denied -->
<div id="accessDenied" style="display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="width:72px;height:72px;background:var(--red-light);border-radius:50%;display:flex;align-items:center;justify-content:center;">
    <i data-lucide="shield-off" style="width:36px;height:36px;color:var(--red);"></i>
  </div>
  <div style="text-align:center;">
    <h2 style="font-size:22px;font-weight:800;color:var(--text);">ไม่มีสิทธิ์เข้าถึง</h2>
    <p style="color:var(--text2);font-size:14px;">บัญชีของคุณไม่ได้รับอนุญาต</p>
  </div>
  <a href="index.html" style="padding:10px 24px;background:var(--accent);color:white;border-radius:12px;font-weight:700;text-decoration:none;">← กลับหน้าแรก</a>
</div>

<!-- Main App — buildPage() inject navbar + sidebar + content-area ให้อัตโนมัติ -->
<div id="foodcourtApp" style="display:none;"></div>

<!-- ปุ่มย้อนกลับไปด้านบน -->
<button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTopContent()" title="ย้อนกลับด้านบน">
  <i data-lucide="arrow-up" style="width:20px;height:20px;"></i>
</button>

<!-- ═══ MODAL: เพิ่มรายการ (daily-entry style) ═══ -->
<div class="modal-bg" id="addModal">
  <div class="modal-box" style="max-width:600px;max-height:92vh;overflow-y:auto">
    <div class="modal-header" style="position:sticky;top:0;background:white;z-index:10;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:var(--gap-section)">
      <div class="modal-title-group">
        <div class="modal-title-icon" style="width:34px;height:34px;border-radius:10px;background:var(--green-lt);">
          <i data-lucide="plus-circle" style="width:18px;height:18px;color:var(--green);"></i>
        </div>
        <div class="modal-title">เพิ่มรายการ</div>
      </div>
      <button class="modal-close" onclick="closeAddModal()" aria-label="ปิด"><i data-lucide="x"></i></button>
    </div>

    <div class="form-group" style="margin-bottom:var(--gap-section)">
      <label>วันที่</label>
      <input type="date" id="addDate">
    </div>

    <div style="display:flex;align-items:center;gap:var(--gap-tight);margin-bottom:10px">
      <span class="badge badge-in">ประจำ</span>
      <span style="font-size:13px;font-weight:800;color:var(--text)">รายรับประจำ</span>
    </div>
    <div id="modalEntryRecIncome" style="display:flex;flex-direction:column;gap:var(--gap-tight);margin-bottom:var(--gap-section)"></div>

    <div style="display:flex;align-items:center;gap:var(--gap-tight);margin-bottom:10px">
      <span class="badge" style="background:var(--green-lt);color:var(--green)">อื่นๆ</span>
      <span style="font-size:13px;font-weight:800;color:var(--text)">รายรับอื่นๆ</span>
    </div>
    <div id="modalExtraIncome" style="display:flex;flex-direction:column;gap:var(--gap-tight);margin-bottom:var(--gap-tight)"></div>
    <button class="upload-area" style="margin-bottom:var(--gap-section);padding:10px;font-size:12px;font-weight:700;color:var(--text2)" onclick="addModalExtraRow('income')">+ เพิ่มรายรับอื่นๆ</button>

    <div style="display:flex;align-items:center;gap:var(--gap-tight);margin-bottom:10px">
      <span class="badge badge-out">ประจำ</span>
      <span style="font-size:13px;font-weight:800;color:var(--text)">รายจ่ายประจำ</span>
    </div>
    <div id="modalEntryRecExpense" style="display:flex;flex-direction:column;gap:var(--gap-tight);margin-bottom:var(--gap-section)"></div>

    <div style="display:flex;align-items:center;gap:var(--gap-tight);margin-bottom:10px">
      <span class="badge" style="background:var(--red-lt);color:var(--red)">อื่นๆ</span>
      <span style="font-size:13px;font-weight:800;color:var(--text)">รายจ่ายอื่นๆ</span>
    </div>
    <div id="modalExtraExpense" style="display:flex;flex-direction:column;gap:var(--gap-tight);margin-bottom:var(--gap-tight)"></div>
    <button class="upload-area" style="margin-bottom:var(--gap-section);padding:10px;font-size:12px;font-weight:700;color:var(--text2)" onclick="addModalExtraRow('expense')">+ เพิ่มรายจ่ายอื่นๆ</button>

    <div class="sum-bar" id="modalSumBar" style="margin-bottom:0"></div>
    <div style="display:flex;gap:var(--gap-tight);justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeAddModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveModalEntry()">บันทึก</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: บันทึกรายการประจำ (ร้าน*50) ═══ -->
<div class="modal-bg" id="shopCountModal">
  <div class="modal-box" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-title-icon" style="width:34px;height:34px;border-radius:10px;background:var(--blue-lt);">
          <i data-lucide="store" style="width:18px;height:18px;color:var(--blue);"></i>
        </div>
        <div class="modal-title">นำเข้ารายได้โรงเรียน</div>
      </div>
      <button class="modal-close" onclick="closeShopCountModal()" aria-label="ปิด"><i data-lucide="x"></i></button>
    </div>
    <div style="background:var(--bg);border-radius:12px;padding:14px;margin-bottom:var(--gap-section);font-size:13px;color:var(--text2)">
      คำนวณจากจำนวนร้านค้า × <strong style="color:var(--text)">50 บาท/ร้าน</strong>
    </div>
    <div class="form-group" style="margin-bottom:var(--gap-card)">
      <label>วันที่</label>
      <input type="date" id="shopCountDate">
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>จำนวนร้านค้า</label>
      <input type="number" id="shopCountNum" placeholder="0" min="0" oninput="updateShopPreview()" style="font-size:22px;font-weight:800;text-align:center">
    </div>
    <div class="shop-count-modal-preview" id="shopPreview">
      <div class="preview-amount">฿0</div>
      <div class="preview-label">= 0 ร้าน × 50 บาท</div>
    </div>
    <div class="form-group" style="margin-bottom:var(--gap-section)">
      <label>หมายเหตุ (ถ้ามี)</label>
      <input type="text" id="shopCountNote" placeholder="หมายเหตุ...">
    </div>
    <div style="display:flex;gap:var(--gap-tight);justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeShopCountModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveShopCount()">บันทึก</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: Quick Log รายการประจำ ═══ -->
<div class="modal-bg" id="quickLogModal">
  <div class="modal-box" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-title-icon" style="width:34px;height:34px;border-radius:10px;background:var(--amber-lt,var(--yellow-light));">
          <i data-lucide="zap" style="width:18px;height:18px;color:var(--amber,var(--amber));"></i>
        </div>
        <div>
          <div class="modal-title" id="quickLogTitle">บันทึกรายการ</div>
          <div id="quickLogTypeBadge" style="margin-top:4px"></div>
        </div>
      </div>
      <button class="modal-close" onclick="closeQuickLogModal()" aria-label="ปิด"><i data-lucide="x"></i></button>
    </div>

    <!-- Big amount -->
    <div class="form-group" style="margin-bottom:var(--gap-card)">
      <label>จำนวนเงิน</label>
      <div class="amount-input-wrap">
        <span class="currency">฿</span>
        <input type="number" id="quickLogAmount" class="amount-big" placeholder="0.00" min="0">
      </div>
    </div>

    <div class="form-group" style="margin-bottom:var(--gap-card)">
      <label>วันที่</label>
      <input type="date" id="quickLogDate">
    </div>
    <div class="form-group" style="margin-bottom:var(--gap-section)">
      <label>หมายเหตุ</label>
      <input type="text" id="quickLogNote" placeholder="หมายเหตุ...">
    </div>
    <div style="display:flex;gap:var(--gap-tight);justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeQuickLogModal()">ยกเลิก</button>
      <button class="btn btn-primary" id="quickLogSaveBtn" onclick="saveQuickLog()">บันทึก</button>
    </div>
  </div>
</div>


<template id="foodcourtShell">
<div class="page-inner" style="padding-bottom:0">
        <div class="page-header" style="margin-bottom:var(--gap-card)">
          <div>
            <div style="display:flex;align-items:center;gap:var(--gap-item);margin-bottom:4px;">
              <div class="page-icon" style="background:linear-gradient(135deg,var(--purple),var(--purple-mid));">
                <i data-lucide="utensils" style="width:20px;height:20px;color:white;"></i>
              </div>
              <h1 style="font-size:22px;font-weight:800;color:var(--text);">บัญชีรายได้ Food Court</h1>
            </div>
            <p style="font-size:13px;color:var(--text2);padding-left:50px;">บันทึกและติดตามรายรับ–รายจ่าย Food Court โรงเรียนหนองกี่พิทยาคม</p>
          </div>
        </div>
        <div class="sub-tab-bar purple" style="margin-bottom:0">
          <button class="sub-tab active" id="sb-dashboard" onclick="switchTab('dashboard',this)">ภาพรวม</button>
          <button class="sub-tab" id="sb-daily" onclick="switchTab('daily',this)">รายการทั้งหมด</button>
          <button class="sub-tab" id="sb-report" onclick="switchTab('report',this)">รายงาน</button>
          <button class="sub-tab" id="sb-manage" onclick="switchTab('manage',this)">จัดการ</button>
        </div>
      </div>

    <!-- ═══════════ DASHBOARD ═══════════ -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="page-inner" style="padding-top:14px">

        <div class="page-header">
          <div>
            <div style="display:flex;align-items:center;gap:var(--gap-item);margin-bottom:4px;">
              <div class="page-icon" style="background:linear-gradient(135deg,var(--purple),var(--purple-mid));">
                <i data-lucide="chart-bar" style="width:20px;height:20px;color:white;"></i>
              </div>
              <h1 style="font-size:22px;font-weight:800;color:var(--text);">ภาพรวมบัญชี Food Court</h1>
            </div>
            <div style="display:flex;align-items:center;gap:var(--gap-tight);padding-left:50px;flex-wrap:wrap;">
              <p style="font-size:13px;color:var(--text2);">โรงเรียนหนองกี่พิทยาคม</p>
              <div id="lastUpdatedChip" class="chip" style="display:none;">บันทึกล่าสุด: <span id="lastUpdated"></span></div>
            </div>
          </div>
          <div style="display:flex;gap:var(--gap-tight);flex-wrap:wrap">
            <button class="btn btn-ghost" onclick="exportCSV()">ส่งออก CSV</button>
            <button class="btn btn-primary" onclick="openAddModal()">+ เพิ่มรายการ</button>
          </div>
        </div>

        <!-- KPIs -->
        <div class="kpi-grid" id="kpiGrid"></div>

        <!-- Charts -->
        <div style="margin-bottom:var(--gap-section)">
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--gap-tight);margin-bottom:var(--gap-card)">
              <div class="card-title" style="margin-bottom:0">กราฟรายรับ – รายจ่ายรายวัน</div>
              <div class="period-tabs">
                <button class="ptab active" onclick="setPeriod('week',this)">สัปดาห์นี้</button>
                <button class="ptab" onclick="setPeriod('month',this)">เดือนนี้</button>
                <button class="ptab" onclick="setPeriod('all',this)">ทั้งหมด</button>
              </div>
            </div>
            <div class="chart-wrap"><canvas id="barChart"></canvas></div>
          </div>
        </div>

        <div class="chart-grid">
          <div class="card">
            <div class="card-title">รายได้สุทธิรายวัน</div>
            <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">สัดส่วนรายรับแต่ละร้าน</div>
            <div style="display:flex;flex-wrap:wrap;gap:var(--gap-tight)">
              <div style="flex:1;min-width:130px"><div class="chart-wrap" style="height:190px"><canvas id="donutChart"></canvas></div></div>
              <div class="legend-list" id="donutLegend" style="min-width:130px;justify-content:center;display:flex;flex-direction:column"></div>
            </div>
          </div>
        </div>

        <!-- RECURRING SUMMARY SECTION ON DASHBOARD -->
        <div class="card" style="margin-bottom:var(--gap-section)">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--gap-item);margin-bottom:var(--gap-section)">
            <div>
              <div class="card-title" style="margin-bottom:2px">สรุปรายการประจำ</div>
              <div style="font-size:11px;color:var(--text2)">รายรับ – รายจ่ายจากรายการประจำตามช่วงเวลา</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              <div class="period-tabs" id="recPeriodTabs">
                <button class="ptab active" onclick="setRecPeriod('day',this)">วันนี้</button>
                <button class="ptab" onclick="setRecPeriod('week',this)">สัปดาห์นี้</button>
                <button class="ptab" onclick="setRecPeriod('month',this)">เดือนนี้</button>
                <button class="ptab" onclick="setRecPeriod('year',this)">ปีนี้</button>
              </div>
              <button class="btn btn-ghost btn-sm" onclick="switchTab('manage',document.getElementById('sb-manage'),true)">จัดการรายการ</button>
            </div>
          </div>

          <!-- KPI Summary row -->
          <div id="recSummaryKpi" style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap-item);margin-bottom:var(--gap-section)"></div>

          <!-- Income list -->
          <div class="rec-section-grid">
            <div>
              <div class="rec-col-label" style="color:var(--green);margin-bottom:10px">
                <div class="rec-col-ico" style="background:var(--green-lt);font-size:13px">+</div>
                รายรับประจำ
              </div>
              <div id="dashRecIncome"></div>
            </div>
            <div>
              <div class="rec-col-label" style="color:var(--red);margin-bottom:10px">
                <div class="rec-col-ico" style="background:var(--red-lt);font-size:13px">−</div>
                รายจ่ายประจำ
              </div>
              <div id="dashRecExpense"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ═══════════ DAILY (รายการทั้งหมด) – with subtabs ═══════════ -->
    <div class="tab-content" id="tab-daily">
      <div class="page-inner" style="padding-top:14px">

        <div class="page-header">
          <div>
            <div style="display:flex;align-items:center;gap:var(--gap-item);margin-bottom:4px;">
              <div class="page-icon" style="background:linear-gradient(135deg,var(--purple),var(--purple-mid));">
                <i data-lucide="list" style="width:20px;height:20px;color:white;"></i>
              </div>
              <h1 style="font-size:22px;font-weight:800;color:var(--text);">รายการทั้งหมด</h1>
            </div>
            <p style="font-size:13px;color:var(--text2);padding-left:50px;">รายรับ – รายจ่าย แบ่งตามวัน</p>
          </div>
          <button class="btn btn-primary" onclick="goToDailyEntry()">+ เพิ่มรายการ</button>
        </div>

        <!-- Sub Tab Bar -->
        <div class="sub-tab-bar purple" id="fcDailySubtabBar">
          <button class="sub-tab active" data-tab="all"><i data-lucide="list" style="width:14px;height:14px;"></i> ทุกรายการ</button>
          <button class="sub-tab" data-tab="income"><i data-lucide="trending-up" style="width:14px;height:14px;"></i> รายรับ</button>
          <button class="sub-tab" data-tab="expense"><i data-lucide="trending-down" style="width:14px;height:14px;"></i> รายจ่าย</button>
        </div>

        <!-- Summary bar -->
        <div class="sum-bar" id="sumBar"></div>

        <!-- Filters -->
        <div class="filter-row">
          <select id="filterMonth" style="width:180px" onchange="renderDaily()">
            <option value="">ทุกเดือน</option>
          </select>
          <input type="text" id="filterSearch" placeholder="ค้นหารายการ..." style="flex:1;min-width:160px" oninput="renderDaily()">
        </div>

        <!-- Monthly Chart (แสดงเมื่อเลือกเดือน) -->
        <div id="monthlyChartWrap" style="display:none;margin-bottom:var(--gap-section)">
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--gap-card);flex-wrap:wrap;gap:var(--gap-tight)">
              <div class="card-title" style="margin-bottom:0" id="monthlyChartTitle">สรุปรายได้เดือนนี้</div>
              <div id="monthlyChartKpi" style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px"></div>
            </div>
            <div style="height:200px;position:relative"><canvas id="monthlyBarChart"></canvas></div>
          </div>
        </div>

        <div id="dailyList"></div>
      </div>
    </div>

    <!-- ═══════════ REPORT (รายงาน) – with subtabs ═══════════ -->
    <div class="tab-content" id="tab-report">
      <div class="page-inner" style="padding-top:14px">

        <div class="page-header">
          <div>
            <div style="display:flex;align-items:center;gap:var(--gap-item);margin-bottom:4px;">
              <div class="page-icon" style="background:linear-gradient(135deg,var(--purple),var(--purple-mid));">
                <i data-lucide="bar-chart-3" style="width:20px;height:20px;color:white;"></i>
              </div>
              <h1 style="font-size:22px;font-weight:800;color:var(--text);">รายงานสรุป</h1>
            </div>
            <p style="font-size:13px;color:var(--text2);padding-left:50px;">สถิติรายรับ–รายจ่าย แยกตามช่วงเวลา</p>
          </div>
        </div>

        <!-- Sub Tab Bar -->
        <div class="sub-tab-bar purple" id="fcReportSubtabBar">
          <button class="sub-tab active" id="subRptWeek" data-tab="week">รายสัปดาห์</button>
          <button class="sub-tab" id="subRptMonth" data-tab="month">รายเดือน</button>
          <button class="sub-tab" id="subRptCompare" data-tab="compare">เปรียบเทียบรายเดือน</button>
          <button class="sub-tab" id="subRptYear" data-tab="year">รายปี</button>
        </div>

        <!-- Panel: Weekly -->
        <div class="tab-pane active" data-panel="week" id="panelRptWeek">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--gap-item);margin-bottom:var(--gap-card)">
            <div style="font-size:12px;color:var(--text2)">แสดงข้อมูลย้อนหลัง 8 สัปดาห์ล่าสุด (จันทร์–อาทิตย์)</div>
            <div class="period-tabs" id="rptWeekNav">
              <button class="ptab active" onclick="setRptWeekRange(8,this)">8 สัปดาห์</button>
              <button class="ptab" onclick="setRptWeekRange(12,this)">12 สัปดาห์</button>
              <button class="ptab" onclick="setRptWeekRange(26,this)">26 สัปดาห์</button>
            </div>
          </div>
          <div class="kpi-grid" id="rptWeekKpi"></div>
          <div class="card" style="margin-bottom:var(--gap-section)">
            <div class="card-title">รายรับ – รายจ่ายรายสัปดาห์</div>
            <div class="chart-wrap"><canvas id="rptWeekChart"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">รายละเอียดรายสัปดาห์</div>
            <div class="tbl-wrap" id="rptWeekTable"></div>
          </div>
        </div>

        <!-- Panel: Monthly -->
        <div class="tab-pane" data-panel="month" id="panelRptMonth">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--gap-item);margin-bottom:var(--gap-card)">
            <div style="font-size:12px;color:var(--text2)">สถิติรายวันภายในเดือนที่เลือก</div>
            <select id="rptMonthSelect" style="width:180px" onchange="renderReportMonth()"></select>
          </div>
          <div class="kpi-grid" id="rptMonthKpi"></div>
          <div class="chart-grid" style="margin-bottom:var(--gap-section)">
            <div class="card">
              <div class="card-title">รายรับ – รายจ่ายรายวันในเดือน</div>
              <div class="chart-wrap"><canvas id="rptMonthChart"></canvas></div>
            </div>
            <div class="card">
              <div class="card-title">สัดส่วนรายรับแต่ละร้าน</div>
              <div style="display:flex;flex-wrap:wrap;gap:var(--gap-tight)">
                <div style="flex:1;min-width:130px"><div class="chart-wrap" style="height:190px"><canvas id="rptMonthDonut"></canvas></div></div>
                <div class="legend-list" id="rptMonthLegend" style="min-width:130px;justify-content:center;display:flex;flex-direction:column"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Panel: Compare Months -->
        <div class="tab-pane" data-panel="compare" id="panelRptCompare">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--gap-item);margin-bottom:var(--gap-card)">
            <div style="font-size:12px;color:var(--text2)">เปรียบเทียบยอดรวมของแต่ละเดือน (ทุกเดือนที่มีข้อมูล)</div>
          </div>
          <div class="kpi-grid" id="rptCompareKpi"></div>
          <div class="card" style="margin-bottom:var(--gap-section)">
            <div class="card-title">เปรียบเทียบรายรับ – รายจ่ายรายเดือน</div>
            <div class="chart-wrap"><canvas id="rptCompareChart"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">ตารางเปรียบเทียบรายเดือน</div>
            <div class="tbl-wrap" id="rptCompareTable"></div>
          </div>
        </div>

        <!-- Panel: Yearly -->
        <div class="tab-pane" data-panel="year" id="panelRptYear">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--gap-item);margin-bottom:var(--gap-card)">
            <div style="font-size:12px;color:var(--text2)">สรุปยอดรวมรายปี แยกตาม 12 เดือน</div>
            <select id="rptYearSelect" style="width:140px" onchange="renderReportYear()"></select>
          </div>
          <div class="kpi-grid" id="rptYearKpi"></div>
          <div class="card">
            <div class="card-title">รายรับ – รายจ่ายรายเดือนในปี</div>
            <div class="chart-wrap"><canvas id="rptYearChart"></canvas></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ═══════════ MANAGE (จัดการรายการ) – with subtabs ═══════════ -->
    <div class="tab-content" id="tab-manage">
      <div class="page-inner" style="padding-top:14px">

        <div class="page-header">
          <div>
            <div style="display:flex;align-items:center;gap:var(--gap-item);margin-bottom:4px;">
              <div class="page-icon" style="background:linear-gradient(135deg,var(--purple),var(--purple-mid));">
                <i data-lucide="settings-2" style="width:20px;height:20px;color:white;"></i>
              </div>
              <h1 style="font-size:22px;font-weight:800;color:var(--text);">จัดการรายการ</h1>
            </div>
            <p style="font-size:13px;color:var(--text2);padding-left:50px;">บันทึกรายวันและรายการประจำ</p>
          </div>
          <button class="btn btn-primary" onclick="goToDailyEntry()">+ เพิ่มรายการ</button>
        </div>

        <!-- Sub Tab Bar -->
        <div class="sub-tab-bar purple" id="fcManageSubtabBar">
          <button class="sub-tab active" id="subMgmtEntry" data-tab="entry">บันทึกรายวัน</button>
          <button class="sub-tab" id="subMgmtRec" data-tab="recurring">รายการประจำ</button>
          <button class="sub-tab" id="subMgmtAdd" data-tab="addnew">เพิ่มรายการประจำ</button>
        </div>

        <!-- Panel: Daily Entry -->
        <div class="tab-pane active" data-panel="entry" id="panelMgmtEntry">
          <div class="card" style="max-width:680px">
            <div class="form-group" style="margin-bottom:var(--gap-section)">
              <label>วันที่</label>
              <input type="date" id="entryDate">
            </div>

            <div style="display:flex;align-items:center;gap:var(--gap-tight);margin-bottom:12px">
              <span class="badge badge-in">ประจำ</span>
              <span style="font-size:14px;font-weight:800;color:var(--text)">รายรับประจำ</span>
            </div>
            <div id="entryRecIncome" style="display:flex;flex-direction:column;gap:var(--gap-item);margin-bottom:22px"></div>

            <div style="display:flex;align-items:center;gap:var(--gap-tight);margin-bottom:12px">
              <span class="badge" style="background:var(--green-lt);color:var(--green)">อื่นๆ</span>
              <span style="font-size:14px;font-weight:800;color:var(--text)">รายรับอื่นๆ</span>
            </div>
            <div id="entryExtraIncome" style="display:flex;flex-direction:column;gap:var(--gap-item);margin-bottom:10px"></div>
            <button class="upload-area" style="margin-bottom:22px;padding:12px;font-size:13px;font-weight:700;color:var(--text2)" onclick="addExtraEntryRow('income')">+ เพิ่มรายรับอื่นๆ</button>

            <div style="display:flex;align-items:center;gap:var(--gap-tight);margin-bottom:12px">
              <span class="badge badge-out">ประจำ</span>
              <span style="font-size:14px;font-weight:800;color:var(--text)">รายจ่ายประจำ</span>
            </div>
            <div id="entryRecExpense" style="display:flex;flex-direction:column;gap:var(--gap-item);margin-bottom:22px"></div>

            <div style="display:flex;align-items:center;gap:var(--gap-tight);margin-bottom:12px">
              <span class="badge" style="background:var(--red-lt);color:var(--red)">อื่นๆ</span>
              <span style="font-size:14px;font-weight:800;color:var(--text)">รายจ่ายอื่นๆ</span>
            </div>
            <div id="entryExtraExpense" style="display:flex;flex-direction:column;gap:var(--gap-item);margin-bottom:10px"></div>
            <button class="upload-area" style="margin-bottom:22px;padding:12px;font-size:13px;font-weight:700;color:var(--text2)" onclick="addExtraEntryRow('expense')">+ เพิ่มรายจ่ายอื่นๆ</button>

            <div class="sum-bar" id="entrySumBar" style="margin-bottom:0"></div>
            <div style="display:flex;justify-content:flex-end;margin-top:18px">
              <button class="btn btn-primary" onclick="saveDailyEntry()">บันทึกรายวัน</button>
            </div>
          </div>
        </div>

        <!-- Panel: Recurring -->
        <div class="tab-pane" data-panel="recurring" id="panelMgmtRecurring">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--gap-section);flex-wrap:wrap;gap:var(--gap-item)">
            <div>
              <div style="font-size:15px;font-weight:800;color:var(--text)">รายการประจำทั้งหมด</div>
              <div style="font-size:12px;color:var(--text2);margin-top:2px">คลิกที่รายการเพื่อแก้ไขหรือลบ</div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="fcManageSubtabs.activate('addnew')">+ เพิ่มรายการประจำ</button>
          </div>

          <div style="margin-bottom:var(--gap-card)">
            <div style="font-size:11px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%"></span>รายรับประจำ</div>
            <div class="manage-rec-grid" id="manageRecIncome"></div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%"></span>รายจ่ายประจำ</div>
            <div class="manage-rec-grid" id="manageRecExpense"></div>
          </div>
        </div>

        <!-- Panel: Add New Recurring -->
        <div class="tab-pane" data-panel="addnew" id="panelMgmtAddnew">
          <div class="card" style="max-width:560px">
            <div class="modal-title" style="margin-bottom:var(--gap-section)">เพิ่มรายการประจำใหม่</div>

            <div style="margin-bottom:var(--gap-card)">
              <label style="margin-bottom:var(--gap-tight);display:block">ประเภท</label>
              <div style="display:flex;gap:var(--gap-item)">
                <div class="modal-type-card active income" id="recCardIn" onclick="setRecType('income')">
                  <div class="type-ico">💰</div>
                  <div class="type-lbl">รายรับ</div>
                </div>
                <div class="modal-type-card expense" id="recCardOut" onclick="setRecType('expense')">
                  <div class="type-ico">💸</div>
                  <div class="type-lbl">รายจ่าย</div>
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>ชื่อรายการ</label>
                <input type="text" id="recName" placeholder="ชื่อรายการประจำ...">
              </div>
              <div class="form-group">
                <label>จำนวนเงินปกติ (0=ไม่แน่นอน)</label>
                <input type="number" id="recAmount" placeholder="0" min="0">
              </div>
            </div>
            <div class="form-group" style="margin-bottom:var(--gap-section)">
              <label>คำอธิบาย</label>
              <input type="text" id="recDesc" placeholder="รายละเอียดเพิ่มเติม...">
            </div>
            <div style="display:flex;justify-content:flex-end">
              <button class="btn btn-primary" onclick="saveRecurring()">บันทึก</button>
            </div>
          </div>
        </div>

      </div>
    </div>
</template>


<script src="js/foodcourt-admin.js"></script>
</body>
</html>

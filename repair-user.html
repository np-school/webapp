<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="var(--accent)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NP Origins">
  <link rel="icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}</script>

  <title>แจ้งซ่อม – โรงเรียนหนองกี่พิทยาคม</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="shared/styles-new.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@1.24.0"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  <script src="shared/firebase.js"></script>
  <script src="shared/common.js"></script>
  <style>
    
    /* ── หน้านี้เท่านั้น: การ์ดรายการแจ้งซ่อม + badge สถานะสี custom ── */
    .rp-card{ cursor:pointer; transition:box-shadow .15s, border-color .15s; margin-bottom:12px; }
    .rp-card:hover{ border-color:var(--accent-light); box-shadow:0 6px 18px rgba(15,23,42,.08); }
    .rp-status{ display:inline-flex; align-items:center; gap:5px; padding:3px 11px; border-radius:20px; font-size:11px; font-weight:800; flex-shrink:0; }
    /* .rp-status.c-* / .rp-photo-thumb / .rp-log-item / .rp-log-dot ย้ายไป styles-new.css แล้ว (เหมือนกับ repair-admin.html เป๊ะ) */
    .rp-cat-chip{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--text2); background:var(--bg-alt); padding:3px 10px; border-radius:20px; }
    .rp-urgent{ display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:800; color:var(--red-dark); background:var(--red-light); padding:2px 9px; border-radius:20px; }

    .rp-mini-wf{ display:flex; gap:3px; margin-top:12px; }
    .rp-mini-wf i{ flex:1; height:6px; border-radius:4px; background:var(--border); }
    .rp-mini-wf i.on{ background:var(--accent); }
    .rp-mini-wf i.bad{ background:var(--red); }

    /* .rp-photo-thumb .rm / .up เป็น variant เฉพาะหน้านี้ (repair-user มีปุ่มลบ/label upload บน thumbnail ที่ admin ไม่มี) */
    .rp-photo-thumb .rm{ position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%; background:rgba(15,23,42,.65); color:#fff; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .rp-photo-thumb .up{ position:absolute; inset:0; background:rgba(255,255,255,.85); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:var(--text2); text-align:center; padding:2px; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:#64748b;font-size:14px;font-weight:700;">กำลังตรวจสอบสิทธิ์...</p>
</div>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<div id="accessDenied" style="display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="width:72px;height:72px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;">
    <i data-lucide="shield-off" style="width:36px;height:36px;color:#dc2626;"></i>
  </div>
  <div style="text-align:center;">
    <h2 style="font-size:22px;font-weight:800;color:#1e293b;margin-bottom:8px;">ไม่มีสิทธิ์เข้าถึง</h2>
    <p style="color:#64748b;font-size:14px;">คุณไม่มีสิทธิ์เข้าหน้านี้</p>
  </div>
  <a href="index.html" style="padding:10px 24px;background:var(--accent);color:white;border-radius:12px;font-weight:700;text-decoration:none;">← กลับหน้าแรก</a>
</div>

<div id="myApp" style="display:none;"></div>

<button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTopContent()" title="ย้อนกลับด้านบน">
  <i data-lucide="arrow-up" style="width:20px;height:20px;"></i>
</button>

<!-- ══════════════════ Modal: แจ้งซ่อมใหม่ ══════════════════ -->
<div id="newReportModal" class="modal-bg">
  <div class="modal-box wide">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-title-icon" style="background:var(--amber-light);">
          <i data-lucide="wrench" style="color:var(--amber);"></i>
        </div>
        <div>
          <h3 id="frModalTitle">แจ้งซ่อมใหม่</h3>
          <p id="frModalSub">กรอกรายละเอียดจุดที่ชำรุดให้ครบถ้วน</p>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal('newReportModal')"><i data-lucide="x"></i></button>
    </div>

    <div class="form-group">
      <label class="form-label">ชื่อผู้แจ้ง *</label>
      <input type="text" id="frName" placeholder="ชื่อ-นามสกุล">
      <div id="frNameHint" style="font-size:11px;color:var(--text3);margin-top:4px;display:none;">
        <i data-lucide="check-circle-2" style="width:11px;height:11px;vertical-align:-1px;"></i> ดึงจากข้อมูลบุคลากรอัตโนมัติ
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">เบอร์โทรผู้แจ้ง *</label>
      <input type="tel" id="frPhone" placeholder="เช่น 081-234-5678" inputmode="tel">
      <div id="frPhoneHint" style="font-size:11px;color:var(--text3);margin-top:4px;display:none;">
        <i data-lucide="check-circle-2" style="width:11px;height:11px;vertical-align:-1px;"></i> ดึงจากข้อมูลบุคลากรอัตโนมัติ
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">หมวดหมู่ *</label>
      <select id="frCategory"></select>
    </div>

    <div class="form-group">
      <label class="form-label">ระดับความเร่งด่วน</label>
      <div class="segmented" id="frPriority">
        <label><input type="radio" name="frPriority" value="normal" checked> <i data-lucide="clock"></i> ปกติ</label>
        <label><input type="radio" name="frPriority" value="urgent"> <i data-lucide="alert-triangle"></i> เร่งด่วน</label>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">อาคาร *</label>
      <select id="frBuilding" onchange="onBuildingChange()"></select>
    </div>

    <div class="form-group">
      <label class="form-label">ห้อง / บริเวณ *</label>
      <input type="text" id="frSubLocation" list="frSubLocationList" placeholder="เช่น ชั้น 3 ห้อง 231 (พิมพ์ใหม่ได้ถ้ายังไม่มีในลิสต์)">
      <datalist id="frSubLocationList"></datalist>
    </div>

    <div class="form-group">
      <label class="form-label">หัวข้อ / สิ่งที่ชำรุด *</label>
      <input type="text" id="frTitle" placeholder="เช่น เครื่องปรับอากาศไม่เย็น">
    </div>

    <div class="form-group">
      <label class="form-label">รายละเอียดเพิ่มเติม *</label>
      <textarea id="frDescription" rows="4" placeholder="อธิบายอาการ/ความเสียหายที่พบ"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">แนบภาพถ่าย (ไม่เกิน 5 รูป)</label>
      <div class="upload-area" id="frUploadArea" onclick="document.getElementById('frFileInput').click()">
        <i data-lucide="image-plus" style="width:26px;height:26px;color:var(--blue);margin-bottom:6px;"></i>
        <div style="font-size:12.5px;font-weight:700;color:var(--text2);">แตะเพื่อเลือกรูปภาพ</div>
        <div style="font-size:10.5px;color:var(--text3);margin-top:2px;">ไฟล์จะถูกอัปโหลดเก็บไว้ใน Google Drive ของโรงเรียน</div>
      </div>
      <input type="file" id="frFileInput" accept="image/*" multiple style="display:none;" onchange="handlePhotoSelect(this.files)">
      <div id="frPhotoList" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;"></div>
    </div>

    <div style="display:flex;gap:10px;margin-top:22px;">
      <button class="btn-secondary" style="flex:1;" onclick="closeModal('newReportModal')">ยกเลิก</button>
      <button class="btn-primary amber" style="flex:1;justify-content:center;" id="frSubmitBtn" onclick="submitReport()">
        <i data-lucide="send" style="width:15px;height:15px;"></i> ส่งเรื่องแจ้งซ่อม
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════ Modal: รายละเอียด / ตรวจสอบงาน ══════════════════ -->
<div id="detailModal" class="modal-bg">
  <div class="modal-box wide" id="detailModalBody"></div>
</div>

<script src="js/repair-user.js"></script>
</body>
</html>

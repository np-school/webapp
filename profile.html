<head>

  <style>
    *{font-family:'Sarabun',sans-serif;box-sizing:border-box;margin:0;padding:0;}
    #loadingOverlay{display:flex;position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
    .spinner{border:3px solid #e2e8f0;border-top:3px solid #1d4ed8;border-radius:50%;width:48px;height:48px;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Sidebar */
    .sidebar-wrap{width:272px;flex-shrink:0;transition:transform .3s ease;}
    .sidebar-inner{background:#f8fafc;border-right:1px solid #e2e8f0;min-height:calc(100vh - 73px);padding:20px 12px;display:flex;flex-direction:column;}
    .sidebar-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:14px;font-weight:700;color:#64748b;width:100%;background:none;border:none;cursor:pointer;text-decoration:none;transition:all .2s;font-size:14px;white-space:nowrap;}
    .sidebar-btn:hover{background:#f1f5f9;}
    .sidebar-btn.active{background:#1d4ed8;color:white;box-shadow:0 8px 15px -3px rgba(30,64,175,.25);}
    .sidebar-btn.admin-btn{color:#7c3aed;}
    .sidebar-btn.admin-btn:hover{background:#faf5ff;}
    .sec-label{padding:14px 16px 8px;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:2px;}
    #sidebarOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;}
    #sidebarOverlay.open{display:block;}
    @media(max-width:1023px){
      .sidebar-wrap{position:fixed;top:0;left:0;height:100vh;z-index:200;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.12);}
      .sidebar-wrap.open{transform:translateX(0);}
    }
    @media(min-width:1024px){#hamburgerBtn{display:none!important;}.sidebar-inner{border-right:none;}}

    /* Hero */
    .profile-hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 55%,#2563eb 100%);border-radius:24px;padding:0;position:relative;overflow:hidden;margin-bottom:28px;}
    .hero-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:22px 22px;}
    .hero-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,.18) 0%,transparent 70%);top:-100px;right:-80px;}
    .hero-body{position:relative;z-index:1;padding:32px 32px 28px;display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;}
    .avatar-ring{width:88px;height:88px;border-radius:50%;border:3px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .avatar-ring img{width:100%;height:100%;object-fit:cover;}
    .avatar-initials{font-size:28px;font-weight:800;color:rgba(255,255,255,.85);}
    .hero-stat{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 16px;min-width:80px;text-align:center;}
    .hero-stat-val{font-size:22px;font-weight:800;color:white;line-height:1;}
    .hero-stat-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);margin-top:3px;}

    /* Progress ring */
    .ring-wrap{position:relative;width:76px;height:76px;flex-shrink:0;}
    .ring-wrap svg{transform:rotate(-90deg);}
    .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .ring-pct{font-size:15px;font-weight:800;color:white;line-height:1;}
    .ring-sub{font-size:9px;color:rgba(255,255,255,.55);font-weight:600;}

    /* Semester blocks */
    .sem-block{background:white;border-radius:18px;border:1.5px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.04);overflow:hidden;margin-bottom:14px;}
    .sem-block:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);}
    .sem-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none;}
    .sem-badge{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:white;font-size:12px;font-weight:800;padding:5px 13px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
    .sem-badge.sem2{background:linear-gradient(135deg,#7c3aed,#a855f7);}
    .sem-progress-bar{flex:1;background:#f1f5f9;border-radius:6px;height:7px;overflow:hidden;}
    .sem-progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#1d4ed8,#3b82f6);transition:width .6s ease;}
    .sem-progress-fill.purple{background:linear-gradient(90deg,#7c3aed,#a855f7);}
    .sem-count{font-size:12px;font-weight:700;color:#64748b;white-space:nowrap;}
    .sem-chevron{color:#94a3b8;transition:transform .3s;flex-shrink:0;}
    .sem-block.open .sem-chevron{transform:rotate(180deg);}
    .sem-body{display:none;border-top:1px solid #f1f5f9;}
    .sem-block.open .sem-body{display:block;}

    /* dept header */
    .dept-header{display:flex;align-items:center;gap:10px;padding:16px 20px 8px;}
    .dept-divider{flex:1;height:1px;background:#f1f5f9;}

    /* doc group card */
    .doc-group{margin:0 16px 12px;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden;background:white;}
    .doc-group-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #f1f5f9;}
    .doc-icon-box{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .doc-group-title{font-size:14px;font-weight:800;color:#0f172a;flex:1;}

    /* course sub-rows */
    .course-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f8fafc;}
    .course-row:last-child{border-bottom:none;}
    .course-code{font-size:11px;font-weight:800;color:#1d4ed8;background:#eff6ff;padding:2px 8px;border-radius:6px;flex-shrink:0;}
    .course-name{font-size:12px;font-weight:600;color:#334155;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .file-count{font-size:10px;font-weight:700;color:#64748b;background:#f1f5f9;padding:2px 7px;border-radius:6px;flex-shrink:0;}

    /* status badge */
    .s-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;}
    .s-submitted     {background:#dcfce7;color:#15803d;}
    .s-head_reviewed {background:#e0f2fe;color:#0369a1;}
    .s-reviewed      {background:#dbeafe;color:#1e40af;}
    .s-assistant_reviewed{background:#fef3c7;color:#92400e;}
    .s-deputy_reviewed{background:#ede9fe;color:#6d28d9;}
    .s-final_approved{background:#d1fae5;color:#065f46;}
    .s-revision      {background:#fef9c3;color:#92400e;}
    .s-none          {background:#f1f5f9;color:#94a3b8;}

    /* admin note */
    .admin-note{font-size:11px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:4px 9px;margin-top:4px;}

    /* summary strip */
    .sum-strip{display:flex;gap:0;background:#f8fafc;border-top:1px solid #f1f5f9;}
    .sum-item{flex:1;text-align:center;padding:10px 6px;border-right:1px solid #f1f5f9;}
    .sum-item:last-child{border-right:none;}
    .sum-val{font-size:18px;font-weight:800;line-height:1;}
    .sum-lbl{font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}

    /* empty */
    .empty-block{text-align:center;padding:28px 20px;color:#94a3b8;font-size:13px;font-weight:600;}

    @media(max-width:640px){
      .hero-body{padding:22px 16px 18px;gap:14px;}
      .avatar-ring{width:68px;height:68px;}
      .avatar-initials{font-size:22px;}
    }
  </style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════
   profile.html – ดึงข้อมูลจาก portfolio_submissions จริง
   collection: portfolio_submissions
   fields: uid, yearSem (e.g. "2567_1"), docTypeId,
           courseCode, courseName, status, files[], note, adminNote
   ═══════════════════════════════════════════════════════════ */

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* DOCUMENT_TYPES fallback (จะถูก override จาก Firestore) */
var DOCUMENT_TYPES = [
  {id:'syllabus',         label:'Course Syllabus',                  icon:'file-text',  color:'#3b82f6', bg:'#eff6ff', department:'academic'},
  {id:'lesson_plan',      label:'แผนการจัดการเรียนรู้',             icon:'book-open',  color:'#8b5cf6', bg:'#f5f3ff', department:'academic'},
  {id:'sufficiency',      label:'แผนเศรษฐกิจพอเพียง',              icon:'leaf',       color:'#22c55e', bg:'#f0fdf4', department:'academic'},
  {id:'royal_policy',     label:'แผนพระบรมราโชบาย',                icon:'crown',      color:'#f59e0b', bg:'#fffbeb', department:'academic'},
  {id:'competency',       label:'แผนสมรรถนะ',                      icon:'zap',        color:'#ec4899', bg:'#fdf2f8', department:'academic'},
  {id:'research',         label:'รายงานวิจัยในชั้นเรียน',           icon:'microscope', color:'#06b6d4', bg:'#ecfeff', department:'academic'},
  {id:'student_analysis', label:'รายงานวิเคราะห์ผู้เรียนรายบุคคล', icon:'users',      color:'#f97316', bg:'#fff7ed', department:'academic'},
  {id:'media_register',   label:'ทะเบียนสื่อ',                     icon:'library',    color:'#6366f1', bg:'#eef2ff', department:'academic'},
  {id:'student_work',     label:'ผลงานนักเรียน',                    icon:'star',       color:'#eab308', bg:'#fefce8', department:'academic'},
];
var DEPARTMENTS = [
  {id:'academic',  label:'ฝ่ายวิชาการ',        icon:'graduation-cap', color:'#1d4ed8', bg:'#eff6ff'},
  {id:'budget',    label:'ฝ่ายงบประมาณ',       icon:'banknote',       color:'#16a34a', bg:'#f0fdf4'},
  {id:'personnel', label:'ฝ่ายบริหารงานบุคคล',icon:'users',          color:'#7c3aed', bg:'#f5f3ff'},
  {id:'general',   label:'ฝ่ายบริหารทั่วไป',  icon:'building-2',     color:'#ea580c', bg:'#fff7ed'},
];
var STATUS_LABEL = {
  submitted:'ส่งแล้ว', head_reviewed:'หัวหน้าฯ ตรวจ',
  reviewed:'หัวหน้าฯ ตรวจ', assistant_reviewed:'ผช.ผอ. ตรวจ',
  deputy_reviewed:'รอง ผอ. ตรวจ', final_approved:'ผอ.อนุมัติ', revision:'แก้ไข'
};
function colorToBg(hex){ return (hex||'#7c3aed')+'15'; }

/* globals */
var currentUser  = null;
var currentStaff = null;
var allSemData   = []; /* [{yearSem,year,sem,docs:{docTypeId:[subDocs]}}] */

/* ── AUTH ── */
auth.onAuthStateChanged(function(u){
  if(!u){
    document.getElementById('loadingOverlay').style.display='none';
    document.getElementById('loginGate').style.display='flex';
    lucide.createIcons(); return;
  }
  document.getElementById('loginGate').style.display='none';
  currentUser = u;
  init();
});

function init(){
  if(typeof buildNavbar  === 'function') buildNavbar('ข้อมูลบุคลากร', false);
  if(typeof updateNavUser=== 'function') updateNavUser(currentUser);
  if(typeof buildSidebar === 'function') buildSidebar('profile');
  if(typeof checkAdminAccess==='function') checkAdminAccess(currentUser.email);

  /* โหลด staff + doc_types พร้อมกัน แล้วค่อย loadSubmissions */
  var staffPromise = db.collection('staff')
    .where('email','==', currentUser.email.toLowerCase()).limit(1).get()
    .then(function(snap){
      currentStaff = snap.empty ? null : snap.docs[0].data();
      fillHeroStatic();
    }).catch(function(){ fillHeroStatic(); });

  var dtPromise = db.collection('portfolio_doc_types')
    .orderBy('order').get()
    .then(function(snap){
      if(!snap.empty){
        var list=[];
        snap.forEach(function(d){
          var data=d.data();
          if(data.active===false) return;
          list.push({
            id: data.id||d.id, label:data.label||'', short:data.short||'',
            icon:data.icon||'file', color:data.color||'#7c3aed',
            bg: colorToBg(data.color), department:data.department||'academic'
          });
        });
        if(list.length) DOCUMENT_TYPES=list;
      }
    }).catch(function(){/* use fallback */});

  Promise.all([staffPromise, dtPromise]).then(function(){
    loadSubmissions();
  });
}

/* ── Fill static hero parts ── */
function fillHeroStatic(){
  var name = (currentStaff && currentStaff.name) || currentUser.displayName || currentUser.email;
  document.getElementById('profileName').textContent     = name;
  document.getElementById('profileEmail').textContent    = currentUser.email;
  document.getElementById('profilePosition').textContent = (currentStaff && currentStaff.position) || '';
  document.getElementById('profileGroup').textContent    = (currentStaff && currentStaff.group)    || '';
  setAvatar((currentStaff && currentStaff.photoURL) || currentUser.photoURL, name);
  document.getElementById('mainApp').style.display='block';
  lucide.createIcons();
}

function setAvatar(url,name){
  var wrap=document.getElementById('avatarWrap');
  if(url){
    var img=document.createElement('img');
    img.src=url;
    img.onerror=function(){ setInitials(wrap,name); };
    wrap.innerHTML=''; wrap.appendChild(img);
  } else { setInitials(wrap,name); }
}
function setInitials(wrap,name){
  var ini=(String(name||'?')).split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase()||'?';
  wrap.innerHTML='<span class="avatar-initials">'+ini+'</span>';
}

/* ── Load all submissions for this user ── */
function loadSubmissions(){
  db.collection('portfolio_submissions')
    .where('uid','==', currentUser.uid)
    .get()
    .then(function(snap){
      buildSemData(snap.docs);
    })
    .catch(function(e){
      console.error('portfolio_submissions query error:', e);
      /* Firestore index อาจยังไม่มี — fallback: query แบบ orderBy เดียว */
      db.collection('portfolio_submissions')
        .where('uid','==', currentUser.uid)
        .get()
        .then(function(snap){ buildSemData(snap.docs); })
        .catch(function(e2){
          console.error(e2);
          finishRender();
        });
    });
}

/* ── Group docs by yearSem → docTypeId ── */
function buildSemData(docs){
  var map={};
  docs.forEach(function(d){
    if(!d.exists) return;
    var data=d.data();
    var ys = data.yearSem || '';
    if(!ys) return;
    if(!map[ys]) map[ys]={ yearSem:ys, docs:{} };
    var dtId = data.docTypeId || '';
    if(!dtId) return;
    if(!map[ys].docs[dtId]) map[ys].docs[dtId]=[];
    map[ys].docs[dtId].push(Object.assign({_id:d.id}, data));
  });

  /* sort yearSem desc */
  allSemData = Object.values(map).sort(function(a,b){
    return b.yearSem.localeCompare(a.yearSem);
  });

  /* parse year/sem numbers */
  allSemData.forEach(function(s){
    var parts=s.yearSem.split('_');
    s.year = parseInt(parts[0])||0;
    s.sem  = parseInt(parts[1])||0;
  });

  finishRender();
}

/* ── Compute stats & render ── */
function finishRender(){
  computeStats();
  renderSemList(allSemData);
  document.getElementById('loadingOverlay').style.display='none';
  lucide.createIcons();
}

function computeStats(){
  var totalSubs=0, approved=0;
  allSemData.forEach(function(s){
    Object.values(s.docs).forEach(function(courses){
      totalSubs += courses.length;
      courses.forEach(function(c){
        if((c.status||'')==='final_approved') approved++;
      });
    });
  });
  document.getElementById('statSems').textContent     = allSemData.length || '–';
  document.getElementById('statSubmitted').textContent= totalSubs || '–';
  document.getElementById('statApproved').textContent = approved  || '–';

  if(totalSubs>0){
    document.getElementById('ringWrap').style.display='flex';
    var pct = Math.round(approved/totalSubs*100);
    document.getElementById('ringPct').textContent=pct+'%';
    var circ=188.5, offset=circ-(pct/100*circ);
    setTimeout(function(){ document.getElementById('ringCircle').style.strokeDashoffset=offset; },150);
  }
}

/* ── Render semester accordion list ── */
function renderSemList(data){
  var container=document.getElementById('semList');
  if(!data||!data.length){
    container.innerHTML='<div style="text-align:center;padding:56px 20px;background:white;border-radius:18px;border:1.5px solid #e2e8f0;">' +
      '<div style="font-size:38px;margin-bottom:14px;">📂</div>' +
      '<div style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:6px;">ยังไม่มีข้อมูลการส่งงาน</div>' +
      '<div style="font-size:13px;color:#94a3b8;">ข้อมูลจะแสดงเมื่อมีการส่งงานในระบบ</div></div>';
    return;
  }
  container.innerHTML='';
  data.forEach(function(sem,idx){
    container.appendChild(buildSemBlock(sem, idx===0));
  });
  lucide.createIcons();
}

function buildSemBlock(sem, openByDefault){
  /* count submitted entries */
  var allCourses=[];
  Object.values(sem.docs).forEach(function(arr){ arr.forEach(function(c){ allCourses.push(c); }); });
  var total=allCourses.length;
  var done=allCourses.filter(function(c){ return c.status && c.status!=='none'; }).length;
  var pct=total?Math.round(done/total*100):0;
  var isSem2=sem.sem===2;

  var block=document.createElement('div');
  block.className='sem-block'+(openByDefault?' open':'');

  /* summary counts */
  var statusCounts={};
  allCourses.forEach(function(c){
    var st=c.status||'submitted';
    statusCounts[st]=(statusCounts[st]||0)+1;
  });
  var sumItems=[
    {key:'submitted',key2:'head_reviewed|reviewed',lbl:'ส่งแล้ว',          color:'#15803d'},
    {key:'head_reviewed',                           lbl:'หัวหน้าตรวจ',     color:'#0369a1'},
    {key:'reviewed',                                lbl:'ตรวจแล้ว',        color:'#1e40af'},
    {key:'assistant_reviewed',                      lbl:'ผช.ผอ.ตรวจ',      color:'#92400e'},
    {key:'deputy_reviewed',                         lbl:'รอง ผอ.ตรวจ',     color:'#6d28d9'},
    {key:'final_approved',                          lbl:'อนุมัติ',         color:'#065f46'},
    {key:'revision',                                lbl:'แก้ไข',           color:'#dc2626'},
  ].filter(function(i){ return (statusCounts[i.key]||0)>0; });

  var sumHtml='';
  if(sumItems.length){
    sumHtml='<div class="sum-strip">';
    sumItems.forEach(function(i){
      sumHtml+='<div class="sum-item">' +
        '<div class="sum-val" style="color:'+i.color+'">'+(statusCounts[i.key]||0)+'</div>' +
        '<div class="sum-lbl">'+i.lbl+'</div></div>';
    });
    sumHtml+='</div>';
  }

  block.innerHTML=
    '<div class="sem-header" onclick="this.parentElement.classList.toggle(\'open\')">' +
      '<span class="sem-badge'+(isSem2?' sem2':'')+'">ภาค '+sem.sem+' / '+sem.year+'</span>' +
      '<div class="sem-progress-bar"><div class="sem-progress-fill'+(isSem2?' purple':'')+'" style="width:'+pct+'%"></div></div>' +
      '<span class="sem-count">'+total+' รายวิชา</span>' +
      '<i data-lucide="chevron-down" class="sem-chevron" style="width:16px;height:16px;"></i>' +
    '</div>' +
    '<div class="sem-body">' +
      sumHtml +
      buildDeptSections(sem) +
    '</div>';

  return block;
}

/* ── Build department sections inside a semester ── */
function buildDeptSections(sem){
  var html='';
  DEPARTMENTS.forEach(function(dep){
    var dtInDep = DOCUMENT_TYPES.filter(function(dt){ return dt.department===dep.id; });
    var hasAny  = dtInDep.some(function(dt){ return (sem.docs[dt.id]||[]).length>0; });
    if(!hasAny) return;

    html+='<div class="dept-header">' +
      '<div style="width:28px;height:28px;border-radius:8px;background:'+dep.bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">' +
        '<i data-lucide="'+dep.icon+'" style="width:14px;height:14px;color:'+dep.color+';"></i>' +
      '</div>' +
      '<span style="font-size:13px;font-weight:800;color:#0f172a;">'+dep.label+'</span>' +
      '<div class="dept-divider"></div>' +
    '</div>';

    dtInDep.forEach(function(dt){
      var courses = sem.docs[dt.id] || [];
      if(!courses.length) return;
      html += buildDocGroup(dt, courses);
    });
  });

  /* doc types ที่ไม่มี department match */
  var unmapped=[];
  Object.keys(sem.docs).forEach(function(dtId){
    var found=DOCUMENT_TYPES.find(function(x){ return x.id===dtId; });
    if(!found) unmapped.push({id:dtId, label:dtId, icon:'file', color:'#64748b', bg:'#f8fafc', department:'other'});
  });
  unmapped.forEach(function(dt){
    var courses=sem.docs[dt.id]||[];
    if(!courses.length) return;
    html+=buildDocGroup(dt, courses);
  });

  if(!html) html='<div class="empty-block">ยังไม่มีการส่งงานในภาคเรียนนี้</div>';
  return '<div style="padding:0 0 12px;">'+html+'</div>';
}

function buildDocGroup(dt, courses){
  /* aggregate status */
  var anyRevision = courses.some(function(c){ return (c.status||'')==='revision'; });
  var allFinal    = courses.every(function(c){ return (c.status||'')==='final_approved'; });
  var allReviewed = courses.every(function(c){
    return ['head_reviewed','reviewed','assistant_reviewed','deputy_reviewed','final_approved'].indexOf(c.status||'submitted')>=0;
  });
  var groupBadge, groupBadgeClass;
  if(anyRevision){  groupBadge='มีรายวิชาแก้ไข'; groupBadgeClass='s-revision'; }
  else if(allFinal){ groupBadge='ผอ.อนุมัติครบ'; groupBadgeClass='s-final_approved'; }
  else if(allReviewed){ groupBadge='อยู่ระหว่างตรวจ'; groupBadgeClass='s-reviewed'; }
  else { groupBadge='ส่งแล้ว '+courses.length+' วิชา'; groupBadgeClass='s-submitted'; }

  var borderLeft = anyRevision ? '#f59e0b' : allFinal ? '#7c3aed' : '#22c55e';

  var courseRows='';
  courses.forEach(function(c){
    var st   = c.status||'submitted';
    var stLbl= STATUS_LABEL[st]||st;
    var files= c.files||[];
    courseRows+=
      '<div class="course-row">' +
        (c.courseCode ? '<span class="course-code">'+esc(c.courseCode)+'</span>' : '') +
        '<span class="course-name">'+esc(c.courseName||c.courseCode||'—')+'</span>' +
        '<span class="file-count">'+files.length+' ไฟล์</span>' +
        '<span class="s-badge s-'+st+'">'+stLbl+'</span>' +
      '</div>' +
      (c.adminNote && st==='revision' ?
        '<div style="padding:0 14px 8px;"><div class="admin-note">💬 '+esc(c.adminNote)+'</div></div>' : '');
  });

  return '<div class="doc-group" style="border-left:3px solid '+borderLeft+';">' +
    '<div class="doc-group-header">' +
      '<div class="doc-icon-box" style="background:'+dt.bg+';">' +
        '<i data-lucide="'+dt.icon+'" style="width:18px;height:18px;color:'+dt.color+';"></i>' +
      '</div>' +
      '<span class="doc-group-title">'+esc(dt.label)+'</span>' +
      '<span class="s-badge '+groupBadgeClass+'">'+groupBadge+'</span>' +
    '</div>' +
    courseRows +
  '</div>';
}

/* ── Filter ── */
function applyFilter(){
  var val=document.getElementById('filterStatus').value;
  if(val==='all'){ renderSemList(allSemData); return; }
  var filtered=allSemData.filter(function(sem){
    return Object.values(sem.docs).some(function(courses){
      return courses.some(function(c){ return (c.status||'submitted')===val; });
    });
  });
  renderSemList(filtered);
}
</script>

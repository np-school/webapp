<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="var(--accent)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NP Origins">
  <link rel="icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(e){console.warn('SW:',e);});}</script>
  <script>
    /* ใส่ embed-mode ก่อน paint เพื่อป้องกัน flash of navbar/sidebar */
    if(new URLSearchParams(location.search).get('embed')==='1'){
      document.documentElement.classList.add('embed-mode');
      /* ใช้ documentElement ก่อน body render เสร็จ แล้วย้ายไป body ตอน DOMContentLoaded */
      document.addEventListener('DOMContentLoaded',function(){
        document.body.classList.add('embed-mode');
        document.documentElement.classList.remove('embed-mode');
      });
    }
  </script>
  <title>โปรไฟล์บุคลากร – โรงเรียนหนองกี่พิทยาคม</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="shared/tailwind-built.css" rel="stylesheet">
  <link href="shared/styles-new.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@1.24.0"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  <script src="shared/firebase.js"></script>
  <script src="shared/common.js"></script>
  <style>
        body.embed-mode .scroll-top-btn { display: none !important; }

    /* ── Embed mode: ซ่อน chrome ทั้งหมดเมื่อโหลดใน iframe ── */
    body.embed-mode #loadingOverlay { display: none !important; }
    body.embed-mode #viewModeBar    { display: none !important; }
    body.embed-mode { background: white; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    body.embed-mode #profileApp     { padding: 16px 14px !important; }
    html.embed-mode * { visibility: hidden; }

    /* Hero */
    .profile-hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 55%,#2563eb 100%);border-radius:24px;padding:0;position:relative;overflow:hidden;margin-bottom:28px;}
    .hero-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:22px 22px;}
    .hero-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,.18) 0%,transparent 70%);top:-100px;right:-80px;}
    .hero-body{position:relative;z-index:1;padding:32px 32px 28px;display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;}
    .avatar-ring{width:88px;height:88px;border-radius:50%;border:3px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .avatar-ring img{width:100%;height:100%;object-fit:cover;}
    .avatar-initials{font-size:28px;font-weight:800;color:rgba(255,255,255,.85);}
    .hero-stat{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 12px;min-width:72px;text-align:center;}
    .hero-stat-val{font-size:22px;font-weight:800;color:white;line-height:1;}
    .hero-stat-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);margin-top:3px;}

    /* Progress ring */
    .ring-wrap{position:relative;width:76px;height:76px;flex-shrink:0;}
    .ring-wrap svg{transform:rotate(-90deg);}
    .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .ring-pct{font-size:15px;font-weight:800;color:white;line-height:1;}
    .ring-sub{font-size:9px;color:rgba(255,255,255,.55);font-weight:600;}

    /* Semester blocks */
    .sem-block{background:white;border-radius:18px;border:1.5px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.04);overflow:hidden;margin-bottom:14px;}
    .sem-block:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);}
    .sem-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none;}
    .sem-badge{background:linear-gradient(135deg,var(--accent),#3b82f6);color:white;font-size:12px;font-weight:800;padding:5px 13px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
    .sem-badge.sem2{background:linear-gradient(135deg,#7c3aed,#a855f7);}
    .sem-progress-bar{flex:1;background:#f1f5f9;border-radius:6px;height:7px;overflow:hidden;}
    .sem-progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),#3b82f6);transition:width .6s ease;}
    .sem-progress-fill.purple{background:linear-gradient(90deg,#7c3aed,#a855f7);}
    .sem-count{font-size:12px;font-weight:700;color:#64748b;white-space:nowrap;}
    .sem-chevron{color:#94a3b8;transition:transform .3s;flex-shrink:0;}
    .sem-block.open .sem-chevron{transform:rotate(180deg);}
    .sem-body{display:none;border-top:1px solid #f1f5f9;}
    .sem-block.open .sem-body{display:block;}

    /* dept header */
    .dept-header{display:flex;align-items:center;gap:10px;padding:16px 20px 8px;}
    .dept-divider{flex:1;height:1px;background:#f1f5f9;}

    /* doc group card */
    .doc-group{margin:0 16px 12px;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden;background:white;}
    .doc-group-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #f1f5f9;}
    .doc-icon-box{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .doc-group-title{font-size:14px;font-weight:800;color:#0f172a;flex:1;}

    /* course sub-rows */
    .course-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f8fafc;}
    .course-row:last-child{border-bottom:none;}
    .course-code{font-size:11px;font-weight:800;color:var(--accent);background:var(--accent-tint);padding:2px 8px;border-radius:6px;flex-shrink:0;}
    .course-name{font-size:12px;font-weight:600;color:#334155;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .file-count{font-size:10px;font-weight:700;color:#64748b;background:#f1f5f9;padding:2px 7px;border-radius:6px;flex-shrink:0;}

    /* status badge */
    .s-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;}
    .s-submitted     {background:#dcfce7;color:#15803d;}
    .s-head_reviewed {background:#e0f2fe;color:#0369a1;}
    .s-reviewed      {background:#dbeafe;color:var(--accent-dark);}
    .s-assistant_reviewed{background:#fef3c7;color:#92400e;}
    .s-deputy_reviewed{background:#ede9fe;color:#6d28d9;}
    .s-final_approved{background:#d1fae5;color:#065f46;}
    .s-revision      {background:#fef9c3;color:#92400e;}
    .s-none          {background:#f1f5f9;color:#94a3b8;}

    /* admin note */
    .admin-note{font-size:11px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:4px 9px;margin-top:4px;}

    /* summary strip */
    .sum-strip{display:flex;gap:0;background:#f8fafc;border-top:1px solid #f1f5f9;}
    .sum-item{flex:1;text-align:center;padding:10px 6px;border-right:1px solid #f1f5f9;}
    .sum-item:last-child{border-right:none;}
    .sum-val{font-size:18px;font-weight:800;line-height:1;}
    .sum-lbl{font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}

    /* empty */
    .empty-block{text-align:center;padding:28px 20px;color:#94a3b8;font-size:13px;font-weight:600;}

    @media(max-width:640px){
      .hero-body{padding:22px 16px 18px;gap:14px;}
      .avatar-ring{width:68px;height:68px;}
      .avatar-initials{font-size:22px;}
    }
    @media(max-width:639px){
      /* Teaching table: hide column headers, stack rows */
      .teach-header-row{display:none!important;}
      .teach-row{flex-wrap:wrap;padding:12px 14px;gap:6px;}
      .teach-code{order:1;}
      .teach-level{order:2;}
      .teach-name{order:3;flex:0 0 100%;white-space:normal;font-size:13px;}
      .teach-periods{order:4;margin-left:auto;}
      /* Duty items */
      .duty-item{padding:10px 14px;}
      /* Dev / Media items */
      .dev-item,.media-item{padding:12px 14px;}
      /* info-val font */
      .info-val{font-size:13px;}
      /* info-grid full-col override for grid-column:1/-1 stays */
      .info-grid > .info-field[style*="grid-column"]{grid-column:1/-1!important;}
    }

    /* ── Subtabs: ใช้ class กลาง .sub-tab-bar.scroll/.sub-tab/.tab-pane จาก shared/styles-new.css แล้ว
       (เดิมประกาศ .subtab-bar/.subtab-btn/.subtab-panel ซ้ำที่นี่ ย้ายรวมไปที่กลางแล้ว) */

    /* ── Info form cards ── */
    .info-card{background:white;border-radius:16px;border:1.5px solid #e2e8f0;padding:22px 24px;margin-bottom:14px;}
    .info-card-title{font-size:14px;font-weight:800;color:#0f172a;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
    @media(max-width:639px){.info-grid{grid-template-columns:1fr!important;}}
    .info-field{display:flex;flex-direction:column;gap:5px;}
    .info-label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;}
    .info-val{font-size:14px;font-weight:600;color:#0f172a;background:#f8fafc;padding:9px 13px;border-radius:10px;min-height:38px;display:flex;align-items:center;}
    .info-val.empty{color:#cbd5e1;font-style:italic;}
    /* edit-btn / save-btn / cancel-btn → ใช้ .btn-primary / .btn-approve / .btn-secondary จาก styles-new.css แทน */

    /* ── Teaching table ── */
    .teach-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid #f1f5f9;}
    .teach-row:last-child{border-bottom:none;}
    .teach-code{font-size:11px;font-weight:800;color:var(--accent);background:var(--accent-tint);padding:2px 8px;border-radius:6px;white-space:nowrap;}
    .teach-name{flex:1;font-size:13px;font-weight:600;color:#0f172a;min-width:0;}
    .teach-periods{font-size:12px;font-weight:800;color:#f97316;background:#fff7ed;padding:3px 9px;border-radius:6px;white-space:nowrap;}
    .teach-level{font-size:11px;font-weight:700;color:#64748b;background:#f1f5f9;padding:2px 8px;border-radius:6px;white-space:nowrap;}
    .add-row-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;border-top:1px dashed var(--accent-light);background:#f8fbff;border-radius:0 0 14px 14px;}
    .add-row-btn:hover{background:var(--accent-tint);}

    /* ── Dev / training items ── */
    .dev-item{background:white;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;transition:all .2s;}
    .dev-item:hover{border-color:var(--accent-light);box-shadow:0 3px 12px rgba(29,78,216,.06);}
    .dev-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;}
    .dev-title{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:3px;}
    .dev-meta{font-size:11px;font-weight:600;color:#94a3b8;}

    /* ── Media items ── */
    .media-item{background:white;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:all .2s;}
    .media-item:hover{border-color:var(--accent-light);box-shadow:0 3px 12px rgba(29,78,216,.06);}
    .media-icon{width:40px;height:40px;border-radius:12px;background:var(--accent-tint);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .media-name{font-size:13px;font-weight:700;color:#0f172a;flex:1;}
    .media-subject{font-size:11px;font-weight:600;color:#64748b;margin-top:2px;}

    /* ── Delete mini btn ── */
    .del-btn{width:28px;height:28px;border-radius:8px;background:#fee2e2;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
    .del-btn:hover{background:#fecaca;}

    /* ── Duty items ── */
    .duty-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #f1f5f9;}
    .duty-item:last-child{border-bottom:none;}
    .duty-dot{width:8px;height:8px;border-radius:50%;background:#7c3aed;flex-shrink:0;margin-top:5px;}
    .duty-text{font-size:13px;font-weight:600;color:#0f172a;flex:1;}
    .duty-group{font-size:11px;font-weight:700;color:#7c3aed;background:#f5f3ff;padding:2px 8px;border-radius:6px;white-space:nowrap;}

    /* ── SAR Overview ── */
    .sar-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:639px){.sar-grid{grid-template-columns:1fr;}}
    .sar-card{background:white;border-radius:18px;border:1.5px solid #e2e8f0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
    .sar-card-full{grid-column:1/-1;}
    .sar-card-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #f1f5f9;}
    .sar-card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .sar-card-title{font-size:14px;font-weight:800;color:#0f172a;flex:1;}
    .sar-card-body{padding:14px 18px;}
    .sar-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f8fafc;}
    .sar-row:last-child{border-bottom:none;}
    .sar-lbl{font-size:11px;font-weight:700;color:#94a3b8;min-width:110px;flex-shrink:0;padding-top:1px;}
    .sar-val{font-size:13px;font-weight:600;color:#0f172a;flex:1;}
    .sar-val.empty-val{color:#cbd5e1;font-style:italic;}
    .sar-teach-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f8fafc;}
    .sar-teach-row:last-child{border-bottom:none;}
    .sar-teach-code{font-size:11px;font-weight:800;color:var(--accent);background:var(--accent-tint);padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;}
    .sar-teach-name{font-size:12px;font-weight:600;color:#334155;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .sar-teach-periods{font-size:11px;font-weight:800;color:#f97316;background:#fff7ed;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;}
    .sar-teach-level{font-size:10px;font-weight:700;color:#64748b;background:#f1f5f9;padding:2px 6px;border-radius:6px;white-space:nowrap;flex-shrink:0;}
    .sar-teach-total{font-size:12px;font-weight:800;color:#f97316;padding:8px 0 2px;text-align:right;}
    .sar-dev-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc;}
    .sar-dev-item:last-child{border-bottom:none;}
    .sar-dev-dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;flex-shrink:0;margin-top:5px;}
    .sar-dev-title{font-size:12px;font-weight:700;color:#0f172a;margin-bottom:2px;}
    .sar-dev-meta{font-size:10px;font-weight:600;color:#94a3b8;}
    .sar-media-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f8fafc;}
    .sar-media-item:last-child{border-bottom:none;}
    .sar-media-icon{width:30px;height:30px;border-radius:8px;background:#ecfeff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .sar-media-name{font-size:12px;font-weight:700;color:#0f172a;flex:1;}
    .sar-media-sub{font-size:10px;font-weight:600;color:#64748b;}
    .sar-duty-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
    .sar-duty-text{font-size:12px;font-weight:600;color:#0f172a;flex:1;}
    .sar-duty-group{font-size:10px;font-weight:700;color:#7c3aed;background:#f5f3ff;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;}
    .sar-first-row-ref{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f8fafc;}
    .sar-first-row-ref:last-child{border-bottom:none;}
    .sar-school-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-tint);border:1px solid var(--accent-light);border-radius:10px;padding:8px 14px;margin-bottom:8px;font-size:12px;font-weight:700;color:var(--accent);}
    .sar-service-chip{display:inline-flex;align-items:center;gap:5px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:#15803d;}
    .sar-empty{text-align:center;padding:20px;color:#94a3b8;font-size:12px;font-weight:600;}

    /* ── Career Timeline ── */
    .career-timeline{position:relative;padding:4px 0 4px 32px;flex:1;}
    .career-timeline::before{content:'';position:absolute;left:14px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,#bbf7d0,var(--accent-light),#c4b5fd);border-radius:2px;}
    .ct-node{position:relative;margin-bottom:22px;}
    .ct-node:last-child{margin-bottom:0;}
    .ct-dot{position:absolute;left:-25px;top:13px;width:16px;height:16px;border-radius:50%;border:2.5px solid white;box-shadow:0 0 0 2.5px currentColor;display:flex;align-items:center;justify-content:center;}
    .ct-card{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px 16px;transition:box-shadow .2s;}
    .ct-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);border-color:#cbd5e1;}
    .ct-period{font-size:10px;font-weight:800;letter-spacing:.8px;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .ct-school{font-size:14px;font-weight:800;color:#0f172a;margin-bottom:3px;line-height:1.3;}
    .ct-dept{font-size:11px;font-weight:600;color:#64748b;margin-bottom:9px;}
    .ct-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px;}
    .ct-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
    .ct-now-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;color:#15803d;background:#dcfce7;border:1px solid #86efac;padding:2px 8px;border-radius:20px;}
    .ct-service-bar{height:4px;border-radius:2px;margin-top:10px;background:linear-gradient(to right,#22c55e,#3b82f6);}
    .ct-service-lbl{font-size:10px;font-weight:700;color:#64748b;margin-top:4px;}
    @keyframes ct-blink{0%,100%{opacity:1;}50%{opacity:.5;}}
    .ct-now-badge{animation:ct-blink 2.2s infinite;}

    /* ── SAR Portfolio summary ── */
    .port-doc-row { display:flex; align-items:flex-start; gap:12px; padding:11px 0; border-bottom:1px solid #f1f5f9; }
    .port-doc-row:last-child { border-bottom:none; }
    .port-doc-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .port-doc-info { flex:1; min-width:0; }
    .port-doc-title { font-size:13px; font-weight:800; color:#0f172a; margin-bottom:4px; }
    .port-course-chip { display:inline-flex; align-items:center; gap:5px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:5px 10px; margin:3px 4px 3px 0; cursor:pointer; transition:all .15s; text-decoration:none; }

                    <option value="ครูผู้ช่วย">ครูผู้ช่วย</option>
                    <option value="ครู">ครู</option>
                    <option value="ครูชำนาญการ">ครูชำนาญการ</option>
                    <option value="ครูชำนาญการพิเศษ">ครูชำนาญการพิเศษ</option>
                    <option value="ครูเชี่ยวชาญ">ครูเชี่ยวชาญ</option>
                    <option value="ครูเชี่ยวชาญพิเศษ">ครูเชี่ยวชาญพิเศษ</option>
                  </select>
                </div>
              </div>
            </div>
            <!-- User-editable fields -->
            <div class="info-grid">
              <div class="info-field"><div class="info-label">วันเกิด</div><input type="date" id="e_birthday"></div>
              <div class="info-field"><div class="info-label">สัญชาติ</div><input type="text" id="e_nationality" placeholder="ไทย"></div>
              <div class="info-field"><div class="info-label">เชื้อชาติ</div><input type="text" id="e_ethnicity" placeholder="ไทย"></div>
              <div class="info-field"><div class="info-label">ศาสนา</div><input type="text" id="e_religion" placeholder="พุทธ"></div>
              <div class="info-field"><div class="info-label">เบอร์โทรศัพท์</div><input type="text" id="e_phone" placeholder="08x-xxx-xxxx"></div>
              <div class="info-field" style="grid-column:1/-1;"><div class="info-label">ที่อยู่ปัจจุบัน</div><textarea id="e_address" rows="2" placeholder="บ้านเลขที่ ถนน ตำบล อำเภอ จังหวัด"></textarea></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ─── PANEL: ภาระงานสอน ─── -->
      <div class="tab-pane" data-panel="teaching" id="panel-teaching">
        <div class="info-card" style="padding:0;overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;">
            <div class="info-card-title" style="margin:0;"><i data-lucide="book-open" style="width:18px;height:18px;color:var(--accent);"></i> ภาระงานสอนตามตาราง</div>
            <button class="btn-primary edit-only" onclick="addTeachRow()"><i data-lucide="plus" style="width:14px;height:14px;"></i> เพิ่มรายวิชา</button>
          </div>
          <!-- header -->
          <div class="teach-header-row" style="display:flex;align-items:center;gap:10px;padding:9px 16px;background:#f8fafc;border-top:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;">
            <div style="font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.8px;width:80px;">รหัสวิชา</div>
            <div style="font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.8px;flex:1;">ชื่อวิชา</div>
            <div style="font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.8px;width:70px;text-align:center;">คาบ/สัปดาห์</div>
            <div style="font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.8px;width:60px;text-align:center;">ระดับชั้น</div>
            <div style="width:32px;"></div>
          </div>
          <div id="teachingList"><div class="empty-block">ยังไม่มีข้อมูลภาระงานสอน</div></div>
          <div style="padding:10px 16px;background:#f8fafc;border-top:1px solid #f1f5f9;">
            <span id="teachTotal" style="font-size:13px;font-weight:800;color:#f97316;"></span>
          </div>
        </div>
      </div>

      <!-- ─── PANEL: งานที่ได้รับมอบหมาย ─── -->
      <div class="tab-pane" data-panel="duties" id="panel-duties">
        <div class="info-card" style="padding:0;overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;">
            <div class="info-card-title" style="margin:0;"><i data-lucide="clipboard-list" style="width:18px;height:18px;color:#7c3aed;"></i> ภาระงานที่ได้รับหมายมอบ</div>
            <button class="btn-primary purple edit-only" onclick="addDutyRow()"><i data-lucide="plus" style="width:14px;height:14px;"></i> เพิ่มงาน</button>
          </div>
          <div id="dutiesList"><div class="empty-block">ยังไม่มีข้อมูลงานที่ได้รับมอบหมาย</div></div>
        </div>
      </div>

      <!-- ─── PANEL: การพัฒนาตนเอง ─── -->
      <div class="tab-pane" data-panel="development" id="panel-development">
        <div class="info-card" style="padding:0;overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;">
            <div class="info-card-title" style="margin:0;"><i data-lucide="award" style="width:18px;height:18px;color:#f59e0b;"></i> การพัฒนาตนเอง / อบรม / สัมมนา</div>
            <button class="btn-primary amber edit-only" onclick="addDevItem()"><i data-lucide="plus" style="width:14px;height:14px;"></i> เพิ่มรายการ</button>
          </div>
          <div id="devList" style="padding:0 16px 16px;"><div class="empty-block">ยังไม่มีข้อมูลการพัฒนาตนเอง</div></div>
        </div>
      </div>

      <!-- ─── PANEL: สื่อนวัตกรรม ─── -->
      <div class="tab-pane" data-panel="media" id="panel-media">
        <div class="info-card" style="padding:0;overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;">
            <div class="info-card-title" style="margin:0;"><i data-lucide="layout-grid" style="width:18px;height:18px;color:#06b6d4;"></i> สื่อนวัตกรรมการเรียนรู้</div>
            <button class="btn-primary edit-only" style="background:#06b6d4;" onclick="addMediaItem()"><i data-lucide="plus" style="width:14px;height:14px;"></i> เพิ่มสื่อ</button>
          </div>
          <div id="mediaList" style="padding:0 16px 16px;"><div class="empty-block">ยังไม่มีข้อมูลสื่อนวัตกรรม</div></div>
        </div>
      </div>

</template><!-- #profileContent -->

<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NP Origins">
  <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2Ficon-192.png?alt=media&token=ef7cdd3f-88b4-4fb1-b565-5cb0226a3fe8">
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(e){console.warn('SW:',e);});}</script>
  <title>โปรไฟล์บุคลากร – โรงเรียนหนองกี่พิทยาคม</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="shared/styles.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="shared/firebase.js"></script>
  <script src="shared/common.js"></script>
  <style>
    *{font-family:'Sarabun',sans-serif;box-sizing:border-box;margin:0;padding:0;}

    /* ── Loading ── */
    #loadingOverlay{display:flex;position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
    .spinner{border:3px solid #e2e8f0;border-top:3px solid #1d4ed8;border-radius:50%;width:48px;height:48px;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── Sidebar ── */
    .sidebar-wrap{width:272px;flex-shrink:0;transition:transform .3s ease;}
    .sidebar-inner{background:#f8fafc;border-right:1px solid #e2e8f0;min-height:calc(100vh - 73px);padding:20px 12px;display:flex;flex-direction:column;}
    .sidebar-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:14px;font-weight:700;color:#64748b;width:100%;background:none;border:none;cursor:pointer;text-decoration:none;transition:all .2s;font-size:14px;white-space:nowrap;}
    .sidebar-btn:hover{background:#f1f5f9;}
    .sidebar-btn.active{background:#1d4ed8;color:white;box-shadow:0 8px 15px -3px rgba(30,64,175,.25);}
    .sidebar-btn.admin-btn{color:#7c3aed;}
    .sidebar-btn.admin-btn:hover{background:#faf5ff;}
    .sec-label{padding:14px 16px 8px;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:2px;}
    #sidebarOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;}
    #sidebarOverlay.open{display:block;}
    @media(max-width:1023px){
      .sidebar-wrap{position:fixed;top:0;left:0;height:100vh;z-index:200;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.12);}
      .sidebar-wrap.open{transform:translateX(0);}
    }
    @media(min-width:1024px){#hamburgerBtn{display:none!important;}.sidebar-inner{border-right:none;}}

    /* ── Hero / Profile Card ── */
    .profile-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 55%, #2563eb 100%);
      border-radius: 24px;
      padding: 0;
      position: relative;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .hero-dots {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .hero-glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(96,165,250,.18) 0%, transparent 70%);
      top: -100px; right: -80px;
    }
    .hero-body {
      position: relative; z-index: 1;
      padding: 32px 32px 28px;
      display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap;
    }
    .avatar-ring {
      width: 96px; height: 96px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.1);
      overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-ring img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-initials { font-size: 32px; font-weight: 800; color: rgba(255,255,255,.85); }

    /* ── Stat pills on hero ── */
    .hero-stat {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 10px 16px;
      min-width: 90px;
      text-align: center;
    }
    .hero-stat-val { font-size: 22px; font-weight: 800; color: white; line-height: 1; }
    .hero-stat-lbl { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.6); margin-top: 3px; }

    /* ── Overall progress ring ── */
    .ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-pct { font-size: 16px; font-weight: 800; color: white; line-height: 1; }
    .ring-sub { font-size: 9px; color: rgba(255,255,255,.6); font-weight: 600; }

    /* ── Semester accordion ── */
    .sem-block {
      background: white;
      border-radius: 18px;
      border: 1.5px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      overflow: hidden;
      margin-bottom: 14px;
      transition: box-shadow .2s;
    }
    .sem-block:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }
    .sem-header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 20px;
      cursor: pointer;
      user-select: none;
    }
    .sem-badge {
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: white; font-size: 12px; font-weight: 800;
      padding: 5px 13px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .sem-badge.sem2 { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .sem-progress-bar {
      flex: 1;
      background: #f1f5f9;
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
    }
    .sem-progress-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #1d4ed8, #3b82f6);
      transition: width .6s ease;
    }
    .sem-progress-fill.purple { background: linear-gradient(90deg, #7c3aed, #a855f7); }
    .sem-count { font-size: 12px; font-weight: 700; color: #64748b; white-space: nowrap; }
    .sem-chevron { color: #94a3b8; transition: transform .3s; flex-shrink: 0; }
    .sem-block.open .sem-chevron { transform: rotate(180deg); }
    .sem-body { display: none; border-top: 1px solid #f1f5f9; }
    .sem-block.open .sem-body { display: block; }

    /* ── Doc list inside semester ── */
    .doc-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid #f8fafc;
      transition: background .12s;
    }
    .doc-row:last-child { border-bottom: none; }
    .doc-row:hover { background: #f8faff; }
    .doc-icon-sm {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }
    .doc-name { flex: 1; min-width: 0; }
    .doc-name-title { font-size: 14px; font-weight: 700; color: #1e293b; line-height: 1.3; }
    .doc-name-sub { font-size: 11px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

    /* ── Status badge inline ── */
    .s-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
    }
    .s-none          { background:#f1f5f9; color:#94a3b8; }
    .s-submitted     { background:#dcfce7; color:#15803d; }
    .s-reviewed      { background:#dbeafe; color:#1e40af; }
    .s-head_reviewed { background:#e0f2fe; color:#0369a1; }
    .s-final_approved{ background:#f5f3ff; color:#6d28d9; }
    .s-revision      { background:#fef9c3; color:#92400e; }

    /* ── Workflow mini bar ── */
    .wf-mini {
      display: flex; gap: 2px; align-items: center;
      margin-top: 5px;
    }
    .wf-pip {
      width: 18px; height: 5px; border-radius: 3px;
      background: #e2e8f0;
    }
    .wf-pip.done    { background: #22c55e; }
    .wf-pip.active  { background: #f59e0b; }
    .wf-pip.rev     { background: #dc2626; }
    .wf-pip.final   { background: #7c3aed; }

    /* ── File chips ── */
    .file-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 8px;
      font-size: 11px; font-weight: 600;
      background: #f1f5f9; color: #475569;
      border: 1px solid #e2e8f0;
      text-decoration: none;
      transition: all .15s;
      cursor: pointer;
    }
    .file-chip:hover { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }

    /* ── Summary card ── */
    .sum-card {
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px 18px;
      margin: 16px 20px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .sum-item { text-align: center; }
    .sum-val { font-size: 20px; font-weight: 800; color: #0f172a; line-height: 1; }
    .sum-lbl { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
    .sum-divider { width: 1px; background: #e2e8f0; height: 36px; flex-shrink: 0; }

    /* ── Empty state ── */
    .empty-sem {
      text-align: center; padding: 32px 20px;
      color: #94a3b8; font-size: 13px; font-weight: 600;
    }

    /* ── View file modal ── */
    #fileViewModal {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,.8); z-index: 2000;
      align-items: center; justify-content: center;
      padding: 20px; backdrop-filter: blur(6px);
    }
    #fileViewModal.open { display: flex; }
    .fv-box {
      background: white; border-radius: 20px;
      width: 100%; max-width: 640px; max-height: 90vh;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 32px 64px rgba(0,0,0,.25);
    }
    .fv-header {
      padding: 18px 22px; border-bottom: 1px solid #f1f5f9;
      display: flex; align-items: center; gap: 12px;
    }
    .fv-body { flex: 1; overflow-y: auto; }
    .fv-file-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; border-bottom: 1px solid #f8fafc;
    }
    .fv-file-row:last-child { border-bottom: none; }
    .fv-file-name { flex: 1; font-size: 13px; font-weight: 600; color: #1e293b; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fv-open-btn {
      padding: 6px 13px; background: #eff6ff; color: #1d4ed8;
      border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
    }
    .fv-open-btn:hover { background: #dbeafe; }

    /* ── Notes / feedback chip ── */
    .note-chip {
      display: inline-block; background: #fffbeb; color: #92400e;
      border: 1px solid #fde68a; border-radius: 8px;
      font-size: 11px; font-weight: 600; padding: 3px 9px; margin-top: 4px;
    }

    /* ── Responsive ── */
    @media(max-width: 640px) {
      .hero-body { padding: 24px 18px 20px; gap: 16px; }
      .avatar-ring { width: 72px; height: 72px; }
      .avatar-initials { font-size: 24px; }
      .doc-row { flex-wrap: wrap; }
      .sum-card { gap: 14px; }
    }

    /* ── Collapse animation ── */
    .sem-body-inner { padding-bottom: 4px; }

    /* ── Timeline dot connector ── */
    .timeline-wrap {
      display: flex; flex-direction: column; gap: 0;
    }
    .sem-block { position: relative; }
  </style>
</head>
<body style="background:#f8fafc;min-height:100vh;">

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:#64748b;font-size:14px;font-weight:700;">กำลังโหลดข้อมูล...</p>
</div>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Login Gate -->
<div id="loginGate" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:2000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);">
  <div style="background:white;border-radius:24px;width:100%;max-width:380px;padding:36px 28px;text-align:center;box-shadow:0 32px 64px rgba(0,0,0,.2);">
    <div style="width:64px;height:64px;border-radius:20px;background:#eff6ff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <i data-lucide="user-circle" style="width:28px;height:28px;color:#1d4ed8;"></i>
    </div>
    <h3 style="font-size:20px;font-weight:800;color:#0f172a;margin-bottom:8px;">เข้าสู่ระบบก่อนใช้งาน</h3>
    <p style="font-size:14px;color:#64748b;margin-bottom:24px;">กรุณาเข้าสู่ระบบด้วยบัญชี Google</p>
    <button onclick="handleLogin()" style="width:100%;padding:14px;background:#1d4ed8;color:white;font-weight:800;border-radius:14px;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 8px 20px rgba(29,78,216,.3);">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
      เข้าสู่ระบบด้วย Google
    </button>
  </div>
</div>

<!-- File View Modal -->
<div id="fileViewModal">
  <div class="fv-box">
    <div class="fv-header">
      <div style="width:38px;height:38px;border-radius:10px;background:#eff6ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <i data-lucide="folder-open" style="width:18px;height:18px;color:#1d4ed8;"></i>
      </div>
      <div style="flex:1;min-width:0;">
        <div id="fvDocName" style="font-size:15px;font-weight:800;color:#0f172a;"></div>
        <div id="fvDocSem" style="font-size:12px;color:#64748b;font-weight:600;"></div>
      </div>
      <button onclick="closeFVModal()" style="background:#f1f5f9;border:none;border-radius:10px;padding:8px;cursor:pointer;color:#64748b;display:flex;align-items:center;">
        <i data-lucide="x" style="width:16px;height:16px;"></i>
      </button>
    </div>
    <div class="fv-body" id="fvBody">
      <div style="text-align:center;padding:32px;color:#94a3b8;font-size:13px;">ไม่มีไฟล์</div>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none;">
  <nav id="navbar" class="navbar"></nav>
  <div style="display:flex;max-width:1280px;margin:0 auto;min-height:calc(100vh - 69px);">
    <div class="sidebar-wrap" id="sidebar">
      <div class="sidebar-inner" id="sidebarInner"></div>
    </div>
    <div style="flex:1;min-width:0;padding:28px 20px;" id="contentArea">

      <!-- ── PROFILE HERO ── -->
      <div class="profile-hero">
        <div class="hero-dots"></div>
        <div class="hero-glow"></div>
        <div class="hero-body">
          <!-- Avatar -->
          <div class="avatar-ring" id="avatarWrap">
            <span class="avatar-initials" id="avatarInitials">?</span>
          </div>
          <!-- Info -->
          <div style="flex:1;min-width:180px;">
            <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:1.5px;margin-bottom:4px;">โปรไฟล์บุคลากร</div>
            <h1 id="profileName" style="font-size:22px;font-weight:800;color:white;margin-bottom:6px;line-height:1.2;">กำลังโหลด...</h1>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
              <span id="profilePosition" style="font-size:12px;font-weight:600;color:rgba(255,255,255,.7);background:rgba(255,255,255,.1);padding:3px 10px;border-radius:20px;"></span>
              <span id="profileGroup" style="font-size:12px;font-weight:600;color:rgba(255,255,255,.7);background:rgba(255,255,255,.1);padding:3px 10px;border-radius:20px;"></span>
            </div>
            <div style="font-size:12px;color:rgba(255,255,255,.5);" id="profileEmail"></div>
          </div>
          <!-- Stats -->
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
            <div class="hero-stat">
              <div class="hero-stat-val" id="statTotal">–</div>
              <div class="hero-stat-lbl">ทั้งหมด</div>
            </div>
            <div class="hero-stat">
              <div class="hero-stat-val" id="statSubmitted" style="color:#4ade80;">–</div>
              <div class="hero-stat-lbl">ส่งแล้ว</div>
            </div>
            <div class="hero-stat">
              <div class="hero-stat-val" id="statApproved" style="color:#c4b5fd;">–</div>
              <div class="hero-stat-lbl">อนุมัติ</div>
            </div>
            <!-- Ring -->
            <div class="ring-wrap" id="overallRingWrap" style="display:none;">
              <svg width="80" height="80" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="33" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="8"/>
                <circle id="ringCircle" cx="40" cy="40" r="33" fill="none" stroke="#34d399" stroke-width="8"
                  stroke-linecap="round"
                  stroke-dasharray="207.3" stroke-dashoffset="207.3"
                  style="transition:stroke-dashoffset .8s ease;"/>
              </svg>
              <div class="ring-center">
                <div class="ring-pct" id="ringPct">0%</div>
                <div class="ring-sub">ความคืบหน้า</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── SEMESTER LIST ── -->
      <div style="margin-bottom:12px;display:flex;align-items:center;gap:10px;">
        <h2 style="font-size:16px;font-weight:800;color:#0f172a;flex:1;">ประวัติการส่งงานรายภาคเรียน</h2>
        <select id="filterStatus" onchange="filterSemesters()" style="font-size:12px;font-weight:700;color:#475569;background:white;border:1.5px solid #e2e8f0;padding:7px 12px;border-radius:10px;outline:none;cursor:pointer;max-width:160px;">
          <option value="all">ทุกสถานะ</option>
          <option value="submitted">ส่งแล้ว</option>
          <option value="reviewed">ตรวจแล้ว</option>
          <option value="final_approved">อนุมัติแล้ว</option>
          <option value="revision">แก้ไข</option>
          <option value="none">ยังไม่ส่ง</option>
        </select>
      </div>

      <div id="semList" style="display:flex;flex-direction:column;gap:14px;">
        <div style="text-align:center;padding:48px;background:white;border-radius:18px;border:1.5px solid #e2e8f0;color:#94a3b8;font-size:14px;font-weight:600;">
          กำลังโหลดข้อมูล...
        </div>
      </div>

    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   DOCUMENT TYPES — ซิงค์กับ portfolio-teacher
   ════════════════════════════════════════════ */
var DOCUMENT_TYPES = [
  { id:'plan',        label:'แผนการจัดการเรียนรู้',     icon:'📋', color:'#eff6ff', iconColor:'#1d4ed8' },
  { id:'score',       label:'บันทึกคะแนน',               icon:'📊', color:'#f0fdf4', iconColor:'#16a34a' },
  { id:'analysis',    label:'วิเคราะห์ผลการเรียน',       icon:'📈', color:'#fef9c3', iconColor:'#b45309' },
  { id:'activity',    label:'บันทึกกิจกรรมการเรียน',     icon:'📝', color:'#fdf4ff', iconColor:'#9333ea' },
  { id:'improvement', label:'บันทึกการพัฒนาผู้เรียน',    icon:'🌱', color:'#f0fdf4', iconColor:'#059669' },
  { id:'research',    label:'วิจัยในชั้นเรียน',          icon:'🔬', color:'#fff1f2', iconColor:'#e11d48' }
];

/* ── globals ── */
var currentUser   = null;
var currentStaff  = null;
var allSemData    = [];   /* [{year,sem,docs:[…]}] */

/* ════════════════════════════════════════════
   AUTH
   ════════════════════════════════════════════ */
auth.onAuthStateChanged(function(user) {
  if (!user) {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('loginGate').style.display = 'flex';
    lucide.createIcons();
    return;
  }
  document.getElementById('loginGate').style.display = 'none';
  currentUser = user;
  initProfile();
});

/* ════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════ */
function initProfile() {
  /* build navbar + sidebar via common.js */
  if (typeof buildNavbar  === 'function') buildNavbar('profile');
  if (typeof buildSidebar === 'function') buildSidebar('profile');

  var email = currentUser.email.toLowerCase();

  /* load staff doc */
  db.collection('staff').doc(email).get().then(function(doc) {
    if (!doc.exists) {
      /* fallback: search by email field */
      return db.collection('staff').where('email','==',email).limit(1).get().then(function(snap) {
        if (snap.empty) return null;
        return snap.docs[0];
      });
    }
    return doc;
  }).then(function(docOrSnap) {
    if (!docOrSnap || !docOrSnap.exists) {
      /* no staff record — show minimal profile */
      fillProfileFromUser(currentUser);
      loadSubmissions(email);
      return;
    }
    currentStaff = docOrSnap.data();
    currentStaff._id = docOrSnap.id;
    fillProfileFromStaff(currentStaff);
    loadSubmissions(email);
  }).catch(function(e) {
    console.error(e);
    fillProfileFromUser(currentUser);
    loadSubmissions(email);
  });
}

/* ── Fill hero from staff doc ── */
function fillProfileFromStaff(s) {
  document.getElementById('profileName').textContent     = s.name        || currentUser.displayName || '–';
  document.getElementById('profilePosition').textContent = s.position    || '';
  document.getElementById('profileGroup').textContent    = s.group       || '';
  document.getElementById('profileEmail').textContent    = currentUser.email;
  setAvatar(s.photoURL || currentUser.photoURL, s.name || currentUser.displayName);
  document.getElementById('mainApp').style.display = 'block';
}

function fillProfileFromUser(u) {
  document.getElementById('profileName').textContent  = u.displayName || u.email;
  document.getElementById('profileEmail').textContent = u.email;
  setAvatar(u.photoURL, u.displayName);
  document.getElementById('mainApp').style.display = 'block';
}

function setAvatar(url, name) {
  var wrap = document.getElementById('avatarWrap');
  if (url) {
    var img = document.createElement('img');
    img.src = url;
    img.onerror = function() { setInitials(wrap, name); };
    wrap.innerHTML = '';
    wrap.appendChild(img);
  } else {
    setInitials(wrap, name);
  }
}
function setInitials(wrap, name) {
  var initials = (name || '?').split(' ').slice(0,2).map(function(w){ return w[0] || ''; }).join('').toUpperCase() || '?';
  wrap.innerHTML = '<span class="avatar-initials">' + initials + '</span>';
}

/* ════════════════════════════════════════════
   LOAD SUBMISSIONS — ดึงทุก year/sem ที่มีข้อมูล
   ════════════════════════════════════════════ */
function loadSubmissions(email) {
  /* query ทุก submissions ของ user นี้ */
  db.collection('submissions')
    .where('email', '==', email)
    .orderBy('year',  'desc')
    .orderBy('sem',   'desc')
    .get()
    .then(function(snap) {
      processSubmissions(snap.docs);
    })
    .catch(function(e) {
      console.warn('submissions query failed, trying alternate path', e);
      /* fallback: iterate known years */
      loadSubmissionsFallback(email);
    });
}

function loadSubmissionsFallback(email) {
  var currentYear = new Date().getFullYear() + 543;
  var years = [];
  for (var y = currentYear; y >= currentYear - 5; y--) {
    years.push(y);
  }
  var promises = [];
  years.forEach(function(y) {
    [1,2].forEach(function(s) {
      var docId = email + '_' + y + '_' + s;
      promises.push(
        db.collection('submissions').doc(docId).get().catch(function(){ return null; })
      );
      /* also try sub-collection path */
      DOCUMENT_TYPES.forEach(function(dt) {
        var path = 'submissions/' + email + '/' + y + '_' + s + '/documents/' + dt.id;
        promises.push(
          db.doc(path).get().catch(function(){ return null; })
        );
      });
    });
  });
  Promise.all(promises).then(function(results) {
    var validDocs = results.filter(function(d) { return d && d.exists; });
    processSubmissions(validDocs);
  });
}

/* ── Main data structure builder ── */
function processSubmissions(docs) {
  /* group by year+sem */
  var map = {};   /* key: "year_sem" */

  docs.forEach(function(docSnap) {
    if (!docSnap || !docSnap.exists) return;
    var d = docSnap.data();
    if (!d) return;

    var year = d.year || '';
    var sem  = d.sem  || d.semester || '';
    if (!year || !sem) return;

    var key = year + '_' + sem;
    if (!map[key]) map[key] = { year: year, sem: sem, docs: {} };

    /* each doc may represent one DOCUMENT_TYPE entry or be a container */
    var docType = d.docType || d.documentType || d.type || docSnap.id.replace(/.*_/, '');

    /* if the record itself has docType field, it's a per-doc record */
    if (d.docType || d.documentType || d.type) {
      var dt = d.docType || d.documentType || d.type;
      map[key].docs[dt] = {
        status:      d.status || 'none',
        files:       d.files  || [],
        updatedAt:   d.updatedAt || d.submittedAt || null,
        note:        d.note || d.reviewNote || '',
        courseCode:  d.courseCode || '',
        courseName:  d.courseName || ''
      };
    } else {
      /* container doc: each docType is a field */
      DOCUMENT_TYPES.forEach(function(dt) {
        if (d[dt.id]) {
          var entry = d[dt.id];
          map[key].docs[dt.id] = {
            status:    entry.status    || 'none',
            files:     entry.files     || [],
            updatedAt: entry.updatedAt || null,
            note:      entry.note      || '',
            courseCode:entry.courseCode || '',
            courseName:entry.courseName || ''
          };
        }
      });

      /* also store top-level status per doc if present */
      if (d.status) {
        /* single-doc submission, guess type from docType field */
        var guessType = d.docType || 'unknown';
        map[key].docs[guessType] = {
          status:    d.status,
          files:     d.files || [],
          updatedAt: d.updatedAt || null,
          note:      d.note || '',
        };
      }
    }
  });

  /* convert map → sorted array */
  allSemData = Object.values(map).sort(function(a,b) {
    if (b.year !== a.year) return b.year - a.year;
    return b.sem - a.sem;
  });

  /* also load per-sem subcollection structure if no data found */
  if (allSemData.length === 0) {
    loadFromPerSemCollection(currentUser.email.toLowerCase());
    return;
  }

  renderAll();
}

/* ════════════════════════════════════════════
   Alternative: per-semester subcollection
   path: semesterSubmissions/{uid}/semesters/{year_sem}/documents/{docId}
   ════════════════════════════════════════════ */
function loadFromPerSemCollection(email) {
  var uid = currentUser.uid;
  var currentYear = new Date().getFullYear() + 543;
  var semKeys = [];
  for (var y = currentYear; y >= currentYear - 4; y--) {
    semKeys.push(y + '_1', y + '_2');
  }

  var promises = semKeys.map(function(key) {
    return db.collection('semesterSubmissions')
      .doc(uid)
      .collection('semesters')
      .doc(key)
      .collection('documents')
      .get()
      .then(function(snap) {
        if (snap.empty) return null;
        var parts = key.split('_');
        var entry = { year: parseInt(parts[0]), sem: parseInt(parts[1]), docs: {} };
        snap.forEach(function(d) {
          entry.docs[d.id] = {
            status:    d.data().status    || 'none',
            files:     d.data().files     || [],
            updatedAt: d.data().updatedAt || null,
            note:      d.data().note      || ''
          };
        });
        return entry;
      })
      .catch(function() { return null; });
  });

  Promise.all(promises).then(function(results) {
    allSemData = results.filter(Boolean).filter(function(e) { return Object.keys(e.docs).length > 0; });
    renderAll();
  });
}

/* ════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════ */
function renderAll() {
  computeStats();
  renderSemesters(allSemData);

  document.getElementById('loadingOverlay').style.display = 'none';
  lucide.createIcons();
}

function computeStats() {
  var total = 0, submitted = 0, approved = 0;
  allSemData.forEach(function(sem) {
    DOCUMENT_TYPES.forEach(function(dt) {
      total++;
      var d = sem.docs[dt.id];
      if (!d) return;
      if (d.status && d.status !== 'none') submitted++;
      if (d.status === 'final_approved') approved++;
    });
  });

  document.getElementById('statTotal').textContent     = total     || '–';
  document.getElementById('statSubmitted').textContent = submitted || '–';
  document.getElementById('statApproved').textContent  = approved  || '–';

  if (total > 0) {
    var pct = Math.round(submitted / total * 100);
    document.getElementById('overallRingWrap').style.display = 'flex';
    document.getElementById('ringPct').textContent = pct + '%';
    var circumference = 207.3;
    var offset = circumference - (pct / 100 * circumference);
    setTimeout(function() {
      document.getElementById('ringCircle').style.strokeDashoffset = offset;
    }, 100);
  }
}

/* ── Build semester blocks ── */
function renderSemesters(data) {
  var container = document.getElementById('semList');
  container.innerHTML = '';

  if (!data || data.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:56px 20px;background:white;border-radius:18px;border:1.5px solid #e2e8f0;">' +
      '<div style="font-size:40px;margin-bottom:14px;">📂</div>' +
      '<div style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:6px;">ยังไม่มีข้อมูลการส่งงาน</div>' +
      '<div style="font-size:13px;color:#94a3b8;">ข้อมูลจะแสดงเมื่อมีการส่งงานในระบบ</div>' +
    '</div>';
    return;
  }

  data.forEach(function(semEntry, idx) {
    container.appendChild(buildSemBlock(semEntry, idx));
  });

  lucide.createIcons();
}

function buildSemBlock(semEntry, idx) {
  var isPurple = semEntry.sem === 2;
  var semLabel = 'ภาคเรียนที่ ' + semEntry.sem + ' ปีการศึกษา ' + semEntry.year;

  /* compute progress for this semester */
  var total = DOCUMENT_TYPES.length;
  var done  = 0;
  DOCUMENT_TYPES.forEach(function(dt) {
    var d = semEntry.docs[dt.id];
    if (d && d.status && d.status !== 'none') done++;
  });
  var pct = total > 0 ? Math.round(done / total * 100) : 0;

  var block = document.createElement('div');
  block.className = 'sem-block' + (idx === 0 ? ' open' : '');
  block.innerHTML =
    '<div class="sem-header" onclick="toggleSem(this.parentElement)">' +
      '<span class="sem-badge' + (isPurple ? ' sem2' : '') + '">ภาค ' + semEntry.sem + ' / ' + semEntry.year + '</span>' +
      '<div class="sem-progress-bar"><div class="sem-progress-fill' + (isPurple ? ' purple' : '') + '" style="width:' + pct + '%"></div></div>' +
      '<span class="sem-count">' + done + '/' + total + ' รายการ</span>' +
      '<i data-lucide="chevron-down" class="sem-chevron" style="width:16px;height:16px;"></i>' +
    '</div>' +
    '<div class="sem-body">' +
      '<div class="sem-body-inner">' +
        buildSemSummary(semEntry) +
        buildDocList(semEntry, isPurple) +
      '</div>' +
    '</div>';

  return block;
}

function buildSemSummary(semEntry) {
  var counts = { none:0, submitted:0, reviewed:0, head_reviewed:0, final_approved:0, revision:0 };
  DOCUMENT_TYPES.forEach(function(dt) {
    var d = semEntry.docs[dt.id];
    var st = (d && d.status) ? d.status : 'none';
    counts[st] = (counts[st] || 0) + 1;
  });
  var items = [
    { key:'none',          lbl:'ยังไม่ส่ง',  color:'#94a3b8' },
    { key:'submitted',     lbl:'ส่งแล้ว',    color:'#16a34a' },
    { key:'reviewed',      lbl:'ตรวจแล้ว',   color:'#1e40af' },
    { key:'head_reviewed', lbl:'หัวหน้าตรวจ', color:'#0369a1' },
    { key:'final_approved',lbl:'อนุมัติ',    color:'#6d28d9' },
    { key:'revision',      lbl:'แก้ไข',      color:'#92400e' }
  ].filter(function(i) { return counts[i.key] > 0; });

  if (!items.length) return '';
  var html = '<div class="sum-card">';
  items.forEach(function(item, i) {
    if (i > 0) html += '<div class="sum-divider"></div>';
    html += '<div class="sum-item"><div class="sum-val" style="color:' + item.color + '">' + counts[item.key] + '</div><div class="sum-lbl">' + item.lbl + '</div></div>';
  });
  html += '</div>';
  return html;
}

function buildDocList(semEntry, isPurple) {
  var html = '';
  DOCUMENT_TYPES.forEach(function(dt) {
    var d  = semEntry.docs[dt.id] || {};
    var st = d.status || 'none';
    var files = d.files || [];
    var note  = d.note  || '';

    /* workflow pips: submitted → head_reviewed → reviewed → final_approved */
    var wf = buildWorkflowPips(st);

    /* file chips */
    var fileHtml = '';
    if (files.length > 0) {
      fileHtml = '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;">';
      files.slice(0,4).forEach(function(f, fi) {
        var fname = f.name || f.fileName || ('ไฟล์ ' + (fi+1));
        var furl  = f.url  || f.downloadURL || '';
        fileHtml += '<span class="file-chip" onclick="openFileChip(\'' + esc(furl) + '\',\'' + esc(fname) + '\')">' +
          '<i data-lucide="paperclip" style="width:10px;height:10px;"></i>' + esc(fname) + '</span>';
      });
      if (files.length > 4) {
        fileHtml += '<span class="file-chip" onclick="openFileModal(\'' + esc(semEntry.year+'_'+semEntry.sem) + '\',\'' + esc(dt.id) + '\')" style="background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;">+' + (files.length-4) + ' ไฟล์</span>';
      }
      fileHtml += '</div>';
    }

    /* note */
    var noteHtml = note ? '<div class="note-chip">💬 ' + esc(note) + '</div>' : '';

    /* updated date */
    var dateStr = '';
    if (d.updatedAt) {
      try {
        var dd = d.updatedAt.toDate ? d.updatedAt.toDate() : new Date(d.updatedAt);
        dateStr = dd.toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric' });
      } catch(e) {}
    }

    html +=
      '<div class="doc-row">' +
        '<div class="doc-icon-sm" style="background:' + dt.color + ';">' +
          '<span style="font-size:18px;">' + dt.icon + '</span>' +
        '</div>' +
        '<div class="doc-name" style="flex:1;">' +
          '<div class="doc-name-title">' + dt.label + '</div>' +
          (d.courseCode || d.courseName ?
            '<div class="doc-name-sub">' + (d.courseCode||'') + ' ' + (d.courseName||'') + '</div>' : '') +
          (dateStr ? '<div style="font-size:10px;color:#cbd5e1;margin-top:2px;">' + dateStr + '</div>' : '') +
          wf +
          fileHtml +
          noteHtml +
        '</div>' +
        '<span class="s-badge s-' + st + '">' + statusLabel(st) + '</span>' +
      '</div>';
  });
  return html;
}

function buildWorkflowPips(status) {
  var order = ['submitted','head_reviewed','reviewed','final_approved'];
  var idx = order.indexOf(status);
  var html = '<div class="wf-mini">';
  order.forEach(function(s, i) {
    var cls = 'wf-pip';
    if (status === 'revision' && i === 0) cls += ' rev';
    else if (i < idx)  cls += ' done';
    else if (i === idx) cls += ' done';
    else cls += '';   /* pending */
    html += '<div class="' + cls + '" title="' + statusLabel(s) + '"></div>';
    if (i < order.length-1) html += '<div style="width:6px;height:2px;background:#e2e8f0;"></div>';
  });
  html += '</div>';
  return html;
}

/* ════════════════════════════════════════════
   TOGGLE + FILTER
   ════════════════════════════════════════════ */
function toggleSem(block) {
  block.classList.toggle('open');
}

function filterSemesters() {
  var val = document.getElementById('filterStatus').value;
  if (val === 'all') {
    renderSemesters(allSemData);
    return;
  }
  var filtered = allSemData.filter(function(sem) {
    return DOCUMENT_TYPES.some(function(dt) {
      var d = sem.docs[dt.id];
      if (val === 'none') return !d || !d.status || d.status === 'none';
      return d && d.status === val;
    });
  });
  renderSemesters(filtered);
}

/* ════════════════════════════════════════════
   FILE MODAL
   ════════════════════════════════════════════ */
function openFileModal(semKey, docTypeId) {
  var parts = semKey.split('_');
  var year = parts[0], sem = parts[1];
  var semEntry = allSemData.find(function(s) { return String(s.year) === year && String(s.sem) === sem; });
  if (!semEntry) return;
  var d = semEntry.docs[docTypeId] || {};
  var dt = DOCUMENT_TYPES.find(function(x) { return x.id === docTypeId; }) || { label: docTypeId };

  document.getElementById('fvDocName').textContent = dt.label;
  document.getElementById('fvDocSem').textContent  = 'ภาคเรียนที่ ' + sem + ' ปีการศึกษา ' + year;

  var files = d.files || [];
  var body = document.getElementById('fvBody');
  if (!files.length) {
    body.innerHTML = '<div style="text-align:center;padding:32px;color:#94a3b8;">ไม่มีไฟล์</div>';
  } else {
    body.innerHTML = files.map(function(f, i) {
      var fname = f.name || f.fileName || ('ไฟล์ ' + (i+1));
      var furl  = f.url  || f.downloadURL || '';
      return '<div class="fv-file-row">' +
        '<div style="width:32px;height:32px;background:#f1f5f9;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' +
          '<i data-lucide="file" style="width:14px;height:14px;color:#64748b;"></i>' +
        '</div>' +
        '<span class="fv-file-name">' + esc(fname) + '</span>' +
        (furl ? '<a href="' + furl + '" target="_blank" class="fv-open-btn"><i data-lucide="external-link" style="width:12px;height:12px;"></i>เปิด</a>' : '') +
      '</div>';
    }).join('');
  }

  document.getElementById('fileViewModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  lucide.createIcons();
}

function closeFVModal() {
  document.getElementById('fileViewModal').classList.remove('open');
  document.body.style.overflow = '';
}

function openFileChip(url, name) {
  if (url) { window.open(url, '_blank'); return; }
  alert('ไม่พบลิงก์ไฟล์: ' + name);
}

/* ════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════ */
function statusLabel(s) {
  return {
    none:          'ยังไม่ส่ง',
    submitted:     'ส่งแล้ว',
    reviewed:      'ตรวจแล้ว',
    head_reviewed: 'หัวหน้าตรวจ',
    final_approved:'อนุมัติแล้ว',
    revision:      'แก้ไข'
  }[s] || s;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

/* close modal on bg click */
document.getElementById('fileViewModal').addEventListener('click', function(e) {
  if (e.target === this) closeFVModal();
});

<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="var(--accent)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NP Origins">
  <link rel="icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(function(){console.log('SW registered');}).catch(function(e){console.warn('SW error:',e);});}</script>
  <title>Admin Dashboard - โรงเรียนหนองกี่พิทยาคม</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="shared/tailwind-built.css" rel="stylesheet">
  <link href="shared/styles-new.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@1.24.0"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  <script src="shared/firebase.js"></script>
  <script src="shared/common.js"></script>
  </head>
<body>

<div id="loadingOverlay"><div class="spinner"></div><p style="color:var(--text2);font-size:14px;font-weight:700;">กำลังตรวจสอบสิทธิ์...</p></div>
<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Access Denied -->
<div id="accessDenied" style="display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="width:72px;height:72px;background:var(--red-light);border-radius:50%;display:flex;align-items:center;justify-content:center;">
    <i data-lucide="shield-off" style="width:36px;height:36px;color:var(--red);"></i>
  </div>
  <div style="text-align:center;"><h2 style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:var(--gap-tight);">ไม่มีสิทธิ์เข้าถึง</h2><p style="color:var(--text2);font-size:14px;">บัญชีของคุณไม่ได้รับอนุญาต</p></div>
  <a href="index.html" style="padding:10px 24px;background:var(--purple);color:white;border-radius:12px;font-weight:700;text-decoration:none;">← กลับหน้าแรก</a>
</div>

<!-- Main App — buildPage() จะ inject app-shell + navbar + sidebar ให้อัตโนมัติ -->
<div id="roomAdminApp" style="display:none;"></div>

<!-- ปุ่มย้อนกลับไปด้านบน -->
<button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTopContent()" title="ย้อนกลับด้านบน">
  <i data-lucide="arrow-up" style="width:20px;height:20px;"></i>
</button>

<!-- ─── Page Content (inject เข้า contentEl ใน onAuth) ─────────────────── -->
<template id="roomAdminContent">

      <!-- Page header -->
      <div style="display:flex;align-items:center;gap:var(--gap-item);margin-bottom:var(--gap-section);">
        <div class="page-icon purple" style="width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i data-lucide="calendar-cog" style="width:20px;height:20px;color:white;"></i>
        </div>
        <h1 style="font-size:22px;font-weight:800;color:var(--text);">จัดการระบบขอใช้ห้อง/สถานที่</h1>
      </div>

      <!-- Charts Panel -->
      <div id="chartsPanel" style="margin-bottom:var(--gap-section);">
        <div class="charts-section">
          <!-- Donut: สถานะคำขอ -->
          <div class="chart-card">
            <p class="chart-title">สถานะคำขอจองทั้งหมด</p>
            <p class="chart-sub">สัดส่วนสถานะคำขอจองห้อง</p>
            <div class="donut-wrap" style="height:160px;">
              <canvas id="donutChart" width="160" height="160"></canvas>
              <div class="donut-center">
                <div class="donut-big" id="donutTotal">-</div>
                <div class="donut-label">คำขอ</div>
              </div>
            </div>
            <div class="donut-legend" id="donutLegend"></div>
          </div>

          <!-- Bar: ห้องที่ถูกจองมากสุด -->
          <div class="chart-card">
            <p class="chart-title">ห้องที่ถูกจองมากที่สุด</p>
            <p class="chart-sub">จำนวนคำขออนุมัติแล้วแต่ละห้อง</p>
            <div id="roomBars" style="margin-top:4px;max-height:260px;overflow-y:auto;padding-right:4px;"></div>
          </div>

          <!-- Bar: คำขอรายเดือน -->
          <div class="chart-card">
            <p class="chart-title">แนวโน้มคำขอรายเดือน</p>
            <p class="chart-sub">จำนวนคำขอจองย้อนหลัง 6 เดือน</p>
            <div id="monthBars" style="margin-top:4px;"></div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gap-card);margin-bottom:var(--gap-section);">
        <div class="stat-card"><div style="width:42px;height:42px;background:#fef9c3;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i data-lucide="clock" style="width:20px;height:20px;color:#d97706;"></i></div><div><p style="font-size:10px;color:var(--text2);font-weight:700;">รอพิจารณา</p><p style="font-size:24px;font-weight:800;line-height:1;" id="statPending">0</p></div></div>
        <div class="stat-card"><div style="width:42px;height:42px;background:#dcfce7;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i data-lucide="check-circle" style="width:20px;height:20px;color:var(--green);"></i></div><div><p style="font-size:10px;color:var(--text2);font-weight:700;">อนุมัติแล้ว</p><p style="font-size:24px;font-weight:800;line-height:1;" id="statApproved">0</p></div></div>
        <div class="stat-card"><div style="width:42px;height:42px;background:var(--red-light);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i data-lucide="x-circle" style="width:20px;height:20px;color:var(--red);"></i></div><div><p style="font-size:10px;color:var(--text2);font-weight:700;">ไม่อนุมัติ</p><p style="font-size:24px;font-weight:800;line-height:1;" id="statRejected">0</p></div></div>
        <div class="stat-card"><div style="width:42px;height:42px;background:var(--purple-light);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i data-lucide="calendar" style="width:20px;height:20px;color:var(--purple);"></i></div><div><p style="font-size:10px;color:var(--text2);font-weight:700;">ทั้งหมด</p><p style="font-size:24px;font-weight:800;line-height:1;" id="statTotal">0</p></div></div>
      </div>

      <!-- Main card with sub-tabs -->
      <div class="card" style="overflow:hidden;flex:1;display:flex;flex-direction:column;">

        <!-- Sub-tab bar (ใช้ class กลาง .sub-tab-bar/.sub-tab จาก shared/styles-new.css
             เรียง: คำขอทั้งหมด → สรุปรายห้อง → จัดการห้อง (จัดการ อยู่ท้ายสุดเสมอ) -->
        <div class="sub-tab-bar" id="roomSubtabBar" style="margin:0 20px;">
          <button class="sub-tab active" data-tab="bookings">
            <i data-lucide="layout-list" style="width:14px;height:14px;"></i>คำขอทั้งหมด
          </button>
          <button class="sub-tab" data-tab="summary">
            <i data-lucide="bar-chart-2" style="width:14px;height:14px;"></i>สรุปรายห้อง
          </button>
          <button class="sub-tab" data-tab="rooms">
            <i data-lucide="door-open" style="width:14px;height:14px;"></i>จัดการห้อง
          </button>
        </div>

        <!-- Sub-tab: Bookings -->
        <div id="tab-bookings" data-panel="bookings" class="tab-pane active" style="padding:20px;flex:1;overflow:auto;">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--gap-card);margin-bottom:var(--gap-section);">
            <div style="display:flex;gap:var(--gap-tight);flex-wrap:wrap;">
              <button class="filter-pill active" onclick="setFilter('all',this)">ทั้งหมด</button>
              <button class="filter-pill" onclick="setFilter('pending',this)">⏳ รอพิจารณา</button>
              <button class="filter-pill" onclick="setFilter('approved',this)">✅ อนุมัติแล้ว</button>
              <button class="filter-pill" onclick="setFilter('rejected',this)">❌ ไม่อนุมัติ</button>
            </div>
            <input type="text" id="searchInput" placeholder="ค้นหา..." onkeyup="currentPage=1;renderBookings()" style="max-width:240px;padding:8px 13px;border:1.5px solid var(--border);border-radius:10px;outline:none;font-size:13px;">
          </div>
          <div id="bookingsList" style="display:flex;flex-direction:column;gap:var(--gap-item);"></div>
          <div id="paginationBar" style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:18px;flex-wrap:wrap;"></div>
        </div>

        <!-- Sub-tab: Rooms -->
        <div id="tab-rooms" data-panel="rooms" class="tab-pane" style="padding:20px;flex:1;overflow:auto;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--gap-section);">
            <h3 style="font-size:15px;font-weight:800;color:var(--text);">รายการห้อง/สถานที่</h3>
            <button class="btn-primary" onclick="openRoomModal()"><i data-lucide="plus" style="width:14px;height:14px;"></i> เพิ่มห้องใหม่</button>
          </div>
          <div id="roomsList" style="display:flex;flex-direction:column;gap:var(--gap-item);"></div>
        </div>

        <!-- Sub-tab: Summary -->
        <div id="tab-summary" data-panel="summary" class="tab-pane" style="padding:20px;flex:1;overflow:auto;">

          <!-- Header + period pills -->
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--gap-card);margin-bottom:var(--gap-section);">
            <h3 style="font-size:15px;font-weight:800;color:var(--text);">📊 สรุปการขอใช้งานแต่ละห้อง</h3>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button class="filter-pill active" id="sum-pill-day"   onclick="setSumPeriod('day',this)">วันนี้</button>
              <button class="filter-pill"        id="sum-pill-week"  onclick="setSumPeriod('week',this)">สัปดาห์นี้</button>
              <button class="filter-pill"        id="sum-pill-month" onclick="setSumPeriod('month',this)">เดือนนี้</button>
              <button class="filter-pill"        id="sum-pill-year"  onclick="setSumPeriod('year',this)">ปีนี้</button>
            </div>
          </div>
          <div id="sumPeriodLabel" style="font-size:12px;color:var(--text2);font-weight:600;margin-bottom:var(--gap-card);"></div>

          <!-- Grand totals -->
          <div id="sumTotals" style="display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gap-card);margin-bottom:var(--gap-section);"></div>

          <!-- Grouped bar chart: all rooms side-by-side -->
          <div class="chart-card" style="margin-bottom:var(--gap-section);">
            <p class="chart-title">เปรียบเทียบคำขอทุกห้อง — <span id="sumChartPeriodLabel" style="color:var(--purple);"></span></p>
            <p class="chart-sub">แสดงจำนวนคำขอแยกตามสถานะ (กราฟแท่งกลุ่ม)</p>
            <!-- Legend -->
            <div style="display:flex;gap:var(--gap-card);margin-bottom:12px;flex-wrap:wrap;">
              <div style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:var(--purple);display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">ทั้งหมด</span></div>
              <div style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:#22c55e;display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">อนุมัติ</span></div>
              <div style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:#f59e0b;display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">รอพิจารณา</span></div>
              <div style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:#ef4444;display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">ไม่อนุมัติ</span></div>
            </div>
            <div style="overflow-x:auto;">
              <canvas id="sumBarChart" height="220" style="display:block;min-width:300px;"></canvas>
            </div>
            <p id="sumBarEmpty" style="display:none;text-align:center;padding:40px;font-size:12px;color:var(--text3);font-style:italic;">ไม่มีข้อมูลในช่วงเวลานี้</p>
          </div>

          <!-- Trend chart: bookings over time sub-periods -->
          <div class="chart-card" style="margin-bottom:var(--gap-section);">
            <p class="chart-title">แนวโน้มคำขอตามช่วงเวลา</p>
            <p class="chart-sub" id="sumTrendSub">จำนวนคำขอรวมทุกห้องแยกตามช่วงย่อย</p>
            <div style="display:flex;gap:var(--gap-card);margin-bottom:12px;flex-wrap:wrap;">
              <div style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:var(--purple);display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">ทั้งหมด</span></div>
              <div style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:3px;background:#22c55e;display:inline-block;"></span><span style="font-size:11px;font-weight:700;color:#475569;">อนุมัติ</span></div>
            </div>
            <div style="overflow-x:auto;">
              <canvas id="sumTrendChart" height="160" style="display:block;min-width:300px;"></canvas>
            </div>
            <p id="sumTrendEmpty" style="display:none;text-align:center;padding:40px;font-size:12px;color:var(--text3);font-style:italic;">ไม่มีข้อมูลในช่วงเวลานี้</p>
          </div>

          <!-- Per-room detail cards -->
          <div id="summaryList" style="display:flex;flex-direction:column;gap:var(--gap-card);"></div>
        </div>

      </div>
</template><!-- #roomAdminContent -->

<!-- Modal: Approve -->
<div id="approveModal" class="modal-bg">
  <div class="modal-box">
    <div style="display:flex;align-items:center;gap:var(--gap-card);margin-bottom:var(--gap-section);">
      <div style="width:40px;height:40px;background:#dcfce7;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i data-lucide="check-circle" style="width:18px;height:18px;color:var(--green);"></i></div>
      <div><h3 style="font-size:16px;font-weight:800;color:var(--text);">อนุมัติคำขอ</h3><p style="font-size:12px;color:var(--text2);" id="approveModalSub"></p></div>
    </div>
    <div style="margin-bottom:var(--gap-section);"><label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:6px;">หมายเหตุ (ไม่บังคับ)</label><textarea id="approveNote" rows="3" placeholder="เช่น อนุมัติตามที่ขอ..."></textarea></div>
    <div style="display:flex;gap:var(--gap-item);"><button class="btn-secondary" style="flex:1;" onclick="closeModal('approveModal')">ยกเลิก</button><button class="btn-approve" style="flex:2;justify-content:center;padding:11px;" onclick="confirmApprove()"><i data-lucide="check" style="width:14px;height:14px;"></i> ยืนยันอนุมัติ</button></div>
  </div>
</div>

<!-- Modal: Reject -->
<div id="rejectModal" class="modal-bg">
  <div class="modal-box">
    <div style="display:flex;align-items:center;gap:var(--gap-card);margin-bottom:var(--gap-section);">
      <div style="width:40px;height:40px;background:var(--red-light);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i data-lucide="x-circle" style="width:18px;height:18px;color:var(--red);"></i></div>
      <div><h3 style="font-size:16px;font-weight:800;color:var(--text);">ไม่อนุมัติคำขอ</h3><p style="font-size:12px;color:var(--text2);" id="rejectModalSub"></p></div>
    </div>
    <div style="margin-bottom:var(--gap-section);"><label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:6px;">เหตุผล <span style="color:var(--red);">*</span></label><textarea id="rejectReason" rows="3" placeholder="ระบุเหตุผล..."></textarea></div>
    <div style="display:flex;gap:var(--gap-item);"><button class="btn-secondary" style="flex:1;" onclick="closeModal('rejectModal')">ยกเลิก</button><button class="btn-reject" style="flex:2;justify-content:center;padding:11px;" onclick="confirmReject()"><i data-lucide="x" style="width:14px;height:14px;"></i> ยืนยันไม่อนุมัติ</button></div>
  </div>
</div>

<!-- Modal: Delete -->
<div id="deleteModal" class="modal-bg">
  <div class="modal-box">
    <div style="display:flex;align-items:center;gap:var(--gap-card);margin-bottom:var(--gap-card);">
      <div style="width:40px;height:40px;background:var(--red-light);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i data-lucide="trash-2" style="width:18px;height:18px;color:var(--red);"></i></div>
      <div><h3 style="font-size:16px;font-weight:800;color:var(--text);">ลบคำขอ</h3><p style="font-size:12px;color:var(--text2);">ไม่สามารถกู้คืนได้</p></div>
    </div>
    <p style="font-size:14px;color:#475569;margin-bottom:var(--gap-section);padding:12px;background:var(--bg);border-radius:10px;" id="deleteModalText"></p>
    <div style="display:flex;gap:var(--gap-item);"><button class="btn-secondary" style="flex:1;" onclick="closeModal('deleteModal')">ยกเลิก</button><button class="btn-reject" style="flex:2;justify-content:center;padding:11px;" onclick="confirmDelete()"><i data-lucide="trash-2" style="width:14px;height:14px;"></i> ยืนยันลบ</button></div>
  </div>
</div>

<!-- Modal: Room -->
<div id="roomModal" class="modal-bg">
  <div class="modal-box" style="max-width:520px;">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-title-icon" style="background:var(--purple-light);">
          <i data-lucide="door-open" style="color:var(--purple);"></i>
        </div>
        <h3 style="font-size:16px;font-weight:800;color:var(--text);" id="roomModalTitle">เพิ่มห้องใหม่</h3>
      </div>
      <button class="modal-close" onclick="closeModal('roomModal')"><i data-lucide="x"></i></button>
    </div>
    <div style="margin-bottom:13px;"><label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:5px;">ชื่อห้อง/สถานที่ <span style="color:var(--red);">*</span></label><input type="text" id="roomName" placeholder="เช่น ห้องประชุมชั้น 2"></div>
    <div style="margin-bottom:13px;"><label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:5px;">ความจุ (คน)</label><input type="text" id="roomCapacity" placeholder="เช่น 50"></div>
    <div style="margin-bottom:13px;"><label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:5px;">รายละเอียด</label><input type="text" id="roomDetail" placeholder="เช่น มีโปรเจคเตอร์, แอร์"></div>
    <!-- Room image upload -->
    <div style="margin-bottom:var(--gap-section);">
      <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:7px;">🖼️ รูปภาพห้อง (ไม่บังคับ)</label>
      <input type="file" id="roomImageFile" accept="image/*" style="display:none;" onchange="handleRoomImage(this)">
      <div class="upload-area" id="roomUploadArea" onclick="document.getElementById('roomImageFile').click()">
        <div id="roomUploadDefault"><i data-lucide="image-plus" style="width:28px;height:28px;color:var(--purple-accent);margin:0 auto 6px;display:block;"></i><p style="font-size:13px;font-weight:700;color:var(--purple);">คลิกเพื่อเลือกรูปภาพห้อง</p><p style="font-size:11px;color:var(--text3);margin-top:2px;">JPG, PNG — ไม่เกิน 5MB</p></div>
        <div id="roomUploadPreview" style="display:none;"><div style="display:flex;align-items:center;gap:var(--gap-item);"><img id="roomPreviewImg" src="" style="width:60px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--border);flex-shrink:0;"><div style="text-align:left;flex:1;min-width:0;"><p id="roomFileName" style="font-size:12px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></p><p id="roomFileSize" style="font-size:11px;color:var(--text2);"></p></div><button type="button" onclick="clearRoomImage(event)" style="background:var(--red-light);border:none;color:var(--red-dark);border-radius:8px;padding:4px 9px;cursor:pointer;font-size:11px;font-weight:700;flex-shrink:0;">ลบ</button></div></div>
      </div>
    </div>
    <div style="display:flex;gap:var(--gap-item);"><button class="btn-secondary" style="flex:1;" onclick="closeModal('roomModal')">ยกเลิก</button><button class="btn-primary" style="flex:2;justify-content:center;padding:11px;" onclick="saveRoom()"><i data-lucide="save" style="width:14px;height:14px;"></i> บันทึก</button></div>
  </div>
</div>

<!-- File View Modal -->
<div id="fileViewModal">
  <div style="background:var(--white);border-radius:20px;max-width:700px;width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.3);">
    <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <span style="font-weight:800;color:var(--text);font-size:14px;">📎 ไฟล์แนบ — ผังการจัดโต๊ะ</span>
      <button onclick="closeFileView()" style="background:var(--bg-alt);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-weight:700;font-size:12px;color:var(--text2);">✕ ปิด</button>
    </div>
    <div style="flex:1;overflow:auto;padding:20px;text-align:center;background:var(--bg);">
      <img id="fileViewImg" src="" style="max-width:100%;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);" onerror="this.style.display='none';document.getElementById('fileViewError').style.display='block'">
      <div id="fileViewError" style="display:none;padding:40px;color:var(--text3);"></div>
      <p id="fileViewName" style="font-size:12px;color:var(--text2);margin-top:10px;font-weight:600;"></p>
    </div>
  </div>
</div>

<script src="js/room-admin.js"></script>
</body>
</html>

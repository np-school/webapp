<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="var(--accent)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NP Origins">
  <link rel="icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}</script>

  <title>จัดการระบบแจ้งซ่อม – โรงเรียนหนองกี่พิทยาคม</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="shared/tailwind-built.css" rel="stylesheet">
  <link href="shared/styles-new.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@1.24.0"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  <script src="shared/firebase.js"></script>
  <script src="shared/common.js"></script>
  <style>
    
    .rp-status{ display:inline-flex; align-items:center; gap:5px; padding:3px 11px; border-radius:20px; font-size:11px; font-weight:800; flex-shrink:0; white-space:nowrap; }
    /* .rp-status.c-* / .rp-photo-thumb / .rp-log-item / .rp-log-dot ย้ายไป styles-new.css แล้ว (เหมือนกับ repair-user.html เป๊ะ) */
    .rp-urgent-dot{ width:7px; height:7px; border-radius:50%; background:var(--red); display:inline-block; margin-right:5px; flex-shrink:0; }
    .rp-urgent-tag{ display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:800; color:var(--red-dark); background:#fff; border:1px solid var(--red); padding:2px 9px; border-radius:20px; flex-shrink:0; white-space:nowrap; }
    .rp-row{ cursor:pointer; }
    .rp-action-card{ background:var(--bg-alt); border:1px solid var(--border); border-radius:14px; padding:16px; margin-top:16px; }
    .rp-action-card h4{ font-size:13px; font-weight:800; color:var(--text); margin-bottom:10px; display:flex; align-items:center; gap:6px; }

    .rp-sec-title{ font-size:13.5px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:6px; margin:22px 0 10px; }
    .rp-sec-title:first-child{ margin-top:0; }
    .rp-mini-card{ background:var(--bg-alt); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:box-shadow .15s; }
    .rp-mini-card:hover{ box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .rp-settings-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media(max-width:820px){ .rp-settings-grid{ grid-template-columns:1fr; } }
    .rp-set-row{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px dashed var(--border-soft); }
    .rp-set-row:last-child{ border-bottom:none; }
    .rp-set-row .grow{ flex:1; min-width:0; }
    .rp-chip{ display:inline-flex; align-items:center; gap:5px; background:var(--bg-alt); border:1px solid var(--border); border-radius:20px; padding:4px 6px 4px 12px; font-size:11.5px; font-weight:600; color:var(--text2); margin:3px 4px 0 0; }
    .rp-chip button{ border:none; background:rgba(0,0,0,.06); color:var(--text2); width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
    .rp-chip button:hover{ background:var(--red-light); color:var(--red-dark); }
    .rp-bld-item{ border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
    .rp-bld-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .rp-bld-name{ font-weight:800; font-size:13.5px; color:var(--text); display:flex; align-items:center; gap:6px; }
    .rp-inline-form{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .rp-inline-form input, .rp-inline-form select{ flex:1; min-width:110px; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:var(--text2);font-size:14px;font-weight:700;">กำลังตรวจสอบสิทธิ์...</p>
</div>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<div id="accessDenied" style="display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="width:72px;height:72px;background:var(--red-light);border-radius:50%;display:flex;align-items:center;justify-content:center;">
    <i data-lucide="shield-off" style="width:36px;height:36px;color:var(--red);"></i>
  </div>
  <div style="text-align:center;">
    <h2 style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px;">ไม่มีสิทธิ์เข้าถึง</h2>
    <p style="color:var(--text2);font-size:14px;">คุณไม่มีสิทธิ์เข้าหน้านี้</p>
  </div>
  <a href="index.html" style="padding:10px 24px;background:var(--accent);color:white;border-radius:12px;font-weight:700;text-decoration:none;">← กลับหน้าแรก</a>
</div>

<div id="myApp" style="display:none;"></div>

<button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTopContent()" title="ย้อนกลับด้านบน">
  <i data-lucide="arrow-up" style="width:20px;height:20px;"></i>
</button>

<!-- ══════════════════ Modal: พิมพ์รายงาน ══════════════════ -->
<div id="printReportModal" class="modal-bg">
  <div class="modal-box wide">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-title-icon" style="background:var(--purple-light);">
          <i data-lucide="printer" style="color:var(--purple);"></i>
        </div>
        <div>
          <h3>พิมพ์รายงานแจ้งซ่อม</h3>
          <p>เลือกช่วงเวลาและผู้รับผิดชอบที่ต้องการ</p>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal('printReportModal')"><i data-lucide="x"></i></button>
    </div>

    <div class="form-group">
      <label class="form-label">ช่วงเวลา</label>
      <div id="printPeriodBar" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>

    <div class="form-group">
      <label class="form-label">สถานะ</label>
      <select id="printStatusFilter">
        <option value="">ทั้งหมด แยกตามสถานะ</option>
        <option value="reported">แจ้งใหม่ (รออนุมัติ)</option>
        <option value="progress">กำลังซ่อม</option>
        <option value="done">รอผู้แจ้งตรวจสอบ</option>
        <option value="closed">ปิดงานแล้ว</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">ผู้รับผิดชอบ</label>
      <select id="printTechnicianFilter"><option value="">ทั้งหมด</option></select>
    </div>

    <div style="display:flex;gap:10px;margin-top:22px;">
      <button class="btn-secondary" style="flex:1;justify-content:center;" onclick="closeModal('printReportModal')">ยกเลิก</button>
      <button class="btn-primary" style="flex:1;justify-content:center;" onclick="doPrintReport()">
        <i data-lucide="printer" style="width:15px;height:15px;"></i> พิมพ์
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════ Modal: รายละเอียด + ดำเนินการ ══════════════════ -->
<div id="detailModal" class="modal-bg">
  <div class="modal-box wider" id="detailModalBody"></div>
</div>

<script src="js/repair-admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ตรวจ Portfolio – โรงเรียนหนองกี่พิทยาคม</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared/styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="shared/firebase.js"></script>
<script src="shared/common.js"></script>
<style>
body { background:#f8fafc; min-height:100vh; }
.page-wrap { max-width:1100px; margin:0 auto; padding:24px 16px 60px; }

/* ── Role badge bar ── */
.role-bar {
  background: white; border:1px solid #e2e8f0; border-radius:14px;
  padding:14px 20px; margin-bottom:20px;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}

/* ── Pending badge on tab ── */
.tab-badge {
  background:#ef4444; color:white; border-radius:20px;
  font-size:10px; font-weight:800; padding:1px 7px; margin-left:4px;
}

/* ── Doc review card ── */
.review-card {
  background:white; border:1.5px solid #e2e8f0; border-radius:16px; overflow:hidden;
  transition:box-shadow .2s;
}
.review-card:hover { box-shadow:0 4px 20px rgba(0,0,0,.08); }
.review-card-header { padding:16px 20px 0; }
.review-card-body   { padding:0 20px 16px; }
.review-card-footer {
  border-top:1px solid #f1f5f9; padding:12px 20px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:#fafafa;
}

/* ── Action buttons ── */
.btn-approve {
  background:#16a34a; color:white; border:none; border-radius:10px;
  padding:9px 20px; font-size:13px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; gap:6px; transition:all .15s;
  font-family:'Sarabun',sans-serif;
}
.btn-approve:hover { background:#15803d; transform:translateY(-1px); box-shadow:0 4px 12px rgba(22,163,74,.3); }
.btn-reject {
  background:white; color:#dc2626; border:1.5px solid #fecaca; border-radius:10px;
  padding:9px 20px; font-size:13px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; gap:6px; transition:all .15s;
  font-family:'Sarabun',sans-serif;
}
.btn-reject:hover { background:#fef2f2; border-color:#f87171; }

/* ── View file btn ── */
.btn-file {
  background:#eff6ff; color:#1d4ed8; border:1.5px solid #bfdbfe;
  border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700;
  cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:5px;
  font-family:'Sarabun',sans-serif;
}
.btn-file:hover { background:#dbeafe; }

/* ── Section header ── */
.section-hd {
  font-size:11px; font-weight:800; color:#94a3b8;
  text-transform:uppercase; letter-spacing:1.5px; margin:24px 0 10px;
}

/* ── Empty state ── */
.empty-state {
  text-align:center; padding:60px 20px; color:#94a3b8;
}
.empty-state svg { margin-bottom:16px; opacity:.4; }

/* ── Filter tabs ── */
.view-tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.vtab {
  padding:7px 16px; border-radius:20px; font-size:13px; font-weight:700;
  cursor:pointer; border:1.5px solid #e2e8f0; background:white; color:#64748b;
  transition:all .15s;
}
.vtab.active { background:#1d4ed8; border-color:#1d4ed8; color:white; }

/* ── Reject modal ── */
#rejectModal .modal-box { max-width:420px; }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner purple"></div>
  <p style="color:#64748b;font-size:14px;font-weight:600">กำลังโหลด...</p>
</div>

<!-- Navbar -->
<nav class="navbar purple">
  <div class="navbar-inner">
    <div style="display:flex;align-items:center;gap:12px">
      <button id="hamburgerBtn" onclick="toggleSidebar()" style="background:rgba(255,255,255,.15);border:none;border-radius:10px;padding:8px;cursor:pointer;color:white">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div>
        <p style="color:rgba(255,255,255,.7);font-size:11px;font-weight:600">โรงเรียนหนองกี่พิทยาคม</p>
        <h1 style="color:white;font-size:16px;font-weight:800" id="pageTitle">ตรวจ Portfolio</h1>
      </div>
    </div>
    <div id="navUser" style="display:flex;align-items:center;gap:10px"></div>
  </div>
</nav>

<div class="page-wrap">

  <!-- Role info bar -->
  <div class="role-bar" id="roleBar" style="display:none">
    <svg width="18" height="18" fill="none" stroke="#64748b" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-1a6 6 0 0 1 12 0v1"/></svg>
    <span style="font-size:13px;color:#64748b">สิทธิ์ของคุณ:</span>
    <span id="roleLabel" class="role-badge" style="font-size:13px;padding:4px 14px"></span>
    <span id="roleDesc" style="font-size:12px;color:#94a3b8;margin-left:4px"></span>
  </div>

  <!-- View tabs -->
  <div class="view-tabs" id="viewTabs" style="display:none">
    <button class="vtab active" data-view="pending" onclick="setView('pending',this)">
      รอฉันตรวจ <span class="tab-badge" id="pendingCount">0</span>
    </button>
    <button class="vtab" data-view="all" onclick="setView('all',this)">ทั้งหมด</button>
  </div>

  <!-- Doc list -->
  <div id="docList"></div>

</div>

<!-- Reject modal -->
<div class="modal-bg" id="rejectModal">
  <div class="modal-box">
    <h3 style="font-size:16px;font-weight:800;margin-bottom:4px">ส่งกลับแก้ไข</h3>
    <p style="font-size:13px;color:#64748b;margin-bottom:14px">ระบุเหตุผลที่ส่งกลับ (จะแสดงให้ครูเห็น)</p>
    <textarea id="rejectNote" rows="4" placeholder="เช่น เนื้อหายังไม่ครบถ้วน..."></textarea>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button onclick="closeModal('rejectModal')" style="flex:1;padding:10px;border:1.5px solid #e2e8f0;border-radius:10px;background:white;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif">ยกเลิก</button>
      <button onclick="confirmReject()" style="flex:1;padding:10px;border:none;border-radius:10px;background:#dc2626;color:white;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif">ส่งกลับ</button>
    </div>
  </div>
</div>

<script>
var currentUser = null;
var currentUserRole = '';
var currentUserDept = '';
var allDocs = [];
var currentView = 'pending';
var pendingRejectDocId = null;

/* ── ROLES ที่มีสิทธิ์เข้าหน้านี้ ── */
var ALLOWED_ROLES = ['หัวหน้ากลุ่มสาระ','ผู้ช่วยผู้อำนวยการ','รองผู้อำนวยการ','ผู้อำนวยการ','admin'];

/* ── Auth ── */
auth.onAuthStateChanged(function(user) {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;

  db.collection('users').doc(user.uid).get().then(function(d) {
    var data = d.exists ? d.data() : {};
    currentUserRole = data.role || '';
    currentUserDept = data.dept || '';

    if (!ALLOWED_ROLES.includes(currentUserRole)) {
      alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้');
      window.location.href = 'index.html';
      return;
    }

    // Nav
    document.getElementById('navUser').innerHTML =
      '<span style="color:rgba(255,255,255,.85);font-size:13px;font-weight:600">' + (user.displayName || user.email) + '</span>' +
      '<button onclick="auth.signOut().then(()=>location.href=\'index.html\')" style="background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:6px 12px;color:white;cursor:pointer;font-size:12px;font-weight:700">ออกจากระบบ</button>';

    // Role bar
    var roleEl = document.getElementById('roleLabel');
    roleEl.textContent = currentUserRole;
    roleEl.className = 'role-badge ' + currentUserRole;

    var descs = {
      'หัวหน้ากลุ่มสาระ':   'ตรวจเอกสารที่ครูในกลุ่มสาระส่งมา',
      'ผู้ช่วยผู้อำนวยการ':  'ตรวจเอกสารที่ผ่านหัวหน้ากลุ่มสาระแล้ว',
      'รองผู้อำนวยการ':     'ตรวจเอกสารที่ผ่านผู้ช่วยผู้อำนวยการแล้ว',
      'ผู้อำนวยการ':        'อนุมัติขั้นสุดท้าย',
      'admin':              'ดูภาพรวมทั้งหมด'
    };
    document.getElementById('roleDesc').textContent = descs[currentUserRole] || '';
    document.getElementById('roleBar').style.display = 'flex';
    document.getElementById('viewTabs').style.display = 'flex';

    loadDocs();
  });
});

/* ── Load docs ── */
function loadDocs() {
  /* admin และ รองผอ/ผอ/ผช.ผอ ดูได้ทุก dept
     หัวหน้ากลุ่มสาระ ดูเฉพาะ dept ตัวเอง */
  var q = db.collection('portfolio_submissions').orderBy('updatedAt', 'desc');

  q.get().then(function(snap) {
    allDocs = [];
    snap.forEach(function(d) { allDocs.push(Object.assign({ id: d.id }, d.data())); });

    // filter dept สำหรับ หัวหน้ากลุ่มสาระ
    if (currentUserRole === 'หัวหน้ากลุ่มสาระ' && currentUserDept) {
      allDocs = allDocs.filter(function(doc) { return doc.dept === currentUserDept; });
    }

    renderDocs();
    hideLoading();
  });
}

/* ── View tab ── */
function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.vtab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderDocs();
}

/* ── สถานะที่ role นี้รอตรวจ ── */
function pendingStatusForRole(role) {
  /* คือสถานะที่ reviewer = role นี้ */
  var map = {
    'หัวหน้ากลุ่มสาระ':   'submitted',
    'ผู้ช่วยผู้อำนวยการ':  'หัวหน้ากลุ่มสาระตรวจแล้ว',
    'รองผู้อำนวยการ':     'ผู้ช่วยผู้อำนวยการตรวจแล้ว',
    'ผู้อำนวยการ':        'รองผู้อำนวยการตรวจแล้ว',
    'admin':              null  // admin เห็นทุก pending
  };
  return map[role] || null;
}

/* ── Render ── */
function renderDocs() {
  var pendingStatus = pendingStatusForRole(currentUserRole);
  var list = allDocs;

  if (currentView === 'pending') {
    if (currentUserRole === 'admin') {
      // admin เห็น docs ที่ยังไม่ final
      list = allDocs.filter(function(d) { return d.status !== 'final_approved'; });
    } else {
      list = allDocs.filter(function(d) { return d.status === pendingStatus; });
    }
  }

  // update badge count
  var pCount = currentUserRole === 'admin'
    ? allDocs.filter(function(d) { return d.status !== 'final_approved'; }).length
    : allDocs.filter(function(d) { return d.status === pendingStatus; }).length;
  document.getElementById('pendingCount').textContent = pCount;

  var container = document.getElementById('docList');
  if (!list.length) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
          '<path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 0 0 1.946-.806 3.42 3.42 0 0 1 4.438 0 3.42 3.42 0 0 0 1.946.806 3.42 3.42 0 0 1 3.138 3.138 3.42 3.42 0 0 0 .806 1.946 3.42 3.42 0 0 1 0 4.438 3.42 3.42 0 0 0-.806 1.946 3.42 3.42 0 0 1-3.138 3.138 3.42 3.42 0 0 0-1.946.806 3.42 3.42 0 0 1-4.438 0 3.42 3.42 0 0 0-1.946-.806 3.42 3.42 0 0 1-3.138-3.138 3.42 3.42 0 0 0-.806-1.946 3.42 3.42 0 0 1 0-4.438 3.42 3.42 0 0 0 .806-1.946 3.42 3.42 0 0 1 3.138-3.138z"/>' +
        '</svg>' +
        '<p style="font-size:15px;font-weight:700;margin-bottom:6px">ไม่มีเอกสารที่รอตรวจ</p>' +
        '<p style="font-size:13px">เอกสารทุกฉบับได้รับการตรวจสอบแล้ว</p>' +
      '</div>';
    return;
  }

  container.innerHTML = list.map(function(doc) {
    var sc = statusColor(doc.status);
    var canAct = canApprove(currentUserRole, doc.status) || currentUserRole === 'admin';
    var nextLbl = getNextStatus(doc.status) ? statusLabel(getNextStatus(doc.status)) : 'อนุมัติขั้นสุดท้าย';

    return '<div class="review-card" style="margin-bottom:14px">' +
      '<div class="review-card-header">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;padding-top:16px">' +
          '<div>' +
            '<div style="font-size:15px;font-weight:800;color:#1e293b">' + (doc.teacherName || '—') + '</div>' +
            '<div style="font-size:12px;color:#94a3b8;margin-top:2px">' + (doc.dept || '') + (doc.docTitle ? ' · ' + doc.docTitle : '') + '</div>' +
          '</div>' +
          '<span class="status-badge ' + doc.status + '" style="flex-shrink:0">' + statusLabel(doc.status) + '</span>' +
        '</div>' +
        workflowBarHtml(doc.status) +
        '<div style="padding-bottom:12px"></div>' +
      '</div>' +

      '<div class="review-card-body">' +
        (doc.note ? '<div style="background:#fef9c3;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:10px"><strong>หมายเหตุจากการแก้ไขก่อนหน้า:</strong> ' + doc.note + '</div>' : '') +
        '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
          (doc.fileUrl ? '<a href="' + doc.fileUrl + '" target="_blank" class="btn-file">📎 ดูไฟล์เอกสาร</a>' : '') +
          '<span style="font-size:12px;color:#94a3b8;align-self:center">ส่งเมื่อ: ' + fmtDate(doc.updatedAt) + '</span>' +
        '</div>' +
      '</div>' +

      '<div class="review-card-footer">' +
        (canAct ?
          '<div style="display:flex;gap:8px">' +
            '<button class="btn-approve" onclick="approveDoc(\'' + doc.id + '\')">' +
              '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m5 12 5 5L20 7"/></svg>' +
              (doc.status === 'รองผู้อำนวยการตรวจแล้ว' ? 'อนุมัติ' : 'ผ่านการตรวจ') +
            '</button>' +
            '<button class="btn-reject" onclick="openReject(\'' + doc.id + '\')">' +
              '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3"/></svg>' +
              'ส่งกลับแก้ไข' +
            '</button>' +
          '</div>'
          :
          '<span style="font-size:12px;color:#94a3b8">รอการตรวจจาก ' + (getReviewerRole(doc.status) || '—') + '</span>'
        ) +
        '<span style="font-size:11px;color:#cbd5e1">ID: ' + doc.id.slice(-6) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

/* ── Approve ── */
function approveDoc(docId) {
  var doc = allDocs.find(function(d) { return d.id === docId; });
  if (!doc) return;

  if (!canApprove(currentUserRole, doc.status) && currentUserRole !== 'admin') {
    showToast('คุณไม่มีสิทธิ์ตรวจเอกสารนี้', 'error');
    return;
  }

  var nextStatus = getNextStatus(doc.status);
  if (!nextStatus) { showToast('สถานะนี้ไม่มีขั้นถัดไป', 'warn'); return; }

  var updateData = {
    status:    nextStatus,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    note:      ''
  };

  // บันทึก log ว่าใครตรวจ
  updateData['reviewedBy_' + doc.status] = {
    uid:  currentUser.uid,
    name: currentUser.displayName || currentUser.email,
    role: currentUserRole,
    at:   firebase.firestore.FieldValue.serverTimestamp()
  };

  db.collection('portfolio_submissions').doc(docId).update(updateData).then(function() {
    doc.status = nextStatus;
    renderDocs();
    showToast('✅ ตรวจผ่านแล้ว → ' + statusLabel(nextStatus), 'success');
  }).catch(function(e) {
    showToast('เกิดข้อผิดพลาด: ' + e.message, 'error');
  });
}

/* ── Reject ── */
function openReject(docId) {
  pendingRejectDocId = docId;
  document.getElementById('rejectNote').value = '';
  openModal('rejectModal');
}

function confirmReject() {
  var note = document.getElementById('rejectNote').value.trim();
  if (!note) { showToast('กรุณาระบุเหตุผล', 'warn'); return; }

  var docId = pendingRejectDocId;
  var doc   = allDocs.find(function(d) { return d.id === docId; });
  if (!doc) return;

  db.collection('portfolio_submissions').doc(docId).update({
    status:    'revision',
    note:      note,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    doc.status = 'revision';
    doc.note   = note;
    closeModal('rejectModal');
    renderDocs();
    showToast('ส่งกลับแก้ไขแล้ว', 'warn');
  }).catch(function(e) {
    showToast('เกิดข้อผิดพลาด: ' + e.message, 'error');
  });
}
</script>
</body>
</html>

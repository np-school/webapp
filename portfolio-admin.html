  <style>
    *{font-family:'Sarabun',sans-serif;box-sizing:border-box;margin:0;padding:0;}
    #loadingOverlay{display:flex;position:fixed;inset:0;background:rgba(255,255,255,.96);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
    .spinner{border:3px solid #e2e8f0;border-top:3px solid #7c3aed;border-radius:50%;width:44px;height:44px;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .card{background:white;border-radius:16px;border:1px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.04);}
    .toast{position:fixed;bottom:20px;right:20px;padding:13px 20px;border-radius:10px;color:white;font-weight:700;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:9999;animation:toastIn .3s ease;}
    .toast.hide{animation:toastOut .3s ease forwards;}
    @keyframes toastIn{from{transform:translateX(400px);opacity:0;}to{transform:translateX(0);opacity:1;}}
    @keyframes toastOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(400px);opacity:0;}}
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.65);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
    .modal-bg.open{display:flex;}
    .modal-box{background:white;border-radius:20px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2);}
    input[type=text],select,textarea{border:1.5px solid #e2e8f0;padding:10px 14px;border-radius:10px;outline:none;font-size:14px;width:100%;color:#1e293b;font-family:'Sarabun',sans-serif;}
    input:focus,select:focus,textarea:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);}

    /* ── Sem pill ── */
    .sem-pill{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:700;border:2px solid #e2e8f0;background:white;color:#64748b;cursor:pointer;transition:all .2s;}
    .sem-pill.active{background:#7c3aed;border-color:#7c3aed;color:white;box-shadow:0 4px 12px rgba(124,58,237,.25);}

    /* ── View toggle ── */
    .view-btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid #e2e8f0;background:white;color:#64748b;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
    .view-btn.active{background:#7c3aed;border-color:#7c3aed;color:white;}

    /* ── Teacher row ── */
    .teacher-row{background:white;border:1.5px solid #e2e8f0;border-radius:14px;padding:0;overflow:hidden;transition:border-color .15s;}
    .teacher-row:hover{border-color:#c4b5fd;}
    .teacher-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
    .teacher-docs{display:none;padding:0 16px 16px;border-top:1px solid #f1f5f9;}
    .teacher-docs.open{display:block;}

    /* ── mini doc grid ── */
    .doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-top:12px;}
    .doc-chip{padding:8px 10px;border-radius:10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;border:1.5px solid;cursor:pointer;transition:all .15s;}
    .doc-chip:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.08);}
    .chip-none{background:#f8fafc;border-color:#e2e8f0;color:#94a3b8;}
    .chip-submitted{background:#f0fdf4;border-color:#86efac;color:#15803d;}
    .chip-head_reviewed{background:#e0f2fe;border-color:#7dd3fc;color:#0369a1;}
    .chip-reviewed{background:#eff6ff;border-color:#93c5fd;color:#1e40af;}
    .chip-final_approved{background:#f0fdf4;border-color:#4ade80;color:#15803d;}
    .chip-revision{background:#fffbeb;border-color:#fde68a;color:#92400e;}

    /* ── Workflow status bar ── */
    .workflow-bar{display:flex;align-items:center;gap:0;margin-top:8px;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;}
    .wf-step{flex:1;padding:5px 4px;text-align:center;font-size:9px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:2px;transition:background .2s;}
    .wf-step.done{background:#dcfce7;color:#15803d;}
    .wf-step.active{background:#fef9c3;color:#92400e;}
    .wf-step.pending{background:#f8fafc;color:#94a3b8;}
    .wf-step.final{background:#7c3aed;color:white;}
    .wf-divider{width:1px;background:#e2e8f0;align-self:stretch;flex-shrink:0;}

    /* ── Doc type matrix view ── */
    .matrix-table{width:100%;border-collapse:collapse;}
    .matrix-table th{font-size:10px;font-weight:800;color:#94a3b8;text-align:center;padding:6px 4px;border-bottom:1px solid #e2e8f0;}
    .matrix-table td{text-align:center;padding:5px 4px;border-bottom:1px solid #f8fafc;}
    .matrix-table tr:hover td{background:#faf5ff;}
    .matrix-cell{width:22px;height:22px;border-radius:6px;margin:0 auto;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .cell-none{background:#f1f5f9;}
    .cell-submitted{background:#dcfce7;}
    .cell-head_reviewed{background:#bae6fd;}
    .cell-reviewed{background:#dbeafe;}
    .cell-final_approved{background:#bbf7d0;}
    .cell-revision{background:#fef9c3;}

    /* ── stat card ── */
    .stat-card{padding:16px 18px;border-radius:16px;background:white;border:1px solid #e2e8f0;display:flex;align-items:center;gap:12px;}

    /* ── pbar ── */
    .pbar-bg{background:#e2e8f0;border-radius:4px;height:6px;overflow:hidden;}
    .pbar-fill{height:100%;border-radius:4px;background:#7c3aed;transition:width .4s ease;}

    /* ── filter pills ── */
    .filter-pill{padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:12px;font-weight:700;color:#64748b;cursor:pointer;background:white;transition:all .15s;}
    .filter-pill.active{background:#7c3aed;border-color:#7c3aed;color:white;}

    @media(max-width:768px){
      .stat-cards-grid{grid-template-columns:repeat(3,1fr)!important;}
      .doc-grid{grid-template-columns:repeat(2,1fr)!important;}
    }
    @media(max-width:480px){
      .stat-cards-grid{grid-template-columns:repeat(2,1fr)!important;}
      .matrix-table{font-size:10px;}
    }
  </style>
</head>

var availableGroups = []; /* กลุ่มสาระที่มีอยู่จริงใน staff (สร้าง dynamic) */

/* กลุ่มสาระที่นับเป็น "ครู" (ไม่รวมผู้บริหาร/เจ้าหน้าที่) */
var NON_TEACHER_GROUPS = ['ผู้บริหาร', 'เจ้าหน้าที่'];

/* normalise ชื่อกลุ่มสาระ ให้ใช้เปรียบเทียบได้ (ตัดช่องว่างพิเศษ) */
function normaliseGroup(g) {
  return (g || '').replace(/\s+/g, ' ').trim();
}

/* ─── AUTH + ADMIN CHECK ─── */
var currentUserEmail = '';
var isHeadOfGroupOnly = false; /* true = หัวหน้ากลุ่มสาระ ไม่ใช่ portfolio admin เต็ม */
var headOfGroupName   = '';    /* ชื่อกลุ่มสาระของหัวหน้า */

auth.onAuthStateChanged(function(u) {
  var ov = document.getElementById('loadingOverlay');
  if (!u) { window.location.href = 'index.html'; return; }

  currentUserEmail = u.email.toLowerCase();

  db.collection('admins').doc(currentUserEmail).get().then(function(doc) {
    if (ov) ov.style.display = 'none';
    if (!doc.exists) { document.getElementById('accessDenied').style.display='flex'; return; }
    var p = doc.data().permissions || {};
    var isSA = currentUserEmail === 'nattapol@nongki.ac.th';
    var hasPortfolio  = isSA || !!p.portfolio;
    var hasHeadOfGroup = !!p.headOfGroup;

    if (!hasPortfolio && !hasHeadOfGroup) {
      document.getElementById('accessDenied').style.display='flex'; return;
    }

    /* หัวหน้ากลุ่มสาระ: ล็อกมุมมองเฉพาะกลุ่มของตน */
    if (!hasPortfolio && hasHeadOfGroup) {
      isHeadOfGroupOnly = true;
      /* ดึงกลุ่มสาระของตนจาก staff collection */
      db.collection('staff').where('email','==',currentUserEmail).limit(1).get().then(function(ss) {
        if (!ss.empty) {
          headOfGroupName = normaliseGroup(ss.docs[0].data().group || '');
        }
        bootApp(u);
      });
      return;
    }
    bootApp(u);
  }).catch(function() {
    if (ov) ov.style.display = 'none';
    document.getElementById('accessDenied').style.display = 'flex';
  });
});

function bootApp(u) {
    document.getElementById('adminApp').style.display = 'block';
    buildNavbar('Admin – ติดตามส่งงานประจำภาคเรียน', true);
    updateNavUser(u);
    buildSidebar('portfolio-admin');
    var sec = document.getElementById('adminSidebarSection');
    if (sec) { sec.style.display='block'; lucide.createIcons(); }
    updateSidebarProfile(u);

    /* แสดง banner สำหรับหัวหน้ากลุ่มสาระ */
    if (isHeadOfGroupOnly) {
      var banner = document.createElement('div');
      banner.style.cssText = 'background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:10px 16px;margin:16px 24px 0;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e;font-weight:700;';
      banner.innerHTML = '<i data-lucide="star" style="width:16px;height:16px;color:#d97706;flex-shrink:0;"></i> คุณเข้าถึงในฐานะ <b>หัวหน้ากลุ่มสาระ</b> — แสดงเฉพาะกลุ่มสาระ: <span style="background:#d97706;color:white;padding:2px 10px;border-radius:20px;margin-left:4px;">' + (headOfGroupName || '...') + '</span>';
      var mainGrid = document.querySelector('#adminApp > nav + div') || document.getElementById('adminApp');
      mainGrid.insertBefore(banner, mainGrid.firstChild.nextSibling || mainGrid.firstChild);
      lucide.createIcons();
    }

    loadAllSubmissions();
    lucide.createIcons();
}

/* ─── YEAR / SEM ─── */
function changeYear(d) {
  currentYear += d;
  document.getElementById('yearLabel').textContent = currentYear;
  loadAllSubmissions();
}
function selectSem(s) {
  currentSem = s;
  document.getElementById('semPill1').className = 'sem-pill' + (s===1?' active':'');
  document.getElementById('semPill2').className = 'sem-pill' + (s===2?' active':'');
  loadAllSubmissions();
}

function loadAllSubmissions() {
  var main = document.getElementById('mainContent');
  main.innerHTML = '<div style="text-align:center;padding:60px;color:#94a3b8;font-size:14px;"><i data-lucide="loader" style="width:28px;height:28px;animation:spin .8s linear infinite;"></i><p style="margin-top:12px;">กำลังโหลดข้อมูล...</p></div>';
  lucide.createIcons();

  var key = currentYear + '_' + currentSem;

  /* reset doc filter เมื่อ reload */
  currentDocFilter = 'all';
  buildDocFilterBar();

  /* ── 1. ดึง staff ทั้งหมด → สร้าง teacherMap จากชื่อ/ตำแหน่ง/กลุ่มสาระจริง ── */
  db.collection('staff').orderBy('name').get().then(function(staffSnap) {
    allSubs = [];
    teacherMap = {};
    availableGroups = [];
    var groupSet = {};

    staffSnap.forEach(function(d) {
      var s = Object.assign({ id: d.id }, d.data());
      if (!s.email) return;
      var eKey = s.email.toLowerCase();
      var grp  = normaliseGroup(s.group);
      var isTeacher = NON_TEACHER_GROUPS.indexOf(grp) === -1;

      /* เก็บกลุ่มสาระที่เป็นครูจริง ๆ */
      if (isTeacher && grp && !groupSet[grp]) {
        groupSet[grp] = true;
        availableGroups.push(grp);
      }

      teacherMap[eKey] = {
        uid:          eKey,          /* ใช้ email เป็น key เหมือนเดิม */
        email:        eKey,
        staffName:    s.name  || '', /* ชื่อจริงจาก staff */
        displayName:  s.name  || eKey,
        position:     s.position || '',
        staffGroup:   grp,
        isTeacher:    isTeacher,
        subs:         {}
      };
    });

    /* สร้าง group filter bar ตามกลุ่มที่มีจริงใน staff */
    /* ถ้าเป็นหัวหน้ากลุ่มสาระ → ล็อก filter เฉพาะกลุ่มของตน */
    if (isHeadOfGroupOnly && headOfGroupName) {
      currentGroup = headOfGroupName;
    }
    buildGroupFilterBar();
    /* ซ่อน group filter bar ถ้าเป็น headOfGroup (ไม่ให้เปลี่ยนได้) */
    if (isHeadOfGroupOnly) {
      var bar = document.getElementById('groupFilterBar');
      if (bar) bar.style.display = 'none';
    }
    buildDocFilterBar();

    /* ── 2. ดึง submissions แล้ว join กับ teacherMap ── */
    return db.collection('portfolio_submissions').where('yearSem','==',key).get().then(function(snap) {
      snap.forEach(function(d) {
        var data = Object.assign({ id: d.id }, d.data());
        allSubs.push(data);
        var eKey = (data.email || '').toLowerCase();
        if (!eKey) return;

        if (teacherMap[eKey]) {
          /* พบใน staff → ใช้ชื่อจาก staff แทน displayName ของ Google */
          teacherMap[eKey].subs[data.docTypeId] = data;
        } else {
          /* ครูส่งงานแต่ไม่มีใน staff → fallback จาก submission */
          teacherMap[eKey] = {
            uid:         data.uid || eKey,
            email:       eKey,
            staffName:   data.staffName || data.displayName || eKey,
            displayName: data.staffName || data.displayName || eKey,
            position:    data.staffPosition || '',
            staffGroup:  normaliseGroup(data.staffGroup || data.subjectGroup || ''),
            isTeacher:   true,
            subs:        {}
          };
          teacherMap[eKey].subs[data.docTypeId] = data;
        }
      });

      updateStats();
      renderView();
    });
  }).catch(function(e) {
    main.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444;font-size:14px;">เกิดข้อผิดพลาด: ' + e.message + '</div>';
  });
}

/* ── สร้าง group filter buttons dynamic จาก availableGroups ── */
function buildGroupFilterBar() {
  var bar = document.getElementById('groupFilterBar');
  if (!bar) return;

  /* ลบปุ่มเก่าทิ้งหมด (ยกเว้น label span และปุ่ม "ทั้งหมด") */
  var children = Array.prototype.slice.call(bar.children);
  children.forEach(function(el) {
    if (el.id !== 'grpAll' && el.tagName !== 'SPAN') bar.removeChild(el);
  });

  availableGroups.forEach(function(grp) {
    var btn = document.createElement('button');
    btn.className = 'filter-pill' + (currentGroup === grp ? ' active' : '');
    btn.id = 'grp_' + grp;
    btn.textContent = grp;
    btn.onclick = function() { setGroup(grp); };
    bar.appendChild(btn);
  });

  /* reset active state บนปุ่ม "ทั้งหมด" */
  document.getElementById('grpAll').className = 'filter-pill' + (currentGroup === 'all' ? ' active' : '');
}

/* ── สร้าง doc type filter buttons ── */
function buildDocFilterBar() {
  var bar = document.getElementById('docFilterBar');
  if (!bar) return;

  /* ลบปุ่มเก่าทิ้งหมด (ยกเว้น label span และปุ่ม "ทั้งหมด") */
  var children = Array.prototype.slice.call(bar.children);
  children.forEach(function(el) {
    if (el.id !== 'docAll' && el.tagName !== 'SPAN') bar.removeChild(el);
  });

  DOCUMENT_TYPES.forEach(function(dt) {
    var btn = document.createElement('button');
    btn.className = 'filter-pill' + (currentDocFilter === dt.id ? ' active' : '');
    btn.id = 'doc_' + dt.id;
    btn.textContent = dt.label;
    btn.onclick = function() { setDocFilter(dt.id); };
    bar.appendChild(btn);
  });

  document.getElementById('docAll').className = 'filter-pill' + (currentDocFilter === 'all' ? ' active' : '');
}

function setDocFilter(d) {
  currentDocFilter = d;
  document.getElementById('docAll').className = 'filter-pill' + (d === 'all' ? ' active' : '');
  DOCUMENT_TYPES.forEach(function(dt) {
    var el = document.getElementById('doc_' + dt.id);
    if (el) el.className = 'filter-pill' + (d === dt.id ? ' active' : '');
  });
  renderView();
}

function updateStats() {
  var teacherList = Object.values(teacherMap).filter(function(t){ return t.isTeacher; });
  var teachers  = teacherList.length;
  var submitted = allSubs.filter(function(s){ return s.status && s.status !== 'none'; }).length;
  var reviewed  = allSubs.filter(function(s){ return s.status === 'head_reviewed' || s.status === 'reviewed'; }).length;
  var finalApproved = allSubs.filter(function(s){ return s.status === 'final_approved'; }).length;
  var totalPossible = teachers * DOCUMENT_TYPES.length;
  var pending   = totalPossible - submitted;

  document.getElementById('statTeachers').textContent = teachers;
  document.getElementById('statSubmitted').textContent = submitted;
  document.getElementById('statReviewed').textContent = reviewed;
  document.getElementById('statFinalApproved').textContent = finalApproved;
  document.getElementById('statPending').textContent = Math.max(0, pending);
}

/* ─── FILTER / VIEW ─── */
function setFilter(f) {
  currentFilter = f;
  ['filterAll','filterIncomplete','filterComplete','filterPending'].forEach(function(id) {
    document.getElementById(id).className = 'filter-pill' + (id === 'filter'+cap(f) ? ' active' : '');
  });
  renderView();
}
function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

function setView(v) {
  currentView = v;
  document.getElementById('viewList').className = 'view-btn' + (v==='list'?' active':'');
  document.getElementById('viewMatrix').className = 'view-btn' + (v==='matrix'?' active':'');
  renderView();
}

function setGroup(g) {
  currentGroup = g;
  /* update "ทั้งหมด" button */
  document.getElementById('grpAll').className = 'filter-pill' + (g === 'all' ? ' active' : '');
  /* update group buttons (dynamic) */
  availableGroups.forEach(function(grp) {
    var el = document.getElementById('grp_' + grp);
    if (el) el.className = 'filter-pill' + (g === grp ? ' active' : '');
  });
  renderView();
}

function getFilteredTeachers() {
  var q = (document.getElementById('searchInput').value||'').toLowerCase();
  return Object.values(teacherMap).filter(function(t) {
    if (!t.isTeacher) return false;
    /* search ชื่อจริง (staffName) และอีเมล */
    if (q && !(
      (t.staffName  || '').toLowerCase().includes(q) ||
      (t.email      || '').toLowerCase().includes(q) ||
      (t.staffGroup || '').toLowerCase().includes(q)
    )) return false;
    /* group filter — เทียบ staffGroup ที่ normalise แล้วตรง ๆ */
    if (currentGroup !== 'all') {
      if (normaliseGroup(t.staffGroup) !== normaliseGroup(currentGroup)) return false;
    }
    var count = Object.keys(t.subs).length;
    if (currentFilter === 'complete')   return count === DOCUMENT_TYPES.length;
    if (currentFilter === 'incomplete') return count < DOCUMENT_TYPES.length;
    if (currentFilter === 'pending')    return Object.values(t.subs).some(function(s){ return s.status==='submitted' || s.status==='head_reviewed'; });
    /* doc type filter — กรองเฉพาะครูที่มีงานชนิดนั้น */
    if (currentDocFilter !== 'all') return t.subs.hasOwnProperty(currentDocFilter);
    return true;
  });
}

function renderView() {
  if (currentView === 'list') renderListView();
  else renderMatrixView();
}

function toggleTeacher(uid) {
  var docs = document.getElementById('docs-' + uid);
  var chev = document.getElementById('chevron-' + uid);
  var open = docs.classList.toggle('open');
  if (chev) chev.style.transform = open ? 'rotate(180deg)' : '';
}

/* ─── WORKFLOW BAR HELPER ─── */
function buildWorkflowBar(status) {
  var steps = [
    { key: 'submitted',      label: 'ส่งงานแล้ว',                    icon: '📤' },
    { key: 'head_reviewed',  label: 'ผ่านการตรวจโดยหัวหน้ากลุ่มสาระ', icon: '👤' },
    { key: 'final_approved', label: 'ผ่านการตรวจโดยฝ่ายวิชาการ',      icon: '🛡️' },
  ];
  var ORDER = { submitted:0, head_reviewed:1, reviewed:1, final_approved:2, revision:-1 };
  var cur = ORDER[status] !== undefined ? ORDER[status] : -1;
  var isRevision = status === 'revision';

  var html = '<div class="workflow-bar">';
  steps.forEach(function(step, i) {
    if (i > 0) html += '<div class="wf-divider"></div>';
    var stepIdx = i;
    var cls, label;
    if (isRevision) {
      cls = stepIdx === 0 ? 'active' : 'pending';
      label = stepIdx === 0 ? '⚠️ แก้ไข' : step.label;
    } else if (cur > stepIdx) {
      cls = 'done';
      label = '✓ ' + step.label;
    } else if (cur === stepIdx) {
      cls = stepIdx === 2 ? 'final' : 'active';
      label = stepIdx === 2 ? '✓ ' + step.label : '⏳ ' + step.label;
    } else {
      cls = 'pending';
      label = step.label;
    }
    html += '<div class="wf-step ' + cls + '">' + label + '</div>';
  });
  html += '</div>';
  return html;
}

      '</div>' +
    '</div></td>';

    DOCUMENT_TYPES.forEach(function(dt) {
      var sub = t.subs[dt.id];
      var status = sub ? (sub.status||'submitted') : 'none';
      var cellCls = 'matrix-cell cell-' + status;
      var icon = { none:'minus', submitted:'check', head_reviewed:'user-check', reviewed:'check-check', final_approved:'shield-check', revision:'alert-triangle' }[status] || 'minus';
      var iconColor = { none:'#d1d5db', submitted:'#22c55e', head_reviewed:'#0ea5e9', reviewed:'#3b82f6', final_approved:'#059669', revision:'#f59e0b' }[status] || '#d1d5db';
      html += '<td><div class="' + cellCls + '" onclick="' + (sub?'openReview(\''+sub.id+'\',\''+t.uid+'\',\''+dt.id+'\')':'') + '" title="' + dt.label + (sub?'\nส่งเมื่อ: '+formatDate(sub.submittedAt):'') + '">' +
        '<i data-lucide="' + icon + '" style="width:12px;height:12px;color:' + iconColor + ';"></i>' +
      '</div></td>';
    });

    html += '<td style="text-align:center;"><span style="font-size:13px;font-weight:800;color:' + (count===DOCUMENT_TYPES.length?'#7c3aed':'#64748b') + ';">' + count + '/' + DOCUMENT_TYPES.length + '</span></td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  main.innerHTML = html;
  lucide.createIcons();
}

/* ─── REVIEW MODAL ─── */
function openReview(subId, uid, docTypeId) {
  if (!subId) return;
  var t = teacherMap[uid];
  var sub = t && t.subs[docTypeId];
  if (!sub) return;

  var dt = DOCUMENT_TYPES.find(function(d){ return d.id===docTypeId; });
  reviewingSubId = subId;

  document.getElementById('reviewModalTitle').textContent = dt.label;
  document.getElementById('reviewModalSub').textContent =
    (t.staffName || t.displayName) +
    (t.position  ? ' · ' + t.position  : '') +
    (t.staffGroup ? ' · ' + t.staffGroup : '') +
    ' · ปีการศึกษา ' + currentYear + ' ภาคเรียน ' + currentSem;
  document.getElementById('reviewFileName').textContent = sub.fileUrl ? sub.fileUrl.slice(0,60) + '...' : '-';
  document.getElementById('reviewFileLink').href = sub.fileUrl || '#';

  var statusLabels = { submitted:'ส่งงานแล้ว', head_reviewed:'ผ่านการตรวจโดยหัวหน้ากลุ่มสาระ', reviewed:'ผ่านการตรวจโดยหัวหน้ากลุ่มสาระ', final_approved:'ผ่านการตรวจโดยฝ่ายวิชาการ ✓', revision:'ส่งคืนเพื่อแก้ไข' };
  document.getElementById('reviewFileMeta').textContent = 'ส่งเมื่อ: ' + formatDate(sub.submittedAt) + ' · สถานะ: ' + (statusLabels[sub.status||'submitted'] || sub.status);
  document.getElementById('adminNote').value = sub.adminNote || '';

  /* Workflow bar */
  var wfBox = document.getElementById('reviewWorkflowBar');
  if (wfBox) wfBox.innerHTML = buildWorkflowBar(sub.status || 'submitted');

  /* course info */
  var courseInfoBox = document.getElementById('reviewCourseInfo');
  if (courseInfoBox) {
    var cText = '';
    if (sub.subjectGroup) cText += '<span style="font-size:10px;font-weight:800;background:#eff6ff;color:#1d4ed8;padding:2px 8px;border-radius:10px;">' + sub.subjectGroup + '</span> ';
    if (sub.courseCode)   cText += '<span style="font-size:12px;font-weight:700;color:#475569;">' + sub.courseCode + '</span> ';
    if (sub.courseName)   cText += '<span style="font-size:12px;color:#64748b;">· ' + sub.courseName + '</span>';
    courseInfoBox.style.display = cText ? 'block' : 'none';
    courseInfoBox.innerHTML = cText;
  }

  var noteBox = document.getElementById('reviewNoteBox');
  if (sub.note) {
    noteBox.style.display = 'block';
    document.getElementById('reviewNoteText').textContent = '📝 หมายเหตุจากครู: ' + sub.note;
  } else { noteBox.style.display = 'none'; }

  /* ── ปุ่มตามบทบาทและสถานะ ── */
  var btnBox = document.getElementById('reviewActionButtons');
  var curStatus = sub.status || 'submitted';
  btnBox.innerHTML = '';

  var revisionBtn =
    '<button onclick="setReviewStatus(\'revision\')" style="flex:1;padding:11px;background:#fffbeb;color:#92400e;border:1.5px solid #fde68a;font-weight:700;border-radius:12px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;">' +
      '<i data-lucide="pencil" style="width:14px;height:14px;"></i> ให้แก้ไข' +
    '</button>';

  if (isHeadOfGroupOnly) {
    /* หัวหน้ากลุ่มสาระ: ตรวจได้เฉพาะงานที่ส่งมาใหม่ (submitted / revision) */
    if (curStatus === 'submitted' || curStatus === 'revision') {
      btnBox.innerHTML =
        revisionBtn +
        '<button onclick="setReviewStatus(\'head_reviewed\')" style="flex:2;padding:11px;background:#0369a1;color:white;border:none;font-weight:700;border-radius:12px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;">' +
          '<i data-lucide="user-check" style="width:14px;height:14px;"></i> ผ่านการตรวจโดยหัวหน้ากลุ่มสาระ' +
        '</button>';
    } else if (curStatus === 'head_reviewed') {
      btnBox.innerHTML = '<p style="font-size:12px;color:#0369a1;padding:10px;background:#e0f2fe;border-radius:10px;width:100%;text-align:center;font-weight:700;">✓ ผ่านการตรวจโดยหัวหน้ากลุ่มสาระแล้ว รอฝ่ายวิชาการตรวจ</p>';
    } else if (curStatus === 'final_approved') {
      btnBox.innerHTML = '<p style="font-size:12px;color:#065f46;padding:10px;background:#d1fae5;border-radius:10px;width:100%;text-align:center;font-weight:700;">✅ ผ่านการตรวจโดยฝ่ายวิชาการแล้ว</p>';
    } else {
      /* revision หรืออื่น ๆ */
      btnBox.innerHTML =
        revisionBtn +
        '<button onclick="setReviewStatus(\'head_reviewed\')" style="flex:2;padding:11px;background:#0369a1;color:white;border:none;font-weight:700;border-radius:12px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;">' +
          '<i data-lucide="user-check" style="width:14px;height:14px;"></i> ผ่านการตรวจโดยหัวหน้ากลุ่มสาระ' +
        '</button>';
    }
  } else {
    /* Admin วิชาการ (portfolio) */
    if (curStatus === 'head_reviewed' || curStatus === 'reviewed') {
      btnBox.innerHTML =
        revisionBtn +
        '<button onclick="setReviewStatus(\'final_approved\')" style="flex:2;padding:11px;background:#7c3aed;color:white;border:none;font-weight:700;border-radius:12px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;">' +
          '<i data-lucide="shield-check" style="width:14px;height:14px;"></i> ผ่านการตรวจโดยฝ่ายวิชาการ ✓' +
        '</button>';
    } else if (curStatus === 'final_approved') {
      btnBox.innerHTML =
        '<p style="font-size:12px;color:#065f46;padding:10px;background:#d1fae5;border-radius:10px;flex:1;text-align:center;font-weight:700;">✅ ผ่านการตรวจโดยฝ่ายวิชาการแล้ว</p>' +
        '<button onclick="setReviewStatus(\'revision\')" style="padding:11px 16px;background:#fffbeb;color:#92400e;border:1.5px solid #fde68a;font-weight:700;border-radius:12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;">' +
          '<i data-lucide="pencil" style="width:13px;height:13px;"></i> ยกเลิก / ให้แก้ไข' +
        '</button>';
    } else {
      /* submitted / revision — admin ข้ามขั้นได้ กรณีไม่มีหัวหน้ากลุ่มสาระ */
      btnBox.innerHTML =
        revisionBtn +
        '<button onclick="setReviewStatus(\'head_reviewed\')" style="flex:1;padding:11px;background:#0369a1;color:white;border:none;font-weight:700;border-radius:12px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;">' +
          '<i data-lucide="user-check" style="width:14px;height:14px;"></i> ผ่านโดยหัวหน้ากลุ่มสาระ' +
        '</button>' +
        '<button onclick="setReviewStatus(\'final_approved\')" style="flex:1;padding:11px;background:#059669;color:white;border:none;font-weight:700;border-radius:12px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;">' +
          '<i data-lucide="shield-check" style="width:14px;height:14px;"></i> ผ่านโดยฝ่ายวิชาการ' +
        '</button>';
    }
  }

  document.getElementById('reviewModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  lucide.createIcons();
}

function setReviewStatus(status) {
  if (!reviewingSubId) return;
  var note = document.getElementById('adminNote').value.trim();
  var toastMsgs = {
    head_reviewed: 'ผ่านการตรวจโดยหัวหน้ากลุ่มสาระ ✓',
    final_approved: 'ผ่านการตรวจโดยฝ่ายวิชาการ ✅',
    reviewed: 'ผ่านการตรวจโดยหัวหน้ากลุ่มสาระ ✓',
    revision: 'ส่งคืนเพื่อแก้ไข'
  };
  var toastType = (status === 'revision') ? 'warn' : 'success';
  db.collection('portfolio_submissions').doc(reviewingSubId).update({
    status: status,
    adminNote: note,
    reviewedAt: firebase.firestore.FieldValue.serverTimestamp(),
    reviewedBy: currentUserEmail,
  }).then(function() {
    showToast(toastMsgs[status] || status, toastType);
    closeModal('reviewModal');
    loadAllSubmissions();
  }).catch(function(e){ showToast('เกิดข้อผิดพลาด: ' + e.message, 'error'); });
}

/* ─── HELPERS ─── */
function formatDate(ts) {
  if (!ts) return '-';
  var d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function esc(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

/* Override closeModal for convenience */
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
</script>

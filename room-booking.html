<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขอใช้ห้อง/สถานที่ - โรงเรียนหนองกี่พิทยาคม</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .card-custom {
            background: white;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .table-header-custom {
            background-color: #1d4ed8;
            color: white;
        }
        #loadingOverlay {
            display: flex;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        input, select, textarea {
            border: 1px solid #cbd5e1;
            padding: 0.6rem 0.75rem;
            border-radius: 0.5rem;
            outline: none;
            font-size: 0.875rem;
            width: 100%;
            background: #f8fafc;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #1d4ed8;
            background: white;
            ring: 2px;
            ring-color: #bfdbfe;
        }

        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            font-size: 11px;
            font-weight: 600;
        }
        .calendar-day:hover:not(.empty) {
            background-color: #f1f5f9;
        }
        .calendar-day.has-booking::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background-color: #eab308;
            border-radius: 50%;
        }
        .calendar-day.is-today {
            background-color: #1d4ed8 !important;
            color: white !important;
        }
        .calendar-day.is-selected {
            outline: 2px solid #1d4ed8;
            background-color: #eff6ff;
        }
        .calendar-day.empty { cursor: default; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-600"></div>
        <p class="mt-4 text-slate-500 text-sm font-bold">กำลังเตรียมข้อมูล...</p>
    </div>

    <nav class="sticky top-0 z-40 bg-blue-700 px-6 py-3 shadow-lg">
        <div class="max-w-full mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="https://nongki.ac.th/np2019/img/home/logo_np.gif" alt="Logo" class="h-10 w-auto">
                <div class="border-l border-blue-500 pl-4 hidden sm:block">
                    <h1 class="text-white font-bold leading-tight">ระบบขอใช้สถานที่</h1>
                    <p class="text-blue-100 text-[10px]">โรงเรียนหนองกี่พิทยาคม</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="userInfo" class="flex items-center gap-2 text-white">
                    <span id="userNameDisplay" class="text-xs font-bold hidden md:block italic">ผู้ใช้ทั่วไป</span>
                    <img id="userPhotoDisplay" src="https://ui-avatars.com/api/?name=User&background=random" class="w-8 h-8 rounded-full border border-white/20">
                </div>
            </div>
        </div>
    </nav>

    <main id="mainContent" class="max-w-[1600px] mx-auto p-6 space-y-6 opacity-0 transition-opacity duration-500">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 xl:col-span-3 space-y-6">
                <!-- ปฏิทินแสดงเป็นเดือน -->
                <div class="card-custom overflow-hidden">
                    <div class="p-4 border-b border-slate-100 flex items-center justify-between text-blue-700 font-bold text-sm">
                        <div class="flex items-center gap-2">
                            <i data-lucide="calendar" class="w-4 h-4"></i> ปฏิทินรายเดือน
                        </div>
                        <div class="flex items-center gap-1">
                            <button id="prevMonth" class="p-1 hover:bg-slate-100 rounded text-blue-600"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <button id="nextMonth" class="p-1 hover:bg-slate-100 rounded text-blue-600"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div class="p-4 text-center">
                        <div class="mb-4">
                            <span id="currentMonthLabel" class="font-bold text-sm text-slate-700"></span>
                        </div>
                        <div class="grid grid-cols-7 text-[10px] text-slate-400 font-bold mb-2 uppercase">
                            <div class="text-red-400">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-blue-400">ส</div>
                        </div>
                        <div class="grid grid-cols-7 gap-1" id="calendarDaysGrid"></div>
                    </div>
                </div>

                <div class="card-custom p-5">
                    <button id="openModalBtn" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 flex items-center justify-center gap-2 transition-all">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> จองใหม่
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8 xl:col-span-9">
                <div class="card-custom h-full flex flex-col min-h-[400px]">
                    <div class="p-4 border-b border-slate-100 flex items-center justify-between">
                        <div class="flex items-center gap-2 text-blue-700 font-bold text-sm">
                            <i data-lucide="info" class="w-4 h-4 text-blue-600"></i> รายการจองวันที่ <span id="selectedDateLabel"></span>
                        </div>
                    </div>
                    <div class="flex-1 p-6" id="todayBookingsList">
                        <div class="text-center py-20 text-slate-300 italic text-sm">เลือกวันที่เพื่อดูข้อมูล</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-custom overflow-hidden">
            <div class="p-4 bg-slate-50 border-b border-slate-100">
                <h3 class="text-blue-700 font-bold text-sm flex items-center gap-2">
                    <i data-lucide="table" class="w-4 h-4"></i> ประวัติการขอใช้บริการล่าสุด
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[11px] text-left">
                    <thead class="table-header-custom font-bold">
                        <tr>
                            <th class="px-4 py-3">วันที่ใช้</th>
                            <th class="px-4 py-3">สถานที่</th>
                            <th class="px-4 py-3">เวลา</th>
                            <th class="px-4 py-3">ผู้จอง</th>
                            <th class="px-4 py-3">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="mainBookingTableBody" class="bg-white">
                        <tr><td colspan="5" class="px-4 py-10 text-center text-slate-400">กำลังโหลด...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="bookingModal" class="fixed inset-0 bg-slate-900/60 z-[999] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-blue-700 p-5 text-white flex justify-between items-center">
                <h2 class="font-bold flex items-center gap-2"><i data-lucide="clipboard-list" class="w-5 h-5"></i> รายละเอียดการจอง</h2>
                <button id="closeModalBtn" class="p-1 hover:bg-white/10 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="bookingForm" class="p-6 space-y-4">
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">สถานที่</label>
                        <select id="roomSelect" required>
                            <option value="">-- เลือกห้องประชุม/สถานที่ --</option>
                            <option value="ห้องประชุมนพเก้า">ห้องประชุมนพเก้า</option>
                            <option value="ห้องคอมพิวเตอร์ 1">ห้องคอมพิวเตอร์ 1</option>
                            <option value="หอประชุมโรงเรียน">หอประชุมโรงเรียน</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">วันที่ต้องการ</label>
                            <input type="date" id="bookingDate" required>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">เริ่ม</label>
                                <input type="time" id="startTime" required>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">ถึง</label>
                                <input type="time" id="endTime" required>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">วัตถุประสงค์</label>
                        <textarea id="purpose" rows="3" placeholder="ระบุรายละเอียดกิจกรรม..." required></textarea>
                    </div>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" id="cancelBtn" class="flex-1 py-3 border border-slate-200 rounded-xl font-bold hover:bg-slate-50">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-3 bg-blue-700 text-white rounded-xl font-bold shadow-lg hover:bg-blue-800">ยืนยันการจอง</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBtM8x62v2KafPuGtiE29gRF7IxM2pITU",
            authDomain: "np-webapp-74616.firebaseapp.com",
            projectId: "np-webapp-74616",
            appId: "1:275537025660:web:4fdc11e0fe22e679f6c7f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allBookings = [];
        let viewDate = new Date();
        let selectedDate = new Date().toISOString().split('T')[0];

        // Modal Logic
        const modal = document.getElementById('bookingModal');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        function toggleModal(show) {
            if (show) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        openBtn.addEventListener('click', () => toggleModal(true));
        closeBtn.addEventListener('click', () => toggleModal(false));
        cancelBtn.addEventListener('click', () => toggleModal(false));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userNameDisplay').innerText = user.displayName || 'Anonymous';
            } else {
                signInAnonymously(auth);
            }
            fetchBookings();
        });

        function fetchBookings() {
            const q = query(collection(db, "bookings"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                allBookings = [];
                snapshot.forEach(doc => allBookings.push({id: doc.id, ...doc.data()}));
                renderAll();
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('opacity-0');
            });
        }

        function renderAll() {
            renderCalendar();
            renderTable();
            renderList(selectedDate);
            lucide.createIcons();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarDaysGrid');
            const label = document.getElementById('currentMonthLabel');
            grid.innerHTML = '';
            
            const month = viewDate.getMonth();
            const year = viewDate.getFullYear();
            
            label.innerText = new Intl.DateTimeFormat('th-TH', { month: 'long', year: 'numeric' }).format(viewDate);
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div class="calendar-day empty"></div>';
            
            for(let d=1; d<=daysInMonth; d++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasBooking = allBookings.some(b => b.date === dStr);
                const isToday = dStr === new Date().toISOString().split('T')[0];
                const isSel = dStr === selectedDate;

                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day ${isToday ? 'is-today' : ''} ${isSel ? 'is-selected' : ''} ${hasBooking ? 'has-booking' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => {
                    selectedDate = dStr;
                    renderAll();
                };
                grid.appendChild(dayEl);
            }
        }

        function renderList(date) {
            const list = document.getElementById('todayBookingsList');
            document.getElementById('selectedDateLabel').innerText = new Date(date).toLocaleDateString('th-TH');
            const filtered = allBookings.filter(b => b.date === date);
            
            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 italic">ไม่มีรายการจองในวันที่เลือก</div>`;
                return;
            }
            
            list.innerHTML = filtered.map(b => `
                <div class="bg-slate-50 p-4 rounded-xl border-l-4 border-blue-500 mb-3 flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-blue-800">${b.room}</h4>
                        <p class="text-[10px] text-slate-500">${b.startTime} - ${b.endTime} | โดย ${b.userName || 'ผู้ใช้ทั่วไป'}</p>
                    </div>
                    <span class="text-[9px] font-bold px-2 py-1 rounded bg-blue-100 text-blue-700 uppercase">${b.status}</span>
                </div>
            `).join('');
        }

        function renderTable() {
            const body = document.getElementById('mainBookingTableBody');
            body.innerHTML = allBookings.slice(0, 10).map(b => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="px-4 py-3 font-bold">${b.date}</td>
                    <td class="px-4 py-3 text-blue-600">${b.room}</td>
                    <td class="px-4 py-3">${b.startTime}-${b.endTime}</td>
                    <td class="px-4 py-3">${b.userName || 'N/A'}</td>
                    <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full bg-slate-100">${b.status}</span></td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="p-10 text-center text-slate-300">ไม่พบประวัติ</td></tr>';
        }

        document.getElementById('prevMonth').onclick = () => { viewDate.setMonth(viewDate.getMonth() - 1); renderAll(); };
        document.getElementById('nextMonth').onclick = () => { viewDate.setMonth(viewDate.getMonth() + 1); renderAll(); };

        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerText = "กำลังบันทึก...";

            try {
                await addDoc(collection(db, "bookings"), {
                    userId: currentUser?.uid || "anon",
                    userName: currentUser?.displayName || "Anonymous",
                    room: document.getElementById('roomSelect').value,
                    date: document.getElementById('bookingDate').value,
                    startTime: document.getElementById('startTime').value,
                    endTime: document.getElementById('endTime').value,
                    purpose: document.getElementById('purpose').value,
                    status: 'pending',
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                toggleModal(false);
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "ยืนยันการจอง";
            }
        };
    </script>
</body>
</html>

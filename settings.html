<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NP Origins">
  <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}</script>
  <title>ตั้งค่า – โรงเรียนหนองกี่พิทยาคม</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="shared/styles-new.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>

  <style>
    /* ปุ่มย้อนกลับไปด้านบน (ลอยมุมขวาล่าง) */
    .scroll-top-btn{
      position:fixed; right:20px; bottom:20px; width:46px; height:46px;
      border-radius:50%; border:none; background:var(--accent); color:#fff;
      display:none; align-items:center; justify-content:center;
      box-shadow:0 4px 14px rgba(0,0,0,.25); cursor:pointer; z-index:999;
      opacity:0; transform:translateY(10px);
      transition:opacity .2s ease, transform .2s ease;
    }
    .scroll-top-btn.show{display:flex; opacity:1; transform:translateY(0);}
    .scroll-top-btn:hover{background:var(--accent-dark);}
    .scroll-top-btn:active{transform:translateY(0) scale(.94);}

    .settings-section-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }

    /* ── Theme Cards ── */
    .theme-cards-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 560px;
    }
    @media (max-width: 480px) { .theme-cards-row { grid-template-columns: 1fr; } }

    .theme-card {
      border: 2.5px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .18s, box-shadow .18s, transform .15s;
      background: var(--white);
      position: relative;
    }
    .theme-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.10); }
    .theme-card.selected-blue  { border-color: #1d4ed8; box-shadow: 0 0 0 3px #eff6ff, 0 8px 24px rgba(29,78,216,.15); }
    .theme-card.selected-staff { border-color: #0d1b2a; box-shadow: 0 0 0 3px #e0e1dd, 0 8px 24px rgba(13,27,42,.18); }

    .check-badge {
      display: none;
      position: absolute;
      top: 10px; right: 10px;
      width: 24px; height: 24px;
      border-radius: 50%;
      align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      z-index: 1;
    }
    .theme-card.selected-blue  .check-badge { display: flex; background: #1d4ed8; }
    .theme-card.selected-staff .check-badge { display: flex; background: #0d1b2a; }
    .check-badge svg { width: 13px; height: 13px; color: white; }

    /* Navbar mockup strip */
    .theme-navbar-strip {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }
    .strip-circle { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,.22); flex-shrink: 0; }
    .strip-lines  { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .strip-line   { height: 6px; border-radius: 3px; background: rgba(255,255,255,.32); }
    .strip-line.short { width: 55%; }
    .strip-btn    { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,.16); flex-shrink: 0; }

    /* App body mockup */
    .theme-body-mock {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 8px;
      padding: 10px;
      background: #f8fafc;
    }
    .mock-sidebar { display: flex; flex-direction: column; gap: 5px; }
    .mock-sb-item { height: 14px; border-radius: 5px; background: #e2e8f0; }
    .mock-content { display: flex; flex-direction: column; gap: 7px; }
    .mock-btn     { height: 20px; border-radius: 6px; width: 64px; align-self: flex-end; }
    .mock-line    { height: 7px; border-radius: 3px; background: #e2e8f0; }
    .mock-line.s  { width: 55%; }

    /* Swatch row */
    .swatch-row {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      align-items: center;
    }
    .swatch {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,.08);
      flex-shrink: 0;
    }
    .swatch-label { font-size: 10px; color: var(--text3); font-weight: 700; margin-left: 4px; }

    /* Theme name / desc */
    .theme-label { padding: 10px 14px 12px; }
    .theme-label-name { font-size: 13px; font-weight: 800; color: var(--text); }
    .theme-label-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* ── Settings subtabs ── */
    .settings-tabbar {
      display: flex; gap: 4px; margin-bottom: 28px;
      border-bottom: 2px solid var(--border); padding-bottom: 0;
    }
    .settings-tab {
      padding: 10px 18px; border: none; background: none;
      font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--text2); cursor: pointer; border-bottom: 2.5px solid transparent;
      margin-bottom: -2px; transition: all .18s; display: flex; align-items: center; gap: 7px;
    }
    .settings-tab:hover { color: var(--text); }
    .settings-tab.active { color: #1d4ed8; border-bottom-color: #1d4ed8; }
    .settings-pane { display: none; }
    .settings-pane.active { display: block; }

    /* ── Announcement cards ── */
    .ann-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px 18px; display: flex;
      gap: 14px; align-items: flex-start; transition: box-shadow .15s;
    }
    .ann-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }
    .ann-icon-wrap {
      width: 40px; height: 40px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ann-type-info    { background: #eff6ff; }
    .ann-type-warning { background: #fffbeb; }
    .ann-type-success { background: #f0fdf4; }
    .ann-type-urgent  { background: #fff1f2; }
    .ann-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700;
    }
    .ann-badge-info    { background: #dbeafe; color: #1e40af; }
    .ann-badge-warning { background: #fef3c7; color: #92400e; }
    .ann-badge-success { background: #dcfce7; color: #15803d; }
    .ann-badge-urgent  { background: #fee2e2; color: #b91c1c; }

    /* ── Ann type radio pills ── */
    .ann-type-radio { display: flex; gap: 8px; flex-wrap: wrap; }
    .ann-type-opt {
      display: flex; align-items: center; gap: 6px; padding: 7px 13px;
      border: 1.5px solid var(--border); border-radius: 9px; cursor: pointer;
      font-size: 12px; font-weight: 700; color: var(--text2); transition: all .15s;
      font-family: 'Sarabun', sans-serif; user-select: none;
    }
    .ann-type-opt input { display: none; }
    .ann-type-opt.sel-info    { border-color: #1d4ed8; background: #eff6ff; color: #1e40af; }
    .ann-type-opt.sel-warning { border-color: #d97706; background: #fffbeb; color: #92400e; }
    .ann-type-opt.sel-success { border-color: #16a34a; background: #f0fdf4; color: #15803d; }
    .ann-type-opt.sel-urgent  { border-color: #dc2626; background: #fff1f2; color: #b91c1c; }

    /* ── Ann scope pills (ภายใน / ภายนอก) ── */
    .ann-scope-row { display: flex; gap: 8px; }
    .ann-scope-opt {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px; border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text2);
      font-family: 'Sarabun', sans-serif; transition: all .15s; user-select: none;
    }
    .ann-scope-opt input { display: none; }
    .ann-scope-opt.sel-internal { border-color: var(--accent); background: var(--accent-tint,#eff6ff); color: var(--accent); }
    .ann-scope-opt.sel-external { border-color: #7c3aed; background: #faf5ff; color: #6d28d9; }

    /* ── Date row ── */
    .ann-date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media(max-width:480px){ .ann-date-row { grid-template-columns: 1fr; } }
    .ann-noexpiry-row {
      display: flex; align-items: center; gap: 8px; margin-top: 8px;
      font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; user-select: none;
    }
    .ann-noexpiry-row input { width:16px; height:16px; accent-color: var(--accent,#1d4ed8); cursor:pointer; }

    /* ── Image drop zone ── */
    .ann-img-drop {
      border: 2px dashed var(--border); border-radius: 12px; padding: 20px;
      text-align: center; cursor: pointer; transition: border-color .15s, background .15s;
      position: relative; min-height: 88px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    }
    .ann-img-drop:hover { border-color: var(--accent,#1d4ed8); background: var(--accent-tint,#eff6ff); }
    .ann-img-drop.has-file { border-style: solid; border-color: var(--accent,#1d4ed8); background: var(--accent-tint,#eff6ff); }
    .ann-img-drop input[type="file"] { display: none; }
    .ann-img-preview { width:100%; max-height:120px; object-fit:contain; border-radius:8px; display:none; }
    .ann-img-drop.has-file .ann-img-preview { display:block; }
    .ann-img-drop.has-file .ann-img-placeholder { display:none; }
    .ann-img-placeholder { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .ann-img-remove {
      position:absolute; top:8px; right:8px; width:22px; height:22px;
      background:#ef4444; border:none; border-radius:50%; color:white;
      font-size:12px; cursor:pointer; display:none; align-items:center; justify-content:center;
      line-height:1; z-index:2;
    }
    .ann-img-drop.has-file .ann-img-remove { display:flex; }

    /* ── หมวดหมู่ (เดิมเป็น 2-col กับลำดับ แต่เอาลำดับออกแล้ว) ── */
    .ann-row-2 { display: block; }

    /* ── form-group override for ann modal labels ── */
    .ann-modal-box .form-label-sm {
      font-size: 11px; font-weight: 800; color: var(--text2);
      display: block; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .8px;
    }
    .ann-modal-box .form-label-sm .req { color: #ef4444; }
  </style>
</head>

</div>

  </div>
  <div style="text-align:center;">
    <h2 style="font-size:22px;font-weight:800;color:#1e293b;margin-bottom:8px;">ไม่มีสิทธิ์เข้าถึง</h2>

  <a href="index.html" style="padding:10px 24px;background:#1d4ed8;color:white;border-radius:12px;font-weight:700;text-decoration:none;">← กลับหน้าแรก</a>

<div id="settingsApp" style="display:none;"></div>

<!-- ปุ่มย้อนกลับไปด้านบน -->
<button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTopContent()" title="ย้อนกลับด้านบน">
  <i data-lucide="arrow-up" style="width:20px;height:20px;"></i>
</button>

<script>
/* ══════════════════════════════════════
   ธีมสีทั้งเว็บ — แอดมิน (SuperAdmin) เท่านั้นที่แก้ได้
   บันทึกที่ site_config/theme ใน Firestore แล้ว common.js
   (applySiteThemeColors) จะดึงไปใช้ในทุกหน้าอัตโนมัติ
   ══════════════════════════════════════ */
var THEME_ROLES = {
  memberAccent: { label: 'ผู้ใช้งานทั่วไป', desc: 'navTheme: blue · หน้าสมาชิก/นักเรียน', fallback: '#1d4ed8' },
  staffAccent:  { label: 'เจ้าหน้าที่',      desc: 'navTheme: dark · หน้าแอดมิน/เจ้าหน้าที่', fallback: '#0d1b2a' },
};

/* ══ Announcement helpers ══ */
var ANN_TYPES = {
  info:    { label: 'ข้อมูล',   icon: 'info',           iconColor: '#1d4ed8', badgeClass: 'ann-badge-info',    wrapClass: 'ann-type-info' },
  warning: { label: 'แจ้งเตือน', icon: 'alert-triangle', iconColor: '#d97706', badgeClass: 'ann-badge-warning', wrapClass: 'ann-type-warning' },
  success: { label: 'ข่าวดี',   icon: 'check-circle-2', iconColor: '#16a34a', badgeClass: 'ann-badge-success', wrapClass: 'ann-type-success' },
  urgent:  { label: 'ด่วน',     icon: 'bell-ring',       iconColor: '#dc2626', badgeClass: 'ann-badge-urgent',  wrapClass: 'ann-type-urgent' },
};
var currentUserEmail = null;
var isAdmin          = false;
var isSuperAdmin      = false;
var siteThemeConfig  = {};  /* { memberAccent, staffAccent } จาก site_config/theme */

/* ══ Announcement Modal (extended) ══
   ฟิลด์: scope, startDate, endDate, noExpiry, department, imageUrl
   (order ไม่แสดง UI — ใช้ createdAt เรียงลำดับเบื้องหลัง) */

var annEditId      = null;
var annImgFile_obj = null;   /* File รอ upload */
var annImgExistUrl = '';     /* URL เดิม (กรณี edit) */

/* ─── openAnnModal ─── */
function openAnnModal(id) {
  annEditId      = id || null;
  annImgFile_obj = null;

  document.getElementById('annModalTitle').textContent = id ? 'แก้ไขประกาศ' : 'เพิ่มประกาศใหม่';
  document.getElementById('annModalSub').textContent   = id ? 'แก้ไขข้อมูลประกาศที่มีอยู่' : 'กรอกข้อมูลและบันทึกประกาศใหม่';

  if (!id) {
    document.getElementById('annTitle').value     = '';
    document.getElementById('annBody').value      = '';
    document.getElementById('annActive').checked  = true;
    document.getElementById('annStartDate').value = '';
    document.getElementById('annEndDate').value   = '';
    document.getElementById('annNoExpiry').checked = false;
    document.getElementById('annDeptSelect').value = '';
    document.getElementById('annDeptOther').value  = '';
    document.getElementById('annDeptOther').style.display = 'none';
    toggleNoExpiry(false);
    setAnnType('info');
    setAnnScope('external');
    resetAnnImage();
    annImgExistUrl = '';
  } else {
    db.collection('announcements').doc(id).get().then(function(doc) {
      if (!doc.exists) return;
      var d = doc.data();
      document.getElementById('annTitle').value    = d.title  || '';
      document.getElementById('annBody').value     = d.body   || '';
      document.getElementById('annActive').checked = d.active !== false;
      setAnnType(d.type   || 'info');
      setAnnScope(d.scope || 'external');

      var noExpiry = d.noExpiry === true || (!d.startDate && !d.endDate);
      document.getElementById('annNoExpiry').checked = noExpiry;
      toggleNoExpiry(noExpiry);
      if (!noExpiry) {
        document.getElementById('annStartDate').value = d.startDate || '';
        document.getElementById('annEndDate').value   = d.endDate   || '';
      }

      var dept    = d.department || '';
      var stdOpts = ['ฝ่ายบริหาร','งานวิชาการ','งานบุคคล','งานการเงิน','งานพัสดุ','งานอาคารสถานที่','งานปกครอง','งานแนะแนว','งานสัมพันธ์ชุมชน','งานสารสนเทศ'];
      if (dept && stdOpts.indexOf(dept) === -1) {
        document.getElementById('annDeptSelect').value = 'other';
        document.getElementById('annDeptOther').value  = dept;
        document.getElementById('annDeptOther').style.display = 'block';
      } else {
        document.getElementById('annDeptSelect').value = dept;
        document.getElementById('annDeptOther').style.display = 'none';
      }

      annImgExistUrl = d.imageUrl || '';
      if (annImgExistUrl) {
        document.getElementById('annImgPreview').src = annImgExistUrl;
        document.getElementById('annImgPreview').style.display = 'block';
        document.getElementById('annImgDrop').classList.add('has-file');
        document.getElementById('annImgName').textContent    = 'รูปภาพที่มีอยู่';
        document.getElementById('annImgName').style.display  = 'block';
      } else {
        resetAnnImage();
      }
      lucide.createIcons();
    });
  }

  openModal('annModal');
  lucide.createIcons();
}

function closeAnnModal() { closeModal('annModal'); }

/* ─── setAnnType ─── */
function setAnnType(type) {
  document.querySelectorAll('[name="annType"]').forEach(function(r) { r.checked = (r.value === type); });
  document.querySelectorAll('.ann-type-opt').forEach(function(el) {
    el.className = 'ann-type-opt' + (el.dataset.type === type ? ' sel-' + type : '');
  });
}

/* ─── setAnnScope ─── */
function setAnnScope(scope) {
  document.querySelectorAll('[name="annScope"]').forEach(function(r) { r.checked = (r.value === scope); });
  document.querySelectorAll('.ann-scope-opt').forEach(function(el) {
    el.className = 'ann-scope-opt' + (el.dataset.scope === scope ? ' sel-' + scope : '');
  });
}

/* ─── toggleNoExpiry ─── */
function toggleNoExpiry(checked) {
  var row = document.getElementById('annDateRow');
  if (!row) return;
  row.style.opacity      = checked ? '.35' : '1';
  row.style.pointerEvents = checked ? 'none' : '';
  if (checked) {
    document.getElementById('annStartDate').value = '';
    document.getElementById('annEndDate').value   = '';
  }
}

/* ─── onDeptChange ─── */
function onDeptChange(val) {
  var other = document.getElementById('annDeptOther');
  other.style.display = (val === 'other') ? 'block' : 'none';
  if (val !== 'other') other.value = '';
}

/* ─── Image helpers ─── */
function handleAnnImage(evt) {
  var file = evt.target.files && evt.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('รูปภาพต้องไม่เกิน 5 MB', 'error'); return; }
  annImgFile_obj = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('annImgPreview').src = e.target.result;
    document.getElementById('annImgPreview').style.display = 'block';
    document.getElementById('annImgDrop').classList.add('has-file');
    document.getElementById('annImgName').textContent   = file.name;
    document.getElementById('annImgName').style.display = 'block';
    annImgExistUrl = '';
    lucide.createIcons();
  };
  reader.readAsDataURL(file);
}
function removeAnnImage(evt) {
  evt.stopPropagation();
  resetAnnImage();
  annImgExistUrl = '';
  annImgFile_obj = null;
}
function resetAnnImage() {
  document.getElementById('annImgFile').value = '';
  document.getElementById('annImgPreview').src = '';
  document.getElementById('annImgPreview').style.display = 'none';
  document.getElementById('annImgDrop').classList.remove('has-file');
  document.getElementById('annImgName').style.display = 'none';
  document.getElementById('annImgName').textContent = '';
}

/* ─── saveAnn ─── */
function saveAnn() {
  var title     = (document.getElementById('annTitle').value    || '').trim();
  var body      = (document.getElementById('annBody').value     || '').trim();
  var active    = document.getElementById('annActive').checked;
  var noExpiry  = document.getElementById('annNoExpiry').checked;
  var startDate = noExpiry ? '' : (document.getElementById('annStartDate').value || '');
  var endDate   = noExpiry ? '' : (document.getElementById('annEndDate').value   || '');
  var typeEl    = document.querySelector('[name="annType"]:checked');
  var type      = typeEl ? typeEl.value : 'info';
  var scopeEl   = document.querySelector('[name="annScope"]:checked');
  var scope     = scopeEl ? scopeEl.value : 'external';
  var deptSel   = document.getElementById('annDeptSelect').value;
  var department = (deptSel === 'other')
    ? (document.getElementById('annDeptOther').value || '').trim()
    : deptSel;

  if (!title)      { showToast('กรุณากรอกชื่อเรื่อง', 'error'); return; }
  if (!department) { showToast('กรุณาเลือกฝ่าย/หน่วยงาน', 'error'); return; }
  if (!noExpiry && startDate && endDate && endDate < startDate) {
    showToast('วันที่สิ้นสุดต้องอยู่หลังวันที่เริ่ม', 'error'); return;
  }

  var btn = document.getElementById('annSaveBtn');
  btn.disabled = true;
  btn.innerHTML = '<i data-lucide="loader-2" style="width:15px;height:15px;"></i> กำลังบันทึก...';
  lucide.createIcons();

  var data = {
    title: title, body: body, type: type,
    scope: scope, active: active, noExpiry: noExpiry,
    startDate: startDate, endDate: endDate, department: department,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  function doSave(imageUrl) {
    if (imageUrl !== undefined) data.imageUrl = imageUrl;
    else if (annImgExistUrl)   data.imageUrl = annImgExistUrl;

    var p = annEditId
      ? db.collection('announcements').doc(annEditId).update(data)
      : db.collection('announcements').add(Object.assign({}, data, {
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          createdBy: (typeof currentUserEmail !== 'undefined' ? currentUserEmail : '')
        }));
    p.then(function() {
      showToast(annEditId ? 'แก้ไขประกาศแล้ว' : 'เพิ่มประกาศใหม่แล้ว');
      closeAnnModal();
      loadAnnouncements();
    }).catch(function(e) {
      showToast('เกิดข้อผิดพลาด: ' + e.message, 'error');
    }).finally(function() {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="save" style="width:15px;height:15px;"></i> บันทึก';
      lucide.createIcons();
    });
  }

  if (annImgFile_obj && storage) {
    var ext   = annImgFile_obj.name.split('.').pop();
    var fname = 'announcements/' + Date.now() + '.' + ext;
    var ref   = storage.ref(fname);
    ref.put(annImgFile_obj)
      .then(function() { return ref.getDownloadURL(); })
      .then(function(url) { doSave(url); })
      .catch(function(e) {
        showToast('อัปโหลดรูปไม่ได้: ' + e.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="save" style="width:15px;height:15px;"></i> บันทึก';
        lucide.createIcons();
      });
  } else {
    doSave(undefined);
  }
}

function deleteAnn(id) {
  if (!confirm('ลบประกาศนี้?')) return;
  db.collection('announcements').doc(id).delete()
    .then(function() { showToast('ลบประกาศแล้ว'); loadAnnouncements(); })
    .catch(function(e) { showToast('เกิดข้อผิดพลาด','error'); });
}

function toggleAnnActive(id, current) {
  db.collection('announcements').doc(id).update({ active: !current, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
    .then(function() { showToast(!current ? 'เปิดใช้งานแล้ว' : 'ปิดการแสดงผลแล้ว'); loadAnnouncements(); });
}

function loadAnnouncements() {
  var wrap = document.getElementById('annListWrap');
  if (!wrap) return;
  wrap.innerHTML = '<div style="text-align:center;padding:32px 0;color:#94a3b8;font-size:13px;">กำลังโหลด...</div>';
  db.collection('announcements').orderBy('createdAt','desc').limit(50).get()
    .then(function(snap) {
      if (snap.empty) {
        wrap.innerHTML = '<div style="text-align:center;padding:40px 0;color:#94a3b8;font-size:13px;">ยังไม่มีประกาศ</div>';
        return;
      }
      wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:12px;">';
      var html = '';
      snap.forEach(function(doc) {
        var d = doc.data(); var t = ANN_TYPES[d.type] || ANN_TYPES.info;
        var date = '';
        try { date = (d.createdAt.toDate()).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}); } catch(e){}
        html += '<div class="ann-card" style="' + (d.active ? '' : 'opacity:.5;') + '">' +
          '<div class="ann-icon-wrap ' + t.wrapClass + '">' +
            '<i data-lucide="' + t.icon + '" style="width:18px;height:18px;color:' + t.iconColor + ';"></i>' +
          '</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">' +
              '<span class="ann-badge ' + t.badgeClass + '">' + t.label + '</span>' +
              (d.active ? '' : '<span class="ann-badge" style="background:#f1f5f9;color:#94a3b8;">ซ่อนอยู่</span>') +
              '<span style="font-size:11px;color:#94a3b8;margin-left:auto;">' + date + '</span>' +
            '</div>' +
            '<div style="font-size:14px;font-weight:700;color:#1e293b;margin-bottom:4px;">' + (d.title||'') + '</div>' +
            (d.body ? '<div style="font-size:13px;color:#64748b;line-height:1.6;">' + (d.body||'') + '</div>' : '') +
          '</div>' +
          '<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">' +
            '<button onclick="openAnnModal(\'' + doc.id + '\')" style="padding:6px 10px;background:#f1f5f9;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#475569;font-family:Sarabun,sans-serif;">' +
              '<i data-lucide="edit-3" style="width:12px;height:12px;"></i> แก้ไข' +
            '</button>' +
            '<button onclick="toggleAnnActive(\'' + doc.id + '\',' + d.active + ')" style="padding:6px 10px;background:' + (d.active ? '#fff7ed' : '#f0fdf4') + ';border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:' + (d.active ? '#92400e' : '#15803d') + ';font-family:Sarabun,sans-serif;">' +
              '<i data-lucide="' + (d.active ? 'eye-off' : 'eye') + '" style="width:12px;height:12px;"></i> ' + (d.active ? 'ซ่อน' : 'แสดง') +
            '</button>' +
            '<button onclick="deleteAnn(\'' + doc.id + '\')" style="padding:6px 10px;background:#fee2e2;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#b91c1c;font-family:Sarabun,sans-serif;">' +
              '<i data-lucide="trash-2" style="width:12px;height:12px;"></i> ลบ' +
            '</button>' +
          '</div>' +
        '</div>';
      });
      wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:12px;">' + html + '</div>';
      lucide.createIcons();
    })
    .catch(function() { wrap.innerHTML = '<div style="text-align:center;padding:32px;color:#ef4444;font-size:13px;">โหลดข้อมูลไม่ได้</div>'; });
}

function switchSettingsTab(name) {
  document.querySelectorAll('.settings-tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.settings-pane').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('stab-'+name).classList.add('active');
  document.getElementById('spane-'+name).classList.add('active');
  if (name === 'announcements') loadAnnouncements();
}

/* ══ ธีมสีทั้งเว็บ — read-only (ผู้ใช้ทั่วไป/แอดมินธรรมดา) ══ */
function renderThemeReadOnly() {
  var m = siteThemeConfig.memberAccent || THEME_ROLES.memberAccent.fallback;
  var s = siteThemeConfig.staffAccent  || THEME_ROLES.staffAccent.fallback;
  return (
    '<p style="font-size:13px;color:var(--text2,#64748b);margin-bottom:16px;">สีของเว็บไซต์ถูกกำหนดโดยผู้ดูแลระบบส่วนกลาง ใช้ค่าเดียวกันทุกหน้า/ทุกผู้ใช้</p>' +
    '<div style="display:flex;gap:16px;flex-wrap:wrap;">' +
      ['memberAccent', 'staffAccent'].map(function(k) {
        var c = k === 'memberAccent' ? m : s;
        var meta = THEME_ROLES[k];
        return (
          '<div style="display:flex;align-items:center;gap:12px;padding:14px 18px;border:1px solid var(--border,#e2e8f0);border-radius:14px;min-width:220px;">' +
            '<div style="width:40px;height:40px;border-radius:10px;background:' + c + ';flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15);"></div>' +
            '<div>' +
              '<div style="font-weight:700;font-size:13px;color:#1e293b;">' + meta.label + '</div>' +
              '<div style="font-size:11px;color:#94a3b8;margin-top:2px;">' + meta.desc + '</div>' +
              '<div style="font-size:11px;color:#94a3b8;font-family:monospace;margin-top:2px;">' + c + '</div>' +
            '</div>' +
          '</div>'
        );
      }).join('') +
    '</div>'
  );
}

/* ══ ธีมสีทั้งเว็บ — editor (SuperAdmin เท่านั้น) ══ */
function renderThemeEditor() {
  var m = siteThemeConfig.memberAccent || THEME_ROLES.memberAccent.fallback;
  var s = siteThemeConfig.staffAccent  || THEME_ROLES.staffAccent.fallback;
  return (
    '<p style="font-size:13px;color:var(--text2,#64748b);margin-bottom:16px;">ตั้งสีหลัก 1 สีต่อกลุ่ม ระบบจะคำนวณเฉดเข้ม/อ่อนให้อัตโนมัติ และมีผลกับทุกหน้าทั้งเว็บทันทีที่บันทึก</p>' +
    '<div style="display:flex;gap:20px;flex-wrap:wrap;">' +
      themeColorField('memberAccent', m) +
      themeColorField('staffAccent', s) +
    '</div>' +
    '<button onclick="saveSiteTheme()" id="saveThemeBtn" style="margin-top:20px;padding:11px 24px;background:var(--accent);color:white;font-weight:700;border:none;border-radius:12px;cursor:pointer;font-size:13px;font-family:Sarabun,sans-serif;">บันทึกสีทั้งเว็บ</button>'
  );
}
function themeColorField(key, value) {
  var meta = THEME_ROLES[key];
  return (
    '<div style="display:flex;flex-direction:column;gap:8px;padding:16px 18px;border:1px solid var(--border,#e2e8f0);border-radius:14px;min-width:230px;">' +
      '<div style="font-weight:700;font-size:13px;color:#1e293b;">' + meta.label + '</div>' +
      '<div style="font-size:11px;color:#94a3b8;">' + meta.desc + '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-top:6px;">' +
        '<input type="color" id="color-' + key + '" value="' + value + '" oninput="onThemeColorInput(\'' + key + '\')" style="width:44px;height:44px;border:none;border-radius:10px;cursor:pointer;padding:0;background:none;">' +
        '<input type="text" id="hex-' + key + '" value="' + value + '" oninput="onThemeHexInput(\'' + key + '\')" maxlength="7" style="width:90px;padding:8px 10px;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:12px;font-family:monospace;text-transform:uppercase;">' +
      '</div>' +
    '</div>'
  );
}
function onThemeColorInput(key) {
  var v = document.getElementById('color-' + key).value;
  document.getElementById('hex-' + key).value = v;
}
function onThemeHexInput(key) {
  var v = document.getElementById('hex-' + key).value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('color-' + key).value = v;
}
function saveSiteTheme() {
  var m = document.getElementById('hex-memberAccent').value.trim();
  var s = document.getElementById('hex-staffAccent').value.trim();
  var hexRe = /^#[0-9a-fA-F]{6}$/;
  if (!hexRe.test(m) || !hexRe.test(s)) {
    showToast('รูปแบบสีไม่ถูกต้อง (ต้องเป็น #RRGGBB)');
    return;
  }
  var btn = document.getElementById('saveThemeBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';
  db.collection('site_config').doc('theme').set({
    memberAccent: m,
    staffAccent:  s,
    updatedAt:    firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy:    currentUserEmail
  }, { merge: true }).then(function() {
    siteThemeConfig = { memberAccent: m, staffAccent: s };
    /* preview สีทันทีในหน้านี้ (settings.html ใช้ navTheme:'blue' เสมอ) */
    if (typeof applySiteThemeColors === 'function') applySiteThemeColors('blue');
    try { localStorage.setItem('np_site_theme_cache', JSON.stringify(siteThemeConfig)); } catch (e) {}
    showToast('บันทึกสีทั้งเว็บเรียบร้อย');
  }).catch(function(err) {
    showToast('บันทึกไม่สำเร็จ: ' + (err && err.message ? err.message : err));
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = 'บันทึกสีทั้งเว็บ';
  });
}

/* ══ Boot ══ */
buildPage({
  appId:        'settingsApp',
  navSubtitle:  'ตั้งค่า',
  navTheme:     'blue',
  activePage:   'settings',
  requireAdmin: false,

  onAuth: function(user, contentEl) {
    updateNavUser(user);
    updateSidebarProfile(user);
    checkAdminAccess(user.email);
    currentUserEmail = user.email;

    /* ตรวจสอบ admin เพื่อแสดง/ซ่อน tab ประกาศ + ดึงค่าธีมสีทั้งเว็บปัจจุบัน */
    var lEmail = user.email.toLowerCase();
    isSuperAdmin = lEmail === (typeof SUPERADMIN_EMAIL !== 'undefined' ? SUPERADMIN_EMAIL : '');
    Promise.all([
      db.collection('admins').doc(lEmail).get(),
      db.collection('site_config').doc('theme').get()
    ])
      .then(function(results) {
        isAdmin = isSuperAdmin || results[0].exists;
        siteThemeConfig = results[1].exists ? results[1].data() : {};
        contentEl.innerHTML = renderPage();
        lucide.createIcons();
        /* init type radio click handlers */
        document.querySelectorAll('.ann-type-opt').forEach(function(el) {
          el.addEventListener('click', function() { setAnnType(el.dataset.type); });
        });
        setupScrollTopButton();
      })
      .catch(function() {
        isAdmin = false;
        siteThemeConfig = {};
        contentEl.innerHTML = renderPage();
        lucide.createIcons();
        setupScrollTopButton();
      });
  }
});

/* ══ ปุ่มย้อนกลับไปด้านบน — scroll เกิดที่ .content-area (id="pageContent") ══ */
function setupScrollTopButton() {
  var content = document.getElementById('pageContent');
  var btn = document.getElementById('scrollTopBtn');
  if (!content || !btn) return;
  content.addEventListener('scroll', function() {
    btn.classList.toggle('show', content.scrollTop > 300);
  });
}
function scrollToTopContent() {
  var content = document.getElementById('pageContent');
  if (content) content.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

            <i data-lucide="image-plus" style="width:20px;height:20px;color:var(--text3,#94a3b8);"></i>
          </div>
          <p style="font-size:12px;color:var(--text2);margin:0;font-weight:700;">คลิกเพื่อเลือกรูปภาพ</p>
        </div>
        <img id="annImgPreview" class="ann-img-preview" alt="preview">
        <p id="annImgName" style="font-size:11px;color:var(--accent,#1d4ed8);font-weight:700;margin:4px 0 0;display:none;"></p>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">

    <!-- ⑥ ช่วงเวลาแสดงผล -->
    <div class="form-group">
      <label class="form-label">ช่วงเวลาที่แสดง</label>
      <div class="ann-date-row" id="annDateRow">
        <div>
          <label style="font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;">วันที่เริ่ม</label>
          <input type="date" id="annStartDate">
        </div>
        <div>
          <label style="font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;">วันที่สิ้นสุด</label>
          <input type="date" id="annEndDate">
        </div>
      </div>
      <label class="ann-noexpiry-row">
        <input type="checkbox" id="annNoExpiry" onchange="toggleNoExpiry(this.checked)">
        ไม่ระบุช่วงเวลา (แสดงตลอดไป)
      </label>
    </div>

    <!-- ⑦ ฝ่าย/หน่วยงาน -->
    <div class="form-group">
      <label class="form-label">ฝ่าย / หน่วยงานที่ประกาศ <span style="color:#ef4444;">*</span></label>
      <select id="annDeptSelect" onchange="onDeptChange(this.value)">
        <option value="">— เลือกฝ่าย/หน่วยงาน —</option>
        <option value="ฝ่ายบริหาร">ฝ่ายบริหาร</option>
        <option value="งานวิชาการ">งานวิชาการ</option>
        <option value="งานบุคคล">งานบุคคล</option>
        <option value="งานการเงิน">งานการเงิน</option>
        <option value="งานพัสดุ">งานพัสดุ</option>
        <option value="งานอาคารสถานที่">งานอาคารสถานที่</option>
        <option value="งานปกครอง">งานปกครอง</option>
        <option value="งานแนะแนว">งานแนะแนว</option>
        <option value="งานสัมพันธ์ชุมชน">งานสัมพันธ์ชุมชน</option>
        <option value="งานสารสนเทศ">งานสารสนเทศ</option>
        <option value="other">อื่นๆ (ระบุเอง)</option>
      </select>
      <input type="text" id="annDeptOther" placeholder="ระบุฝ่าย/หน่วยงาน..."
             style="margin-top:8px;display:none;">
    </div>

    <!-- สถานะแสดงผล -->
    <div class="form-group" style="display:flex;align-items:center;gap:12px;margin-bottom:0;">
      <label class="form-label" style="margin:0;">สถานะ</label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:700;color:var(--text);">
        <input type="checkbox" id="annActive" checked style="width:16px;height:16px;accent-color:var(--accent,#1d4ed8);">
        เปิดใช้งาน
      </label>
    </div>

    <!-- Action buttons -->
    <div style="display:flex;gap:10px;margin-top:22px;">
      <button onclick="closeAnnModal()" class="btn-secondary" style="flex:1;padding:12px;font-size:14px;">ยกเลิก</button>
      <button onclick="saveAnn()" id="annSaveBtn" class="btn-primary" style="flex:2;padding:12px;font-size:14px;justify-content:center;">
        <i data-lucide="save" style="width:15px;height:15px;"></i> บันทึก
      </button>
    </div>

  </div>
</div>

</body>
</html>

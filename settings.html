<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NP Origins">
  <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}</script>
  <title>ตั้งค่า – โรงเรียนหนองกี่พิทยาคม</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="shared/styles-new.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="shared/firebase.js"></script>
  <script src="shared/common.js"></script>

  <style>
    .settings-section-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }

    /* ── Theme Cards ── */
    .theme-cards-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 560px;
    }
    @media (max-width: 480px) { .theme-cards-row { grid-template-columns: 1fr; } }

    .theme-card {
      border: 2.5px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .18s, box-shadow .18s, transform .15s;
      background: var(--white);
      position: relative;
    }
    .theme-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.10); }
    .theme-card.selected-blue  { border-color: #1d4ed8; box-shadow: 0 0 0 3px #eff6ff, 0 8px 24px rgba(29,78,216,.15); }
    .theme-card.selected-staff { border-color: #0d1b2a; box-shadow: 0 0 0 3px #e0e1dd, 0 8px 24px rgba(13,27,42,.18); }

    .check-badge {
      display: none;
      position: absolute;
      top: 10px; right: 10px;
      width: 24px; height: 24px;
      border-radius: 50%;
      align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      z-index: 1;
    }
    .theme-card.selected-blue  .check-badge { display: flex; background: #1d4ed8; }
    .theme-card.selected-staff .check-badge { display: flex; background: #0d1b2a; }
    .check-badge svg { width: 13px; height: 13px; color: white; }

    /* Navbar mockup strip */
    .theme-navbar-strip {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }
    .strip-circle { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,.22); flex-shrink: 0; }
    .strip-lines  { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .strip-line   { height: 6px; border-radius: 3px; background: rgba(255,255,255,.32); }
    .strip-line.short { width: 55%; }
    .strip-btn    { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,.16); flex-shrink: 0; }

    /* App body mockup */
    .theme-body-mock {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 8px;
      padding: 10px;
      background: #f8fafc;
    }
    .mock-sidebar { display: flex; flex-direction: column; gap: 5px; }
    .mock-sb-item { height: 14px; border-radius: 5px; background: #e2e8f0; }
    .mock-content { display: flex; flex-direction: column; gap: 7px; }
    .mock-btn     { height: 20px; border-radius: 6px; width: 64px; align-self: flex-end; }
    .mock-line    { height: 7px; border-radius: 3px; background: #e2e8f0; }
    .mock-line.s  { width: 55%; }

    /* Swatch row */
    .swatch-row {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      align-items: center;
    }
    .swatch {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,.08);
      flex-shrink: 0;
    }
    .swatch-label { font-size: 10px; color: var(--text3); font-weight: 700; margin-left: 4px; }

    /* Theme name / desc */
    .theme-label { padding: 10px 14px 12px; }
    .theme-label-name { font-size: 13px; font-weight: 800; color: var(--text); }
    .theme-label-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* ── Settings subtabs ── */
    .settings-tabbar {
      display: flex; gap: 4px; margin-bottom: 28px;
      border-bottom: 2px solid var(--border); padding-bottom: 0;
    }
    .settings-tab {
      padding: 10px 18px; border: none; background: none;
      font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--text2); cursor: pointer; border-bottom: 2.5px solid transparent;
      margin-bottom: -2px; transition: all .18s; display: flex; align-items: center; gap: 7px;
    }
    .settings-tab:hover { color: var(--text); }
    .settings-tab.active { color: #1d4ed8; border-bottom-color: #1d4ed8; }
    .settings-pane { display: none; }
    .settings-pane.active { display: block; }

    /* ── Announcement cards ── */
    .ann-card {
      background: white; border: 1px solid var(--border);
      border-radius: 16px; padding: 16px 18px; display: flex;
      gap: 14px; align-items: flex-start; transition: box-shadow .15s;
    }
    .ann-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }
    .ann-icon-wrap {
      width: 40px; height: 40px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ann-type-info    { background: #eff6ff; }
    .ann-type-warning { background: #fffbeb; }
    .ann-type-success { background: #f0fdf4; }
    .ann-type-urgent  { background: #fff1f2; }
    .ann-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700;
    }
    .ann-badge-info    { background: #dbeafe; color: #1e40af; }
    .ann-badge-warning { background: #fef3c7; color: #92400e; }
    .ann-badge-success { background: #dcfce7; color: #15803d; }
    .ann-badge-urgent  { background: #fee2e2; color: #b91c1c; }
    .ann-modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,.55); z-index: 200;
      align-items: center; justify-content: center; padding: 16px;
      backdrop-filter: blur(4px);
    }
    .ann-modal-bg.open { display: flex; }
    .ann-modal {
      background: white; border-radius: 20px; width: 100%;
      max-width: 520px; padding: 28px; box-shadow: 0 24px 64px rgba(0,0,0,.18);
    }
    .ann-field { margin-bottom: 16px; }
    .ann-label { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: .8px; }
    .ann-input {
      width: 100%; padding: 10px 13px; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: 'Sarabun', sans-serif;
      font-size: 14px; color: var(--text); background: white;
      transition: border-color .15s; outline: none; box-sizing: border-box;
    }
    .ann-input:focus { border-color: #1d4ed8; }
    textarea.ann-input { resize: vertical; min-height: 80px; }
    .ann-type-radio { display: flex; gap: 8px; flex-wrap: wrap; }
    .ann-type-opt {
      display: flex; align-items: center; gap: 6px; padding: 7px 13px;
      border: 1.5px solid var(--border); border-radius: 9px; cursor: pointer;
      font-size: 12px; font-weight: 700; color: var(--text2); transition: all .15s;
    }
    .ann-type-opt input { display: none; }
    .ann-type-opt.sel-info    { border-color: #1d4ed8; background: #eff6ff; color: #1e40af; }
    .ann-type-opt.sel-warning { border-color: #d97706; background: #fffbeb; color: #92400e; }
    .ann-type-opt.sel-success { border-color: #16a34a; background: #f0fdf4; color: #15803d; }
    .ann-type-opt.sel-urgent  { border-color: #dc2626; background: #fff1f2; color: #b91c1c; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:#64748b;font-size:14px;font-weight:700;">กำลังตรวจสอบสิทธิ์...</p>
</div>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<div id="accessDenied" style="display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="width:72px;height:72px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;">
    <i data-lucide="shield-off" style="width:36px;height:36px;color:#dc2626;"></i>
  </div>
  <div style="text-align:center;">
    <h2 style="font-size:22px;font-weight:800;color:#1e293b;margin-bottom:8px;">ไม่มีสิทธิ์เข้าถึง</h2>
    <p style="color:#64748b;font-size:14px;">คุณไม่มีสิทธิ์เข้าหน้านี้</p>
  </div>
  <a href="index.html" style="padding:10px 24px;background:#1d4ed8;color:white;border-radius:12px;font-weight:700;text-decoration:none;">← กลับหน้าแรก</a>
</div>

<div id="settingsApp" style="display:none;"></div>

<script>
/* ══════════════════════════════════════
   2 ธีมที่มีอยู่จริงใน styles-new.css
   ══════════════════════════════════════ */
var THEMES = {
  blue: {
    key:         'blue',
    bodyClass:   'theme-blue',
    navClass:    'blue',
    navTheme:    'blue',              /* ส่งให้ buildPage */
    label:       'Ocean Blue',
    desc:        'ธีมเริ่มต้น · ผู้ใช้ทั่วไป',
    navbar:      '#1d4ed8',
    swatches:    ['#1d4ed8','#1e40af','#60a5fa','#93c5fd','#eff6ff'],
    activeClass: 'selected-blue',
    mockBtn:     '#1d4ed8',
    mockSb:      '#1d4ed8',
  },
  staff: {
    key:         'staff',
    bodyClass:   'theme-staff',
    navClass:    'dark',
    navTheme:    'dark',
    label:       'Ink Black',
    desc:        'ธีมเจ้าหน้าที่ · Admin',
    navbar:      '#0d1b2a',
    swatches:    ['#0d1b2a','#1b263b','#415a77','#778da9','#e0e1dd'],
    activeClass: 'selected-staff',
    mockBtn:     '#0d1b2a',
    mockSb:      '#0d1b2a',
  },
};

var STORAGE_KEY = 'np_theme';
var currentKey  = localStorage.getItem(STORAGE_KEY) || 'blue';

/* Apply body class + navbar class ── ไม่ต้อง setProperty เพราะ
   styles-new.css กำหนด accent tokens ผ่าน body.theme-blue / body.theme-staff */
function applyTheme(key, save) {
  var t = THEMES[key] || THEMES.blue;
  currentKey = t.key;

  document.body.classList.remove('theme-blue', 'theme-staff');
  document.body.classList.add(t.bodyClass);

  var navbar = document.querySelector('.navbar');
  if (navbar) { navbar.classList.remove('blue','dark'); navbar.classList.add(t.navClass); }

  if (save) localStorage.setItem(STORAGE_KEY, t.key);
}

/* Apply ก่อน buildPage เพื่อป้องกัน flash */
applyTheme(currentKey, false);

/* ══ Announcement helpers ══ */
var ANN_TYPES = {
  info:    { label: 'ข้อมูล',   icon: 'info',           iconColor: '#1d4ed8', badgeClass: 'ann-badge-info',    wrapClass: 'ann-type-info' },
  warning: { label: 'แจ้งเตือน', icon: 'alert-triangle', iconColor: '#d97706', badgeClass: 'ann-badge-warning', wrapClass: 'ann-type-warning' },
  success: { label: 'ข่าวดี',   icon: 'check-circle-2', iconColor: '#16a34a', badgeClass: 'ann-badge-success', wrapClass: 'ann-type-success' },
  urgent:  { label: 'ด่วน',     icon: 'bell-ring',       iconColor: '#dc2626', badgeClass: 'ann-badge-urgent',  wrapClass: 'ann-type-urgent' },
};
var annEditId = null;
var currentUserEmail = null;
var isAdmin = false;

function openAnnModal(id) {
  annEditId = id || null;
  var modal = document.getElementById('annModal');
  document.getElementById('annModalTitle').textContent = id ? 'แก้ไขประกาศ' : 'เพิ่มประกาศใหม่';
  if (!id) {
    document.getElementById('annTitle').value = '';
    document.getElementById('annBody').value = '';
    document.getElementById('annActive').checked = true;
    setAnnType('info');
  } else {
    db.collection('announcements').doc(id).get().then(function(doc) {
      if (!doc.exists) return;
      var d = doc.data();
      document.getElementById('annTitle').value = d.title || '';
      document.getElementById('annBody').value = d.body || '';
      document.getElementById('annActive').checked = d.active !== false;
      setAnnType(d.type || 'info');
    });
  }
  modal.classList.add('open');
  lucide.createIcons();
}
function closeAnnModal() { document.getElementById('annModal').classList.remove('open'); }

function setAnnType(type) {
  document.querySelectorAll('[name="annType"]').forEach(function(r) { r.checked = r.value === type; });
  document.querySelectorAll('.ann-type-opt').forEach(function(el) {
    el.className = 'ann-type-opt' + (el.dataset.type === type ? ' sel-' + type : '');
  });
}

function saveAnn() {
  var title = (document.getElementById('annTitle').value || '').trim();
  var body  = (document.getElementById('annBody').value  || '').trim();
  var type  = document.querySelector('[name="annType"]:checked') ? document.querySelector('[name="annType"]:checked').value : 'info';
  var active = document.getElementById('annActive').checked;
  if (!title) { showToast('กรุณากรอกหัวข้อ','error'); return; }
  var btn = document.getElementById('annSaveBtn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  var data = { title: title, body: body, type: type, active: active, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  var p = annEditId
    ? db.collection('announcements').doc(annEditId).update(data)
    : db.collection('announcements').add(Object.assign(data, { createdAt: firebase.firestore.FieldValue.serverTimestamp(), createdBy: currentUserEmail }));
  p.then(function() {
    showToast(annEditId ? 'แก้ไขประกาศแล้ว' : 'เพิ่มประกาศแล้ว');
    closeAnnModal();
    loadAnnouncements();
  }).catch(function(e) { showToast('เกิดข้อผิดพลาด: ' + e.message, 'error'); })
    .finally(function() { btn.disabled = false; btn.innerHTML = '<i data-lucide="save" style="width:15px;height:15px;"></i> บันทึก'; lucide.createIcons(); });
}

function deleteAnn(id) {
  if (!confirm('ลบประกาศนี้?')) return;
  db.collection('announcements').doc(id).delete()
    .then(function() { showToast('ลบประกาศแล้ว'); loadAnnouncements(); })
    .catch(function(e) { showToast('เกิดข้อผิดพลาด','error'); });
}

function toggleAnnActive(id, current) {
  db.collection('announcements').doc(id).update({ active: !current, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
    .then(function() { showToast(!current ? 'เปิดใช้งานแล้ว' : 'ปิดการแสดงผลแล้ว'); loadAnnouncements(); });
}

function loadAnnouncements() {
  var wrap = document.getElementById('annListWrap');
  if (!wrap) return;
  wrap.innerHTML = '<div style="text-align:center;padding:32px 0;color:#94a3b8;font-size:13px;">กำลังโหลด...</div>';
  db.collection('announcements').orderBy('createdAt','desc').limit(50).get()
    .then(function(snap) {
      if (snap.empty) {
        wrap.innerHTML = '<div style="text-align:center;padding:40px 0;color:#94a3b8;font-size:13px;">ยังไม่มีประกาศ</div>';
        return;
      }
      wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:12px;">';
      var html = '';
      snap.forEach(function(doc) {
        var d = doc.data(); var t = ANN_TYPES[d.type] || ANN_TYPES.info;
        var date = '';
        try { date = (d.createdAt.toDate()).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}); } catch(e){}
        html += '<div class="ann-card" style="' + (d.active ? '' : 'opacity:.5;') + '">' +
          '<div class="ann-icon-wrap ' + t.wrapClass + '">' +
            '<i data-lucide="' + t.icon + '" style="width:18px;height:18px;color:' + t.iconColor + ';"></i>' +
          '</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">' +
              '<span class="ann-badge ' + t.badgeClass + '">' + t.label + '</span>' +
              (d.active ? '' : '<span class="ann-badge" style="background:#f1f5f9;color:#94a3b8;">ซ่อนอยู่</span>') +
              '<span style="font-size:11px;color:#94a3b8;margin-left:auto;">' + date + '</span>' +
            '</div>' +
            '<div style="font-size:14px;font-weight:700;color:#1e293b;margin-bottom:4px;">' + (d.title||'') + '</div>' +
            (d.body ? '<div style="font-size:13px;color:#64748b;line-height:1.6;">' + (d.body||'') + '</div>' : '') +
          '</div>' +
          '<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">' +
            '<button onclick="openAnnModal(\'' + doc.id + '\')" style="padding:6px 10px;background:#f1f5f9;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#475569;font-family:Sarabun,sans-serif;">' +
              '<i data-lucide="edit-3" style="width:12px;height:12px;"></i> แก้ไข' +
            '</button>' +
            '<button onclick="toggleAnnActive(\'' + doc.id + '\',' + d.active + ')" style="padding:6px 10px;background:' + (d.active ? '#fff7ed' : '#f0fdf4') + ';border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:' + (d.active ? '#92400e' : '#15803d') + ';font-family:Sarabun,sans-serif;">' +
              '<i data-lucide="' + (d.active ? 'eye-off' : 'eye') + '" style="width:12px;height:12px;"></i> ' + (d.active ? 'ซ่อน' : 'แสดง') +
            '</button>' +
            '<button onclick="deleteAnn(\'' + doc.id + '\')" style="padding:6px 10px;background:#fee2e2;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#b91c1c;font-family:Sarabun,sans-serif;">' +
              '<i data-lucide="trash-2" style="width:12px;height:12px;"></i> ลบ' +
            '</button>' +
          '</div>' +
        '</div>';
      });
      wrap.innerHTML = '<div style="display:flex;flex-direction:column;gap:12px;">' + html + '</div>';
      lucide.createIcons();
    })
    .catch(function() { wrap.innerHTML = '<div style="text-align:center;padding:32px;color:#ef4444;font-size:13px;">โหลดข้อมูลไม่ได้</div>'; });
}

function switchSettingsTab(name) {
  document.querySelectorAll('.settings-tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.settings-pane').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('stab-'+name).classList.add('active');
  document.getElementById('spane-'+name).classList.add('active');
  if (name === 'announcements') loadAnnouncements();
}

/* ══ Render ══ */
function renderPage() {
  var showAnnTab = isAdmin;
  return (
    '<div class="page-header">' +
      '<div>' +
        '<div class="page-title-row">' +
          '<div class="page-icon blue">' +
            '<i data-lucide="settings-2" style="width:20px;height:20px;color:white;"></i>' +
          '</div>' +
          '<h1 class="page-title">ตั้งค่า</h1>' +
        '</div>' +
        '<p class="page-sub">จัดการการตั้งค่าระบบ</p>' +
      '</div>' +
    '</div>' +

    '<div class="settings-tabbar">' +
      '<button class="settings-tab active" id="stab-theme" onclick="switchSettingsTab(\'theme\')">' +
        '<i data-lucide="palette" style="width:14px;height:14px;"></i> ธีมสี' +
      '</button>' +
      (showAnnTab ?
        '<button class="settings-tab" id="stab-announcements" onclick="switchSettingsTab(\'announcements\')">' +
          '<i data-lucide="bell" style="width:14px;height:14px;"></i> ประกาศข่าว' +
        '</button>' : '') +
    '</div>' +

    '<div class="settings-pane active" id="spane-theme">' +
      '<div class="settings-section-title">ธีมสี</div>' +
      '<div class="theme-cards-row">' + renderCards() + '</div>' +
    '</div>' +

    (showAnnTab ?
      '<div class="settings-pane" id="spane-announcements">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
          '<div class="settings-section-title" style="margin-bottom:0;">ประกาศข่าวสำหรับ Admin</div>' +
          '<button onclick="openAnnModal(null)" style="display:flex;align-items:center;gap:7px;padding:9px 16px;background:#1d4ed8;color:white;font-weight:700;border:none;border-radius:12px;cursor:pointer;font-size:13px;font-family:Sarabun,sans-serif;">' +
            '<i data-lucide="plus" style="width:14px;height:14px;"></i> เพิ่มประกาศ' +
          '</button>' +
        '</div>' +
        '<div id="annListWrap"><div style="text-align:center;padding:40px;color:#94a3b8;font-size:13px;">คลิกแท็บนี้เพื่อโหลดประกาศ</div></div>' +
      '</div>' : '')
  );
}

function renderCards() {
  return Object.values(THEMES).map(function(t) {
    var sel = currentKey === t.key;
    return (
      '<div class="theme-card' + (sel ? ' ' + t.activeClass : '') + '" ' +
           'id="themeCard-' + t.key + '" onclick="selectTheme(\'' + t.key + '\')">' +

        /* checkmark */
        '<div class="check-badge"><i data-lucide="check"></i></div>' +

        /* navbar strip */
        '<div class="theme-navbar-strip" style="background:' + t.navbar + ';">' +
          '<div class="strip-circle"></div>' +
          '<div class="strip-lines">' +
            '<div class="strip-line"></div>' +
            '<div class="strip-line short"></div>' +
          '</div>' +
          '<div class="strip-btn"></div>' +
        '</div>' +

        /* app body mockup */
        '<div class="theme-body-mock">' +
          '<div class="mock-sidebar">' +
            '<div class="mock-sb-item" style="background:' + t.mockSb + ';opacity:.85;"></div>' +
            '<div class="mock-sb-item"></div>' +
            '<div class="mock-sb-item"></div>' +
          '</div>' +
          '<div class="mock-content">' +
            '<div class="mock-btn" style="background:' + t.mockBtn + ';"></div>' +
            '<div class="mock-line"></div>' +
            '<div class="mock-line s"></div>' +
          '</div>' +
        '</div>' +

        /* 5 swatches — สะท้อน 5 accent tokens จริง */
        '<div class="swatch-row">' +
          t.swatches.map(function(c) {
            return '<div class="swatch" style="background:' + c + ';"></div>';
          }).join('') +
          '<span class="swatch-label">5 สี</span>' +
        '</div>' +

        /* label */
        '<div class="theme-label">' +
          '<div class="theme-label-name">' + t.label + '</div>' +
          '<div class="theme-label-desc">' + t.desc + '</div>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

function selectTheme(key) {
  var t = THEMES[key]; if (!t) return;

  /* ล้าง selected class ทุก card */
  Object.values(THEMES).forEach(function(th) {
    var c = document.getElementById('themeCard-' + th.key);
    if (c) { c.classList.remove('selected-blue', 'selected-staff'); }
  });
  var card = document.getElementById('themeCard-' + key);
  if (card) card.classList.add(t.activeClass);

  applyTheme(key, true);
  showToast('เปลี่ยนธีมเป็น ' + t.label);
}

/* ══ Boot ══ */
buildPage({
  appId:        'settingsApp',
  navSubtitle:  'ตั้งค่า',
  navTheme:     (THEMES[currentKey] || THEMES.blue).navTheme,
  activePage:   'settings',
  requireAdmin: false,

  onAuth: function(user, contentEl) {
    updateNavUser(user);
    updateSidebarProfile(user);
    checkAdminAccess(user.email);
    currentUserEmail = user.email;

    /* buildPage reset body class → apply คืน */
    applyTheme(currentKey, false);

    /* ตรวจสอบ admin เพื่อแสดง/ซ่อน tab ประกาศ */
    var lEmail = user.email.toLowerCase();
    var isSA = lEmail === (typeof SUPERADMIN_EMAIL !== 'undefined' ? SUPERADMIN_EMAIL : '');
    db.collection('admins').doc(lEmail).get()
      .then(function(doc) {
        isAdmin = isSA || doc.exists;
        contentEl.innerHTML = renderPage();
        lucide.createIcons();
        /* init type radio click handlers */
        document.querySelectorAll('.ann-type-opt').forEach(function(el) {
          el.addEventListener('click', function() { setAnnType(el.dataset.type); });
        });
      })
      .catch(function() {
        isAdmin = false;
        contentEl.innerHTML = renderPage();
        lucide.createIcons();
      });
  }
});
</script>

<!-- ── Announcement Modal ── -->
<div class="ann-modal-bg" id="annModal">
  <div class="ann-modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h3 id="annModalTitle" style="font-size:17px;font-weight:800;color:#1e293b;"></h3>
      <button onclick="closeAnnModal()" style="padding:6px;background:#f1f5f9;border:none;border-radius:8px;cursor:pointer;display:flex;">
        <i data-lucide="x" style="width:16px;height:16px;color:#64748b;"></i>
      </button>
    </div>
    <div class="ann-field">
      <label class="ann-label">ประเภท</label>
      <div class="ann-type-radio" id="annTypeRadio">
        <label class="ann-type-opt sel-info" data-type="info">
          <input type="radio" name="annType" value="info" checked> ข้อมูล
        </label>
        <label class="ann-type-opt" data-type="warning">
          <input type="radio" name="annType" value="warning"> แจ้งเตือน
        </label>
        <label class="ann-type-opt" data-type="success">
          <input type="radio" name="annType" value="success"> ข่าวดี
        </label>
        <label class="ann-type-opt" data-type="urgent">
          <input type="radio" name="annType" value="urgent"> ด่วน
        </label>
      </div>
    </div>
    <div class="ann-field">
      <label class="ann-label">หัวข้อ</label>
      <input type="text" id="annTitle" class="ann-input" placeholder="หัวข้อประกาศ">
    </div>
    <div class="ann-field">
      <label class="ann-label">เนื้อหา</label>
      <textarea id="annBody" class="ann-input" placeholder="รายละเอียดประกาศ..."></textarea>
    </div>
    <div class="ann-field" style="display:flex;align-items:center;gap:10px;margin-bottom:0;">
      <label class="ann-label" style="margin:0;">แสดงผล</label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:700;color:var(--text);">
        <input type="checkbox" id="annActive" checked style="width:16px;height:16px;accent-color:#1d4ed8;">
        เปิดใช้งาน
      </label>
    </div>
    <div style="display:flex;gap:10px;margin-top:22px;">
      <button onclick="closeAnnModal()" style="flex:1;padding:11px;background:#f1f5f9;color:#64748b;font-weight:700;border:none;border-radius:12px;cursor:pointer;font-size:14px;">ยกเลิก</button>
      <button onclick="saveAnn()" id="annSaveBtn" style="flex:2;padding:11px;background:#1d4ed8;color:white;font-weight:800;border:none;border-radius:12px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;">
        <i data-lucide="save" style="width:15px;height:15px;"></i> บันทึก
      </button>
    </div>
  </div>
</div>

</body>

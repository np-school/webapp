<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="var(--accent)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NP Origins">
  <link rel="icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/np-webapp-74616.firebasestorage.app/o/img%2FNP_Origins-192.jpg?alt=media&token=6b6fa3d3-61e9-48ce-886a-d01bb376ff2f">
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}</script>
  <title>คู่มือการใช้งาน – โรงเรียนหนองกี่พิทยาคม</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="shared/tailwind-built.css" rel="stylesheet">
  <link href="shared/styles-new.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@1.24.0"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  <script src="shared/firebase.js"></script>
  <script src="shared/common.js"></script>

  <style>
    
    /* ── Guide-specific styles ── */

    /* Primary tab bar */
    .g-tabbar {
      display: flex; gap: 6px; background: white; border-radius: 16px;
      padding: 6px; margin-bottom: 20px;
      border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,.05);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .g-tabbar::-webkit-scrollbar { height: 0; }
    .g-tab {
      flex: 1; min-width: 110px; padding: 10px 14px; border: none;
      border-radius: 11px; font-family: 'Sarabun', sans-serif; font-size: 13px;
      font-weight: 700; color: var(--text2); cursor: pointer; background: none;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all .2s; white-space: nowrap;
    }
    .g-tab:hover { background: var(--border-soft); color: var(--text); }
    .g-tab.tab-active { background: var(--accent); color: white; box-shadow: 0 4px 14px rgba(29,78,216,.3); }
    .g-tab.tab-active-purple { background: var(--purple); color: white; box-shadow: 0 4px 14px rgba(13,27,42,.3); }

    .g-pane { display: none; }
    .g-pane.active { display: block; }

    /* Sub-tab bar */
    .g-subbar {
      display: flex; gap: 4px; margin-bottom: 20px; overflow-x: auto;
      -webkit-overflow-scrolling: touch; padding-bottom: 2px;
      position: sticky; top: 0; z-index: 10; background: var(--border-soft); padding-top: 8px;
    }
    .g-subbar::-webkit-scrollbar { height: 0; }
    .g-sub {
      padding: 8px 16px; border: none; background: none; font-family: 'Sarabun', sans-serif;
      font-size: 12px; font-weight: 700; color: var(--text3); cursor: pointer;
      border-bottom: 2.5px solid transparent; transition: all .18s; white-space: nowrap;
    }
    .g-sub:hover { color: var(--text-mid); }
    .g-sub.sub-active { color: var(--accent); border-bottom-color: var(--accent); }
    .g-sub.sub-active-purple { color: var(--violet); border-bottom-color: var(--violet); }

    .g-subpane { display: none; }
    .g-subpane.active { display: block; }

    /* Step list */
    .g-step { display: flex; gap: 14px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--border-soft); }
    .g-step:last-child { border-bottom: none; padding-bottom: 0; }
    .g-num {
      width: 34px; height: 34px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; flex-shrink: 0;
    }
    .g-step-title { font-weight: 700; color: var(--text); font-size: 14px; margin-bottom: 4px; }
    .g-step-desc  { font-size: 13px; color: var(--text2); line-height: 1.7; }

    /* Alert */
    .g-alert {
      border-radius: 12px; padding: 13px 15px;
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13px; line-height: 1.65; margin-top: 14px;
    }
    .g-alert-yellow { background: var(--amber-light); border: 1px solid var(--amber-mid); color: var(--amber-dark); }
    .g-alert-blue   { background: var(--accent-tint); border: 1px solid var(--accent-light); color: #1e3a8a; }
    .g-alert-green  { background: var(--green-light); border: 1px solid #bbf7d0; color: #14532d; }

    /* Status badges */
    .sbadge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .sb-pending   { background: var(--role-hog-bg); color: var(--role-director-color); }
    .sb-approved  { background: var(--role-academic-bg); color: #15803d; }
    .sb-rejected  { background: var(--red-light); color: var(--red-dark); }
    .sb-done      { background: var(--border-soft); color: var(--text2); }
    .sb-submitted { background: var(--role-academic-bg); color: #15803d; }
    .sb-head_reviewed { background: var(--sky-light); color: var(--role-hr-color); }
    .sb-reviewed  { background: var(--accent-tint); color: var(--accent-dark); }
    .sb-deputy_reviewed { background: #ede9fe; color: #6d28d9; }
    .sb-final_approved  { background: var(--green-light); color: #065f46; border: 1px solid var(--green-mid); }
    .sb-revision  { background: var(--amber-light); color: var(--amber-dark); border: 1px solid var(--amber-mid); }

    /* Workflow bar */
    .wf-bar { display: flex; align-items: stretch; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); margin: 16px 0; }
    .wf-step {
      flex: 1; padding: 8px 4px; text-align: center; font-size: 9px; font-weight: 800;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; line-height: 1.3;
    }
    .wf-done   { background: var(--green); color: white; }
    .wf-active { background: var(--yellow); color: #713f12; }
    .wf-pend   { background: var(--border-soft); color: var(--text3); }
    .wf-final  { background: var(--purple); color: white; }
    .wf-div    { width: 1px; background: rgba(0,0,0,.08); flex-shrink: 0; }

    /* Flow diagram */
    .flow-row { display: flex; align-items: center; flex-wrap: wrap; margin: 10px 0; gap: 0; }
    .flow-box {
      padding: 9px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; text-align: center; flex-shrink: 0;
    }
    .flow-arrow { font-size: 16px; color: var(--text3); padding: 0 6px; flex-shrink: 0; }
    .fb-blue   { background: var(--accent-tint); color: var(--accent); border: 1.5px solid var(--accent-light); }
    .fb-green  { background: var(--green-light); color: #15803d; border: 1.5px solid #bbf7d0; }
    .fb-yellow { background: var(--amber-light); color: var(--amber-dark); border: 1.5px solid var(--amber-mid); }
    .fb-purple { background: var(--violet-light); color: var(--violet); border: 1.5px solid #c4b5fd; }
    .fb-red    { background: #fff1f2; color: var(--red-dark); border: 1.5px solid #fecdd3; }
    .fb-gray   { background: var(--bg); color: var(--text2); border: 1.5px solid var(--border); }

    /* System overview grid */
    .sys-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    @media(max-width:540px){ .sys-grid { grid-template-columns: 1fr; } }
    .sys-card { border-radius: 12px; padding: 16px; border: 1px solid; font-size: 13px; }
    .sys-card-blue   { background: var(--accent-tint); border-color: var(--accent-light); }
    .sys-card-purple { background: var(--violet-light); border-color: #c4b5fd; }
    .sys-card-title  { font-weight: 700; color: var(--text); margin: 6px 0 4px; font-size: 14px; }
    .sys-card-desc   { color: var(--text2); line-height: 1.5; }

    /* Role table */
    .role-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
    .role-table th { background: var(--bg); font-weight: 700; color: var(--text-mid); padding: 10px 12px; text-align: left; border-bottom: 2px solid var(--border); }
    .role-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-soft); vertical-align: top; line-height: 1.6; }
    .role-table tr:last-child td { border-bottom: none; }
    .role-table tr:hover td { background: var(--bg); }

    /* FAQ */
    .faq-item { border-bottom: 1px solid var(--border-soft); }
    .faq-q {
      width: 100%; text-align: left; padding: 14px 0; background: none; border: none;
      font-family: 'Sarabun', sans-serif; font-weight: 700; font-size: 14px; color: var(--text);
      cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .faq-a { font-size: 13px; color: var(--text2); line-height: 1.7; padding-bottom: 14px; display: none; }
    .faq-a.open { display: block; }

    /* CTA */
    .cta-wrap { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 8px 0 4px; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 26px; color: white; font-weight: 800; border-radius: 14px;
      text-decoration: none; font-size: 14px; transition: opacity .15s;
    }
    .cta-btn:hover { opacity: .9; }
    .cta-blue   { background: var(--accent); box-shadow: 0 6px 18px rgba(29,78,216,.3); }
    .cta-purple { background: var(--purple); box-shadow: 0 6px 18px rgba(13,27,42,.3); }

    /* Section divider */
    .sdiv {
      font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase;
      letter-spacing: 2px; margin: 20px 0 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .sdiv::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Status row */
    .status-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 13px; background: var(--bg); border-radius: 12px;
    }

    @media(max-width:600px){
      .g-tab { min-width: 90px; font-size: 12px; padding: 8px 10px; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:var(--text2);font-size:14px;font-weight:700;">กำลังตรวจสอบสิทธิ์...</p>
</div>

<!-- Sidebar overlay (mobile) -->
<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Access Denied -->
<div id="accessDenied" style="display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="width:72px;height:72px;background:var(--red-light);border-radius:50%;display:flex;align-items:center;justify-content:center;">
    <i data-lucide="shield-off" style="width:36px;height:36px;color:var(--red);"></i>
  </div>
  <div style="text-align:center;">
    <h2 style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px;">ไม่มีสิทธิ์เข้าถึง</h2>
    <p style="color:var(--text2);font-size:14px;">คุณไม่มีสิทธิ์เข้าหน้านี้</p>
  </div>
  <a href="index.html" style="padding:10px 24px;background:var(--accent);color:white;border-radius:12px;font-weight:700;text-decoration:none;">← กลับหน้าแรก</a>
</div>

<!-- Main App -->
<div id="guideApp" style="display:none;"></div>

<!-- ปุ่มย้อนกลับไปด้านบน -->
<button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTopContent()" title="ย้อนกลับด้านบน">
  <i data-lucide="arrow-up" style="width:20px;height:20px;"></i>
</button>

</body>
</html>

<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="var(--accent)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NP Origins">

  <title>คู่มือการใช้งาน – โรงเรียนหนองกี่พิทยาคม</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="shared/styles-new.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  <script src="shared/firebase.js"></script>
  <script src="shared/common.js"></script>

  <style>
    /* ปุ่มย้อนกลับไปด้านบน (ลอยมุมขวาล่าง) */
    .scroll-top-btn{
      position:fixed; right:20px; bottom:20px; width:46px; height:46px;
      border-radius:50%; border:none; background:var(--accent); color:#fff;
      display:none; align-items:center; justify-content:center;
      box-shadow:0 4px 14px rgba(0,0,0,.25); cursor:pointer; z-index:999;
      opacity:0; transform:translateY(10px);
      transition:opacity .2s ease, transform .2s ease;
    }
    .scroll-top-btn.show{display:flex; opacity:1; transform:translateY(0);}
    .scroll-top-btn:hover{background:var(--accent-dark);}
    .scroll-top-btn:active{transform:translateY(0) scale(.94);}

    /* ── Guide-specific styles ── */

    /* Primary tab bar */
    .g-tabbar {
      display: flex; gap: 6px; background: white; border-radius: 16px;
      padding: 6px; margin-bottom: 20px;
      border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,.05);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .g-tabbar::-webkit-scrollbar { height: 0; }
    .g-tab {
      flex: 1; min-width: 110px; padding: 10px 14px; border: none;
      border-radius: 11px; font-family: 'Sarabun', sans-serif; font-size: 13px;
      font-weight: 700; color: #64748b; cursor: pointer; background: none;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all .2s; white-space: nowrap;
    }
    .g-tab:hover { background: #f1f5f9; color: #1e293b; }
    .g-tab.tab-active { background: var(--accent); color: white; box-shadow: 0 4px 14px rgba(29,78,216,.3); }
    .g-tab.tab-active-purple { background: var(--purple); color: white; box-shadow: 0 4px 14px rgba(13,27,42,.3); }

    .g-pane { display: none; }
    .g-pane.active { display: block; }

    /* Sub-tab bar */
    .g-subbar {
      display: flex; gap: 4px; margin-bottom: 20px; overflow-x: auto;
      -webkit-overflow-scrolling: touch; padding-bottom: 2px;
      position: sticky; top: 0; z-index: 10; background: #f1f5f9; padding-top: 8px;
    }
    .g-subbar::-webkit-scrollbar { height: 0; }
    .g-sub {
      padding: 8px 16px; border: none; background: none; font-family: 'Sarabun', sans-serif;
      font-size: 12px; font-weight: 700; color: #94a3b8; cursor: pointer;
      border-bottom: 2.5px solid transparent; transition: all .18s; white-space: nowrap;
    }
    .g-sub:hover { color: #475569; }
    .g-sub.sub-active { color: var(--accent); border-bottom-color: var(--accent); }
    .g-sub.sub-active-purple { color: #7c3aed; border-bottom-color: #7c3aed; }

    .g-subpane { display: none; }
    .g-subpane.active { display: block; }

    /* Step list */
    .g-step { display: flex; gap: 14px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid #f1f5f9; }
    .g-step:last-child { border-bottom: none; padding-bottom: 0; }
    .g-num {
      width: 34px; height: 34px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; flex-shrink: 0;
    }
    .g-step-title { font-weight: 700; color: #1e293b; font-size: 14px; margin-bottom: 4px; }
    .g-step-desc  { font-size: 13px; color: #64748b; line-height: 1.7; }

    /* Alert */
    .g-alert {
      border-radius: 12px; padding: 13px 15px;
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13px; line-height: 1.65; margin-top: 14px;
    }
    .g-alert-yellow { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .g-alert-blue   { background: var(--accent-tint); border: 1px solid var(--accent-light); color: #1e3a8a; }
    .g-alert-green  { background: #f0fdf4; border: 1px solid #bbf7d0; color: #14532d; }

    /* Status badges */
    .sbadge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .sb-pending   { background: #fef3c7; color: #b45309; }
    .sb-approved  { background: #dcfce7; color: #15803d; }
    .sb-rejected  { background: #fee2e2; color: #b91c1c; }
    .sb-done      { background: #f1f5f9; color: #64748b; }
    .sb-submitted { background: #dcfce7; color: #15803d; }
    .sb-head_reviewed { background: #e0f2fe; color: #0369a1; }
    .sb-reviewed  { background: var(--accent-tint); color: var(--accent-dark); }
    .sb-deputy_reviewed { background: #ede9fe; color: #6d28d9; }
    .sb-final_approved  { background: #f0fdf4; color: #065f46; border: 1px solid #86efac; }
    .sb-revision  { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

    /* Workflow bar */
    .wf-bar { display: flex; align-items: stretch; border-radius: 10px; overflow: hidden; border: 1px solid #e2e8f0; margin: 16px 0; }
    .wf-step {
      flex: 1; padding: 8px 4px; text-align: center; font-size: 9px; font-weight: 800;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; line-height: 1.3;
    }
    .wf-done   { background: #16a34a; color: white; }
    .wf-active { background: #eab308; color: #713f12; }
    .wf-pend   { background: #f1f5f9; color: #94a3b8; }
    .wf-final  { background: var(--purple); color: white; }
    .wf-div    { width: 1px; background: rgba(0,0,0,.08); flex-shrink: 0; }

    /* Flow diagram */
    .flow-row { display: flex; align-items: center; flex-wrap: wrap; margin: 10px 0; gap: 0; }
    .flow-box {
      padding: 9px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; text-align: center; flex-shrink: 0;
    }
    .flow-arrow { font-size: 16px; color: #94a3b8; padding: 0 6px; flex-shrink: 0; }
    .fb-blue   { background: var(--accent-tint); color: var(--accent); border: 1.5px solid var(--accent-light); }
    .fb-green  { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; }
    .fb-yellow { background: #fffbeb; color: #92400e; border: 1.5px solid #fde68a; }
    .fb-purple { background: #f5f3ff; color: #7c3aed; border: 1.5px solid #c4b5fd; }
    .fb-red    { background: #fff1f2; color: #b91c1c; border: 1.5px solid #fecdd3; }
    .fb-gray   { background: #f8fafc; color: #64748b; border: 1.5px solid #e2e8f0; }

    /* System overview grid */
    .sys-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    @media(max-width:540px){ .sys-grid { grid-template-columns: 1fr; } }
    .sys-card { border-radius: 12px; padding: 16px; border: 1px solid; font-size: 13px; }
    .sys-card-blue   { background: var(--accent-tint); border-color: var(--accent-light); }
    .sys-card-purple { background: #f5f3ff; border-color: #c4b5fd; }
    .sys-card-title  { font-weight: 700; color: #1e293b; margin: 6px 0 4px; font-size: 14px; }
    .sys-card-desc   { color: #64748b; line-height: 1.5; }

    /* Role table */
    .role-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
    .role-table th { background: #f8fafc; font-weight: 700; color: #475569; padding: 10px 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
    .role-table td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; line-height: 1.6; }
    .role-table tr:last-child td { border-bottom: none; }
    .role-table tr:hover td { background: #f8fafc; }

    /* FAQ */
    .faq-item { border-bottom: 1px solid #f1f5f9; }
    .faq-q {
      width: 100%; text-align: left; padding: 14px 0; background: none; border: none;
      font-family: 'Sarabun', sans-serif; font-weight: 700; font-size: 14px; color: #1e293b;
      cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .faq-a { font-size: 13px; color: #64748b; line-height: 1.7; padding-bottom: 14px; display: none; }
    .faq-a.open { display: block; }

    /* CTA */
    .cta-wrap { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 8px 0 4px; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 26px; color: white; font-weight: 800; border-radius: 14px;
      text-decoration: none; font-size: 14px; transition: opacity .15s;
    }
    .cta-btn:hover { opacity: .9; }
    .cta-blue   { background: var(--accent); box-shadow: 0 6px 18px rgba(29,78,216,.3); }
    .cta-purple { background: var(--purple); box-shadow: 0 6px 18px rgba(13,27,42,.3); }

    /* Section divider */
    .sdiv {
      font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase;
      letter-spacing: 2px; margin: 20px 0 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .sdiv::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

    /* Status row */
    .status-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 13px; background: #f8fafc; border-radius: 12px;
    }

    @media(max-width:600px){
      .g-tab { min-width: 90px; font-size: 12px; padding: 8px 10px; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:#64748b;font-size:14px;font-weight:700;">กำลังตรวจสอบสิทธิ์...</p>
</div>

<!-- Sidebar overlay (mobile) -->
<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Access Denied -->
<div id="accessDenied" style="display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="width:72px;height:72px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;">
    <i data-lucide="shield-off" style="width:36px;height:36px;color:#dc2626;"></i>
  </div>
  <div style="text-align:center;">
    <h2 style="font-size:22px;font-weight:800;color:#1e293b;margin-bottom:8px;">ไม่มีสิทธิ์เข้าถึง</h2>
    <p style="color:#64748b;font-size:14px;">คุณไม่มีสิทธิ์เข้าหน้านี้</p>
  </div>
  <a href="index.html" style="padding:10px 24px;background:var(--accent);color:white;border-radius:12px;font-weight:700;text-decoration:none;">← กลับหน้าแรก</a>
</div>

<!-- Main App -->
<div id="guideApp" style="display:none;"></div>

<!-- ปุ่มย้อนกลับไปด้านบน -->
<button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTopContent()" title="ย้อนกลับด้านบน">
  <i data-lucide="arrow-up" style="width:20px;height:20px;"></i>
</button>

<!-- ══════════════════════════════ SCRIPT ══════════════════════════════ -->
<script>

buildPage({
  appId:        'guideApp',
  navSubtitle:  'คู่มือการใช้งาน',
  navTheme:     'blue',
  activePage:   'guide',
  requireAdmin: false,
  requireAuth:  false,

  onAuth: function(user, contentEl) {
    if (user) {
      updateNavUser(user);
      updateSidebarProfile(user);
      checkAdminAccess(user.email);
    }

    contentEl.innerHTML = renderPage();
    lucide.createIcons();
    initTabs();
    setupScrollTopButton();
  }
});

/* ══ ปุ่มย้อนกลับไปด้านบน — scroll เกิดที่ .content-area (id="pageContent") ══ */
function setupScrollTopButton() {
  var content = document.getElementById('pageContent');
  var btn = document.getElementById('scrollTopBtn');
  if (!content || !btn) return;
  content.addEventListener('scroll', function() {
    btn.classList.toggle('show', content.scrollTop > 300);
  });
}
function scrollToTopContent() {
  var content = document.getElementById('pageContent');
  if (content) content.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══ Render ══ */
function renderPage() {
  return (
    /* Page header */
    '<div class="page-header">' +
      '<div>' +
        '<div class="page-title-row">' +
          '<div class="page-icon blue">' +
            '<i data-lucide="book-open" style="width:20px;height:20px;color:white;"></i>' +
          '</div>' +
          '<h1 class="page-title">คู่มือการใช้งาน</h1>' +
        '</div>' +
        '<p class="page-sub">NP Origins · อ่านทำความเข้าใจก่อนใช้งาน เพื่อให้การใช้บริการเป็นไปอย่างราบรื่น</p>' +
      '</div>' +
    '</div>' +

    /* ── Primary tab bar ── */
    '<div class="g-tabbar" id="gTabBar">' +
      '<button class="g-tab tab-active" id="gt-overview" onclick="switchGTab(\'overview\',this)">' +
        '<i data-lucide="layout-dashboard" style="width:15px;height:15px;"></i> ภาพรวมระบบ' +
      '</button>' +
      '<button class="g-tab" id="gt-room" onclick="switchGTab(\'room\',this)">' +
        '<i data-lucide="calendar" style="width:15px;height:15px;"></i> ขอใช้ห้อง/สถานที่' +
      '</button>' +
      '<button class="g-tab" id="gt-portfolio" onclick="switchGTab(\'portfolio\',this)">' +
        '<i data-lucide="send" style="width:15px;height:15px;"></i> ส่งงานประจำภาคเรียน' +
      '</button>' +
      '<button class="g-tab" id="gt-faq" onclick="switchGTab(\'faq\',this)">' +
        '<i data-lucide="help-circle" style="width:15px;height:15px;"></i> คำถามที่พบบ่อย' +
      '</button>' +
    '</div>' +

    /* ════════ TAB 1: ภาพรวม ════════ */
    '<div class="g-pane active" id="gp-overview">' +
      renderOverview() +
    '</div>' +

    /* ════════ TAB 2: ขอใช้ห้อง ════════ */
    '<div class="g-pane" id="gp-room">' +
      /* sub-tab bar */
      '<div class="g-subbar" id="gsub-room-bar">' +
        '<button class="g-sub sub-active" onclick="switchGSub(\'room\',\'user\',this)">👩‍🏫 สำหรับผู้ใช้งาน</button>' +
        '<button class="g-sub" onclick="switchGSub(\'room\',\'status\',this)">📋 ความหมายสถานะ</button>' +
        '<button class="g-sub" onclick="switchGSub(\'room\',\'admin\',this)">🛡 สำหรับ Admin</button>' +
      '</div>' +
      '<div class="g-subpane active" id="gsp-room-user">' + renderRoomUser() + '</div>' +
      '<div class="g-subpane" id="gsp-room-status">' + renderRoomStatus() + '</div>' +
      '<div class="g-subpane" id="gsp-room-admin">' + renderRoomAdmin() + '</div>' +
    '</div>' +

    /* ════════ TAB 3: ส่งงาน ════════ */
    '<div class="g-pane" id="gp-portfolio">' +
      '<div class="g-subbar" id="gsub-portfolio-bar">' +
        '<button class="g-sub sub-active-purple" onclick="switchGSub(\'portfolio\',\'teacher\',this)">👩‍🏫 สำหรับครู</button>' +
        '<button class="g-sub" onclick="switchGSub(\'portfolio\',\'workflow\',this)">🔄 Workflow สถานะ</button>' +
        '<button class="g-sub" onclick="switchGSub(\'portfolio\',\'admin\',this)">🛡 สำหรับ Admin</button>' +
      '</div>' +
      '<div class="g-subpane active" id="gsp-portfolio-teacher">' + renderPortfolioTeacher() + '</div>' +
      '<div class="g-subpane" id="gsp-portfolio-workflow">' + renderPortfolioWorkflow() + '</div>' +
      '<div class="g-subpane" id="gsp-portfolio-admin">' + renderPortfolioAdmin() + '</div>' +
    '</div>' +

    /* ════════ TAB 4: FAQ ════════ */
    '<div class="g-pane" id="gp-faq">' +
      renderFaq() +
    '</div>'
  );
}

/* ══ TAB CONTENT ══ */

function renderOverview() {
  return (
    '<div class="card" style="margin-bottom:16px;">' +
      '<div class="page-title-row" style="margin-bottom:12px;">' +
        '<div class="page-icon blue"><i data-lucide="layout-dashboard" style="width:18px;height:18px;color:white;"></i></div>' +
        '<span style="font-size:16px;font-weight:800;color:#1e293b;">NP Origins คืออะไร</span>' +
      '</div>' +
      '<p style="font-size:13px;color:#475569;line-height:1.8;margin-bottom:18px;">' +
        'NP Origins คือ<strong>ระบบบริการออนไลน์ของโรงเรียนหนองกี่พิทยาคม</strong> ที่รวบรวมบริการต่างๆ ไว้ในที่เดียว เข้าใช้งานได้ผ่าน Google Account ของโรงเรียน <strong>(@nongki.ac.th)</strong> ปัจจุบันเปิดให้บริการ 2 ระบบหลัก' +
      '</p>' +
      '<div class="sys-grid">' +
        '<div class="sys-card sys-card-blue">' +
          '<div style="font-size:22px;">🏫</div>' +
          '<div class="sys-card-title">ขอใช้ห้อง / สถานที่</div>' +
          '<div class="sys-card-desc">จองห้องประชุม ห้องเรียน หรือสถานที่ต่างๆ ของโรงเรียน พร้อมระบบอนุมัติโดยเจ้าหน้าที่</div>' +
        '</div>' +
        '<div class="sys-card sys-card-purple">' +
          '<div style="font-size:22px;">📋</div>' +
          '<div class="sys-card-title">ส่งงานประจำภาคเรียน</div>' +
          '<div class="sys-card-desc">อัปโหลดเอกสารภาระงานของครู ผ่านกระบวนการตรวจสอบหลายขั้นตอนจนถึงผู้บริหาร</div>' +
        '</div>' +
      '</div>' +
      '<div class="sdiv">การเข้าสู่ระบบ</div>' +
      '<div class="g-step">' +
        '<div class="g-num" style="background:var(--accent-tint);color:var(--accent);">1</div>' +
        '<div><div class="g-step-title">เข้าเว็บไซต์หรือแอปพลิเคชัน</div>' +
        '<div class="g-step-desc">เปิด NP Origins ผ่านเบราว์เซอร์หรือ Add to Home Screen บน iOS/Android เพื่อใช้งานแบบ PWA</div></div>' +
      '</div>' +
      '<div class="g-step">' +
        '<div class="g-num" style="background:var(--accent-tint);color:var(--accent);">2</div>' +
        '<div><div class="g-step-title">คลิก "เข้าสู่ระบบด้วย Google"</div>' +
        '<div class="g-step-desc">เลือกบัญชี <strong>@nongki.ac.th</strong> เท่านั้น บัญชีส่วนตัว Gmail จะไม่สามารถเข้าใช้งานได้</div></div>' +
      '</div>' +
      '<div class="g-step">' +

/* ══ Tab functions (run after render) ══ */
function initTabs() {
  /* nothing needed — tabs start with correct active classes from render */
}

function switchGTab(name, btn) {
  document.querySelectorAll('.g-pane').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.g-tab').forEach(function(b){ b.classList.remove('tab-active','tab-active-purple'); });
  var el = document.getElementById('gp-' + name);
  if (el) el.classList.add('active');
  var colorClass = name === 'portfolio' ? 'tab-active-purple' : 'tab-active';
  btn.classList.add(colorClass);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchGSub(system, name, btn) {
  var barId = 'gsub-' + system + '-bar';
  var prefix = 'gsp-' + system + '-';
  var colorClass = system === 'room' ? 'sub-active' : 'sub-active-purple';
  document.querySelectorAll('[id^="' + prefix + '"]').forEach(function(p){ p.classList.remove('active'); });
  var bar = document.getElementById(barId);
  if (bar) bar.querySelectorAll('.g-sub').forEach(function(b){ b.classList.remove('sub-active','sub-active-purple'); });
  var target = document.getElementById(prefix + name);
  if (target) target.classList.add('active');
  btn.classList.add(colorClass);
}

function toggleFaq(btn) {
  var answer = btn.nextElementSibling;
  var icon   = btn.querySelector('[data-lucide="chevron-down"]');
  var isOpen = answer.classList.contains('open');
  document.querySelectorAll('.faq-a').forEach(function(a){ a.classList.remove('open'); });
  document.querySelectorAll('.faq-q [data-lucide="chevron-down"]').forEach(function(i){ i.style.transform = ''; });
  if (!isOpen) {
    answer.classList.add('open');
    if (icon) icon.style.transform = 'rotate(180deg)';
  }
}

/* ── Deep-link support ── */
(function(){
  var h = window.location.hash;
  var map = {
    '#sec-room':             ['room',      'room',      'user'],
    '#sec-status':           ['room',      'room',      'status'],
    '#sec-portfolio':        ['portfolio', 'portfolio', 'teacher'],
    '#sec-portfolio-status': ['portfolio', 'portfolio', 'workflow'],
    '#sec-faq':              ['faq',       null,        null],
  };
  if (map[h]) {
    var t = map[h];
    /* tabs init after onAuth — defer */
    window.addEventListener('load', function() {
      var btn = document.getElementById('gt-' + t[0]);
      if (btn) switchGTab(t[0], btn);
      if (t[1] && t[2]) {
        var bar = document.getElementById('gsub-' + t[1] + '-bar');
        if (bar) {
          var subs = bar.querySelectorAll('.g-sub');
          var subMap = { user: 0, status: 1, admin: 2, teacher: 0, workflow: 1 };
          var idx = subMap[t[2]];
          if (subs[idx]) switchGSub(t[1], t[2], subs[idx]);
        }
      }
    });
  }
})();
